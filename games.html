<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="gm.title">棋戰卷軸 — 弈境奇兵 (Go Odyssey)</title>
<style>/* anti-FOUC: site-nav.js will replace this header with .cg-nav; reveal after 3s if it never loads */header:not(.cg-nav):not(.hero){visibility:hidden;animation:cgNavReveal 0s 3s forwards}@keyframes cgNavReveal{to{visibility:visible}}</style>
<script src="/i18n.js?v=20260710a"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#e8d5aa;--cream2:#dcc394;--cream3:#cdb17e;
  --ink:#2b1b0c;--ink3:#755a37;
  --teal:#a86418;--teal-bg:#f2dfb6;--teal-dark:#70400e;
  --amber:#b96912;--amber-bg:#f5e5bf;
  --border:#a98450;--border2:#8e6838;
  --white:#efdfb9;
  --shadow:0 3px 8px rgba(28,14,5,.16),0 10px 28px rgba(28,14,5,.12);
  --shadow-lg:0 8px 40px rgba(28,20,9,.13);
  --green:#16a34a;--red:#dc2626;
}
html,body{min-height:100%;background:#160d07;color:var(--ink);font-family:'DM Sans',sans-serif;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(rgba(18,10,5,.72),rgba(18,10,5,.9)),url('/assets/hero/hero_bg.webp') center top/cover fixed;opacity:1;}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;
  padding:11px 18px;border-bottom:1px solid var(--border);
  background:rgba(250,247,242,.95);backdrop-filter:blur(8px);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:18px;color:var(--teal);text-decoration:none;}
.nav-links{display:flex;gap:4px;margin-left:auto;}
.nav-link{font-size:13px;font-weight:500;color:var(--ink3);text-decoration:none;
  padding:5px 11px;border-radius:8px;border:1px solid transparent;transition:all .15s;}
.nav-link:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-bg);}
.nav-link.active{color:var(--teal);font-weight:600;}

/* ── PAGE ── */
.page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:32px 20px 80px;}
.page-header{position:relative;margin-bottom:28px;padding:24px 28px;border:2px solid #936129;border-radius:14px;background:linear-gradient(135deg,rgba(92,55,21,.96),rgba(42,25,12,.97));box-shadow:0 0 0 4px rgba(27,15,7,.8),0 0 0 5px rgba(226,183,94,.22),0 18px 40px rgba(0,0,0,.38);overflow:hidden}.page-header::after{content:'●  ○  ●';position:absolute;right:20px;bottom:12px;color:rgba(242,205,123,.28);font-size:9px;letter-spacing:4px}.page-kicker{font-size:10px;font-weight:800;letter-spacing:2.8px;color:#d9a64e;margin-bottom:5px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:700;margin-bottom:6px;color:#f4d889;text-shadow:0 3px 12px #000;}
.page-sub{font-size:13px;color:#cbb38a;}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat-card{background:linear-gradient(145deg,#f1e0b9,#dbc18e);border:2px solid var(--border);border-radius:9px;
  padding:16px 14px;text-align:center;box-shadow:var(--shadow),inset 0 0 18px rgba(112,68,17,.08);}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--teal);margin-bottom:3px;}
.stat-lbl{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;}
.stat-card.win .stat-val{color:var(--green);}
.stat-card.lose .stat-val{color:var(--red);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--cream);cursor:pointer;font-size:12px;font-weight:500;color:var(--ink3);
  font-family:inherit;transition:all .15s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--teal);color:var(--teal);}
.filter-btn.sel{background:var(--teal-bg);border-color:var(--teal);color:var(--teal);font-weight:600;}
.filter-spacer{flex:1;}
.search-inp{padding:7px 12px;border:1.5px solid var(--border);border-radius:10px;
  font-size:13px;font-family:inherit;background:var(--cream);color:var(--ink);
  width:180px;transition:border-color .15s;}
.search-inp:focus{outline:none;border-color:var(--teal);}

/* ── GAME TABLE ── */
.game-table{background:linear-gradient(90deg,#ead8af,#f2e2bd 50%,#e5cea0);border:2px solid #8f693a;border-radius:10px;
  box-shadow:0 0 0 4px rgba(35,20,9,.75),0 15px 35px rgba(0,0,0,.32),inset 0 0 28px rgba(104,60,15,.08);overflow:hidden;}
.gt-head{display:grid;grid-template-columns:var(--cols);align-items:center;
  padding:10px 16px;background:var(--cream2);border-bottom:1px solid var(--border);
  font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1.2px;}
.gt-row{display:grid;grid-template-columns:var(--cols);align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--cream2);transition:background .12s;gap:8px;}
.gt-row:last-child{border-bottom:none;}
.gt-row:hover{background:var(--cream);}
/* columns: date | opp | color | moves | board | result | sgf */
.game-table{--cols:130px 1fr 56px 60px 60px 80px 80px;}
@media(max-width:640px){
  .page{padding:20px 10px 80px}.page-header{padding:20px 18px}.page-title{font-size:32px}
  .stats-bar{grid-template-columns:repeat(2,1fr);gap:8px}
  .search-inp{width:100%}.filter-spacer{display:none}
  .game-table{--cols:74px minmax(0,1fr) 44px 58px;}
  .gt-head span:nth-child(4),.gt-head .col-board,.gt-head span:nth-child(7),
  .col-moves,.col-board,.col-sgf{display:none;}
  .gt-head,.gt-row{padding-left:10px;padding-right:10px;gap:6px}
}

.col-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);}
.col-opp{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.col-color{display:flex;align-items:center;gap:5px;font-size:12px;}
.stone{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.stone.b{background:radial-gradient(circle at 35% 35%,#555,#111);box-shadow:inset -1px -1px 2px rgba(0,0,0,.4);}
.stone.w{background:radial-gradient(circle at 35% 35%,#fff,#ccc);box-shadow:inset -1px -1px 2px rgba(0,0,0,.15);border:1px solid #bbb;}
.col-moves{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);text-align:right;}
.col-board{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);text-align:center;}
.col-result{display:flex;align-items:center;justify-content:center;}
.result-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;}
.result-pill.win{background:#dcfce7;color:var(--green);border:1px solid #86efac;}
.result-pill.lose{background:#fee2e2;color:var(--red);border:1px solid #fca5a5;}
.result-pill.draw{background:var(--cream2);color:var(--ink3);border:1px solid var(--border2);}
.col-sgf{display:flex;justify-content:center;}
.sgf-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);
  background:transparent;cursor:pointer;font-size:11px;font-family:inherit;
  color:var(--ink3);font-weight:600;transition:all .15s;white-space:nowrap;text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;}
.sgf-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-bg);}

/* ── RESULT DETAIL ── */
.score-sub{font-size:10px;color:var(--ink3);margin-top:1px;font-family:'DM Mono',monospace;}

/* ── EMPTY / LOADING ── */
.empty-state{padding:70px 30px;text-align:center;color:var(--ink3);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-txt{font-size:14px;}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);
  border-top-color:var(--teal);animation:spin .8s linear infinite;margin:60px auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:20px;flex-wrap:wrap;}
.page-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--white);cursor:pointer;font-size:13px;font-family:inherit;
  color:var(--ink3);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.page-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal);}
.page-btn.active{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:700;}
.page-btn:disabled{opacity:.3;cursor:not-allowed;}
.page-info{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;}

/* ── REPLAY MODAL ── */
.gt-row{cursor:pointer;}
.replay-overlay{display:none;position:fixed;inset:0;z-index:300;
  background:rgba(28,20,9,.55);backdrop-filter:blur(3px);
  align-items:center;justify-content:center;padding:18px;}
.replay-overlay.open{display:flex;}
.replay-box{background:linear-gradient(90deg,#ead8af,#f4e5c1,#e4cc9d);border:2px solid #8f693a;border-radius:10px;max-width:600px;width:100%;
  max-height:92vh;overflow:auto;padding:18px;position:relative;box-shadow:0 0 0 4px rgba(35,20,9,.75),0 24px 60px rgba(0,0,0,.5);}
.replay-close{position:absolute;top:10px;right:12px;border:none;background:none;
  font-size:20px;cursor:pointer;color:var(--ink3);z-index:5;}
.replay-title{font-size:14px;font-weight:600;margin-bottom:10px;padding-right:30px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:9px 18px;border-radius:10px;
  font-size:13px;z-index:500;opacity:0;pointer-events:none;
  transition:opacity .25s;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
<script src="/pwa.js"></script>
</head>
<body>
<header class="cg-nav"><div></div></header>

<div class="page">
  <div class="page-header">
    <div class="page-kicker" data-i18n="gm.kicker">歷戰卷軸庫</div>
    <h1 class="page-title" data-i18n="gm.h1">棋戰卷軸</h1>
    <p class="page-sub" id="page-sub" data-i18n="gm.loading">載入中…</p>
  </div>

  <!-- 統計摘要 -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-val" id="st-total">—</div>
      <div class="stat-lbl" data-i18n="gm.stat.total">收錄對局</div>
    </div>
    <div class="stat-card win">
      <div class="stat-val" id="st-wins">—</div>
      <div class="stat-lbl" data-i18n="gm.stat.wins">凱旋</div>
    </div>
    <div class="stat-card lose">
      <div class="stat-val" id="st-loses">—</div>
      <div class="stat-lbl" data-i18n="gm.stat.loses">敗陣</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="st-rate">—</div>
      <div class="stat-lbl" data-i18n="gm.stat.rate">勝率</div>
    </div>
  </div>

  <!-- 篩選列 -->
  <div class="filter-bar">
    <button class="filter-btn sel" data-filter="all" data-i18n="gm.filter.all">全部卷軸</button>
    <button class="filter-btn" data-filter="win" data-i18n="gm.filter.win">凱旋</button>
    <button class="filter-btn" data-filter="lose" data-i18n="gm.filter.lose">敗陣</button>
    <button class="filter-btn" data-filter="score" data-i18n="gm.filter.score">數子決勝</button>
    <div class="filter-spacer"></div>
    <input class="search-inp" type="text" id="search-inp" data-i18n-placeholder="gm.searchPh" placeholder="搜尋卷軸中的對手…">
  </div>

  <!-- 對局列表 -->
  <div class="game-table" id="game-table">
    <div class="gt-head">
      <span data-i18n="gm.col.date">日期</span>
      <span data-i18n="gm.col.opp">對手</span>
      <span data-i18n="gm.col.color">執色</span>
      <span style="text-align:right" data-i18n="gm.col.moves">手合</span>
      <span class="col-board" style="text-align:center" data-i18n="gm.col.board">棋盤</span>
      <span style="text-align:center" data-i18n="gm.col.result">勝負</span>
      <span style="text-align:center" data-i18n="gm.col.sgf">棋譜</span>
    </div>
    <div id="game-rows"><div class="spinner"></div></div>
  </div>

  <!-- 分頁 -->
  <div class="pagination" id="pagination"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 棋譜播放彈窗 -->
<div class="replay-overlay" id="replay-overlay">
  <div class="replay-box">
    <button class="replay-close" onclick="closeReplay()">&#10005;</button>
    <div class="replay-title" id="replay-title"></div>
    <div id="replay-player"></div>
    <div style="margin-top:12px;text-align:right;">
      <a id="replay-dl" class="sgf-btn" href="#" download>&#11015; SGF</a>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════
//  STATE
// ════════════════════════════════
let allGames   = [];   // 當頁全量（從 API 來）
let filtered   = [];   // 篩選後
let curFilter  = 'all';
let curSearch  = '';
let curPage    = 1;
const LIMIT    = 20;
let totalCount = 0;

const REASON_LK = { resign:'gm.reason.resign', score:'gm.reason.score', timeout:'gm.reason.timeout', disconnect:'gm.reason.disconnect', double_pass:'gm.reason.double_pass' };
function reasonLabel(r){ return REASON_LK[r] ? I18n.t(REASON_LK[r]) : r; }

// ════════════════════════════════
//  UTILS
// ════════════════════════════════
let _toastT;
function toast(msg, ms=2400){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('show'),ms);
}

function fmtDate(iso){
  if(!iso)return '—';
  const d=new Date(iso.replace('T',' ').replace(/-/g,'/'));
  if(isNaN(d))return iso.slice(0,10);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtScore(g){
  if(g.reason!=='score'||g.black_score==null)return '';
  const b=Number(g.black_score).toFixed(1),w=Number(g.white_score).toFixed(1);
  return I18n.t('gm.score').replace('{b}', b).replace('{w}', w);
}

// ════════════════════════════════
//  LOAD
// ════════════════════════════════
async function loadGames(page=1){
  curPage=page;
  document.getElementById('game-rows').innerHTML='<div class="spinner"></div>';
  try{
    const r=await fetch(`/api/game-records?page=${page}`,{credentials:'include'});
    if(!r.ok){
      if(r.status===401){location.href='/login';return;}
      throw new Error(r.status);
    }
    const data=await r.json();
    allGames=data.games||[];
    totalCount=data.total||0;
    updateStats();
    applyFilter();
  }catch(e){
    document.getElementById('game-rows').innerHTML=
      `<div class="empty-state"><div class="empty-icon">⚠️</div><p class="empty-txt">${I18n.t('gm.loadFail')}</p></div>`;
  }
}

// ════════════════════════════════
//  STATS（全量 summary API）
// ════════════════════════════════
async function loadSummary(){
  try{
    const r=await fetch('/api/game-records/summary',{credentials:'include'});
    if(!r.ok)return;
    const d=await r.json();
    document.getElementById('st-total').textContent=d.total??'—';
    document.getElementById('st-wins').textContent=d.wins??'—';
    document.getElementById('st-loses').textContent=d.loses??'—';
    document.getElementById('st-rate').textContent=d.total?d.rate+'%':'—';
  }catch(e){}
}
function updateStats(){
  document.getElementById('page-sub').textContent=I18n.t('gm.totalGames').replace('{n}', totalCount);
}

// ════════════════════════════════
//  FILTER + RENDER
// ════════════════════════════════
function applyFilter(){
  filtered=allGames.filter(g=>{
    const matchFilter=
      curFilter==='all'   ? true :
      curFilter==='win'   ? g.result===1 :
      curFilter==='lose'  ? g.result===0 :
      curFilter==='score' ? g.reason==='score' : true;
    const matchSearch=!curSearch||
      (g.opponent_name||'').toLowerCase().includes(curSearch.toLowerCase());
    return matchFilter&&matchSearch;
  });
  renderRows(filtered);
  renderPagination();
}

function renderRows(games){
  const container=document.getElementById('game-rows');
  if(!games.length){
    container.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🀄</div>
      <p class="empty-txt">${I18n.t('gm.noGames')}</p>
    </div>`;
    return;
  }
  container.innerHTML=games.map(g=>{
    const isWin=g.result===1;
    const dateStr=fmtDate(g.played_at);
    const colorLabel=g.my_color==='black'?I18n.t('gm.black'):I18n.t('gm.white');
    const stoneClass=g.my_color==='black'?'b':'w';
    const reasonLbl=reasonLabel(g.reason);
    const scoreStr=fmtScore(g);
    const resultHtml=isWin
      ?`<div class="result-pill win">${I18n.t('gm.win')} <span style="font-size:10px;opacity:.7">${reasonLbl}</span></div>`
      :`<div class="result-pill lose">${I18n.t('gm.lose')} <span style="font-size:10px;opacity:.7">${reasonLbl}</span></div>`;
    const scoreHtml=scoreStr?`<div class="score-sub">${scoreStr}</div>`:'';
    return `<div class="gt-row" onclick="openReplay(${g.id})">
      <span class="col-date" title="${g.played_at||''}">${dateStr}</span>
      <span class="col-opp" title="${esc(g.opponent_name)}">${esc(g.opponent_name)||'—'}</span>
      <span class="col-color"><span class="stone ${stoneClass}"></span>${colorLabel}</span>
      <span class="col-moves">${g.move_count??'—'}</span>
      <span class="col-board">${g.board_size??19}×${g.board_size??19}</span>
      <div class="col-result">${resultHtml}${scoreHtml}</div>
      <div class="col-sgf">
        <a class="sgf-btn" href="/api/game-records/${g.id}/sgf" download title="${I18n.t('gm.sgfTitle')}"
           onclick="event.stopPropagation()">
          ⬇ SGF
        </a>
      </div>
    </div>`;
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ════════════════════════════════
//  PAGINATION（server-side）
// ════════════════════════════════
function renderPagination(){
  const totalPages=Math.ceil(totalCount/LIMIT)||1;
  const pg=document.getElementById('pagination');
  if(totalPages<=1){pg.innerHTML='';return;}
  let html='';
  html+=`<button class="page-btn" id="pg-prev" ${curPage<=1?'disabled':''}>‹</button>`;
  // 顯示最多 7 個頁碼
  const start=Math.max(1,curPage-3),end=Math.min(totalPages,curPage+3);
  if(start>1) html+=`<button class="page-btn" data-pg="1">1</button>${start>2?'<span class="page-info">…</span>':''}`;
  for(let p=start;p<=end;p++){
    html+=`<button class="page-btn${p===curPage?' active':''}" data-pg="${p}">${p}</button>`;
  }
  if(end<totalPages) html+=`${end<totalPages-1?'<span class="page-info">…</span>':''}<button class="page-btn" data-pg="${totalPages}">${totalPages}</button>`;
  html+=`<button class="page-btn" id="pg-next" ${curPage>=totalPages?'disabled':''}>›</button>`;
  pg.innerHTML=html;
  pg.querySelectorAll('[data-pg]').forEach(b=>{
    b.addEventListener('click',()=>loadGames(+b.dataset.pg));
  });
  document.getElementById('pg-prev')?.addEventListener('click',()=>{ if(curPage>1)loadGames(curPage-1); });
  document.getElementById('pg-next')?.addEventListener('click',()=>{ if(curPage<totalPages)loadGames(curPage+1); });
}

// ════════════════════════════════
//  EVENTS
// ════════════════════════════════
document.querySelectorAll('[data-filter]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    curFilter=btn.dataset.filter;
    document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    applyFilter();
  });
});

let _searchT;
document.getElementById('search-inp').addEventListener('input',e=>{
  clearTimeout(_searchT);
  _searchT=setTimeout(()=>{curSearch=e.target.value;applyFilter();},250);
});

// ════════════════════════════════
//  REPLAY（棋譜播放彈窗）
// ════════════════════════════════
let _wgoReady=null;
function ensureWgo(){
  if(_wgoReady)return _wgoReady;
  _wgoReady=new Promise((resolve,reject)=>{
    const css=document.createElement('link');
    css.rel='stylesheet';css.href='/wgo/wgo.player.css';
    document.head.appendChild(css);
    const s1=document.createElement('script');
    s1.src='/wgo/wgo.min.js?v=20260514k';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='/wgo/wgo.player.min.js?v=1';
      s2.onload=resolve;s2.onerror=reject;
      document.head.appendChild(s2);
    };
    s1.onerror=reject;
    document.head.appendChild(s1);
  });
  return _wgoReady;
}

async function openReplay(rid){
  const g=allGames.find(x=>x.id===rid);
  const overlay=document.getElementById('replay-overlay');
  const holder=document.getElementById('replay-player');
  overlay.classList.add('open');
  holder.innerHTML='<div class="spinner"></div>';
  document.getElementById('replay-title').textContent=
    g?`${g.my_color==='black'?'●':'○'} vs ${g.opponent_name||'—'} · ${g.board_size??19}×${g.board_size??19} · ${fmtDate(g.played_at)}`:'';
  document.getElementById('replay-dl').href=`/api/game-records/${rid}/sgf`;
  try{
    const [sgf]=await Promise.all([
      fetch(`/api/game-records/${rid}/sgf`,{credentials:'include'})
        .then(r=>{if(!r.ok)throw new Error('sgf fetch failed');return r.text();}),
      ensureWgo(),
    ]);
    holder.innerHTML='';
    new WGo.BasicPlayer(holder,{sgf:sgf});
  }catch(e){
    holder.innerHTML=`<div class="empty-state"><div class="empty-icon">📕</div><p class="empty-txt">${I18n.t('gm.loadFail')}</p></div>`;
  }
}
function closeReplay(){
  document.getElementById('replay-overlay').classList.remove('open');
  document.getElementById('replay-player').innerHTML='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeReplay();});
document.getElementById('replay-overlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget)closeReplay();
});
