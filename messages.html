<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title data-i18n="dm.page.title">密語驛站 | 弈境奇兵 (Go Odyssey)</title>
<script src="/i18n.js?v=20260710a"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#f9ead1;--muted:#c0aa86;--panel:rgba(38,25,14,.96);--line:rgba(226,183,94,.3);--gold:#f3c969;--red:#dc2626}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(rgba(14,8,4,.82),rgba(14,8,4,.92)),url('/assets/hero/hero_bg.webp') center top/cover fixed;color:var(--ink);font-family:'DM Sans',system-ui,sans-serif}body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 10%,rgba(245,190,80,.14),transparent 46%),repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 4px)}
    button,input,textarea{font:inherit}.page{position:relative;max-width:1180px;margin:0 auto;padding:24px 18px 90px}.title-row{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:8px 0 18px}.title-row h1{margin:0;font:700 38px/1 'Cormorant Garamond',serif;color:var(--gold);text-shadow:0 3px 12px #000}.title-row p{margin:7px 0 0;color:var(--muted)}.page-kicker{margin-bottom:5px;color:#d49c45;font-size:10px;font-weight:800;letter-spacing:2.8px}
    .dm-shell{position:relative;height:min(720px,calc(100vh - 195px));min-height:520px;display:grid;grid-template-columns:340px 1fr;border:2px solid #8d6028;border-radius:14px;overflow:hidden;background:var(--panel);box-shadow:0 0 0 4px rgba(35,20,9,.85),0 0 0 5px rgba(226,183,94,.24),0 24px 60px rgba(0,0,0,.55),inset 0 0 45px rgba(0,0,0,.28)}
    .safety-modal{position:fixed;inset:0;z-index:600;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.72)}.safety-modal.open{display:flex}.safety-card{width:min(560px,100%);max-height:85vh;overflow:auto;padding:22px;border-radius:16px;background:#21170f;border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.5)}.safety-card h2{margin:0 0 12px}.safety-card ul{padding-left:22px;color:#dbc9aa;line-height:1.7}.safety-card .actions{text-align:right;margin-top:16px}
    .threads{border-right:2px solid #6e471f;display:flex;flex-direction:column;min-width:0;background:linear-gradient(90deg,rgba(59,36,18,.96),rgba(39,25,14,.94))}.panel-head{padding:15px 16px;border-bottom:1px solid var(--line);font:700 19px 'Cormorant Garamond',serif;color:var(--gold);letter-spacing:1px;background:linear-gradient(180deg,rgba(123,76,28,.36),rgba(40,25,13,.1))}.thread-list{overflow:auto;flex:1}.thread{width:100%;border:0;border-bottom:1px solid rgba(217,170,85,.14);background:transparent;color:inherit;text-align:left;padding:12px;display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:center;cursor:pointer}.thread:hover,.thread.active{background:linear-gradient(90deg,rgba(202,139,45,.18),rgba(251,191,36,.05));box-shadow:inset 3px 0 #d6a84f}.thread-main{min-width:0}.thread-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.thread-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}.thread-meta{text-align:right;font-size:11px;color:var(--muted)}.unread{display:inline-flex;min-width:18px;height:18px;padding:0 5px;border-radius:99px;background:#b91c1c;color:white;align-items:center;justify-content:center;font-size:10px;font-weight:800;margin-top:5px;box-shadow:0 0 0 2px #3b2514}.empty{padding:32px 18px;text-align:center;color:var(--muted)}
    .avatar{position:relative;width:48px;height:48px;border-radius:13px;background:rgba(251,191,36,.08);overflow:hidden;border:1px solid var(--line)}.avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}.avatar .base{z-index:2}.avatar .aura{z-index:1}.avatar .cape{z-index:3}.avatar .armor{z-index:4}.avatar .offhand{z-index:5}.avatar .weapon{z-index:6}.avatar .hat{z-index:7}.avatar .pet{z-index:8}
    .chat{display:flex;flex-direction:column;min-width:0;background:radial-gradient(circle at 50% 35%,rgba(115,76,34,.16),transparent 58%)}.chat-empty{margin:auto;padding:30px;text-align:center;color:var(--muted);font:600 21px/1.5 'Cormorant Garamond',serif}.chat-empty::before{content:'✦';display:block;color:#a97831;font-size:27px;margin-bottom:8px}.chat-head{display:none;padding:11px 14px;border-bottom:1px solid var(--line);align-items:center;gap:10px;background:linear-gradient(180deg,rgba(100,62,24,.32),rgba(32,20,11,.08))}.chat-head.show{display:flex}.chat-head .info{min-width:0;flex:1}.chat-head strong{display:block;color:#f5d98e}.chat-head small{color:var(--muted)}.head-actions{display:flex;gap:7px}.btn{border:1px solid #8d642e;background:linear-gradient(180deg,rgba(115,75,30,.38),rgba(47,29,14,.55));color:var(--ink);border-radius:8px;padding:8px 11px;cursor:pointer;box-shadow:inset 0 1px rgba(255,255,255,.06)}.btn:hover{border-color:#d8ad57}.btn.primary{background:linear-gradient(180deg,#c28a32,#87551d);border-color:#e1b85e;color:#fff8df;font-weight:800}.btn.danger{color:#fecaca;border-color:rgba(220,38,38,.55)}.btn:disabled{opacity:.45;cursor:not-allowed}
    .message-wrap{display:none;flex:1;min-height:0;overflow:auto;padding:16px}.message-wrap.show{display:block}.load-old{display:block;margin:0 auto 14px}.message-row{display:flex;margin:7px 0;align-items:end;gap:6px}.message-row.mine{justify-content:flex-end}.bubble{max-width:min(72%,600px);padding:10px 13px;border-radius:10px 10px 10px 3px;background:linear-gradient(145deg,#4b3521,#352417);border:1px solid #765127;white-space:pre-wrap;overflow-wrap:anywhere;line-height:1.45;box-shadow:0 3px 8px rgba(0,0,0,.22)}.mine .bubble{background:linear-gradient(145deg,#9c6925,#714315);border-color:#c9953d;border-radius:10px 10px 3px 10px}.bubble.muted{background:rgba(255,255,255,.04);color:var(--muted);font-style:italic}.msg-time{font-size:10px;color:#d0b991;margin-top:4px}.report-btn{border:0;background:transparent;color:#d6b98d;font-size:11px;cursor:pointer;padding:3px}.composer{display:none;border-top:1px solid var(--line);padding:12px;gap:10px;align-items:end;background:rgba(30,18,9,.62)}.composer.show{display:flex}.composer textarea{flex:1;resize:none;min-height:44px;max-height:120px;border:1px solid #8b622d;border-radius:8px;background:rgba(12,8,4,.48);color:var(--ink);padding:10px 12px;outline:none}.composer textarea:focus{border-color:#e0b85e;box-shadow:0 0 0 2px rgba(224,184,94,.12)}.compose-meta{font-size:11px;color:var(--muted);text-align:right}.notice{padding:8px 12px;background:rgba(220,38,38,.12);color:#fecaca;border-bottom:1px solid rgba(220,38,38,.25);display:none;font-size:13px}.notice.show{display:block}.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);opacity:0;background:#1f1710;border:1px solid var(--line);padding:10px 15px;border-radius:10px;transition:.2s;z-index:500}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.mobile-back{display:none}
    @media(max-width:768px){.page{padding:12px 10px 76px}.title-row{margin:4px 0 12px}.title-row h1{font-size:30px}.title-row p{display:none}.dm-shell{display:block;height:calc(100vh - 170px);height:calc(100dvh - 170px);min-height:0}.threads,.chat{height:100%}.dm-shell.chat-open .threads{display:none}.dm-shell:not(.chat-open) .chat{display:none}.mobile-back{display:inline-flex}.bubble{max-width:84%}.head-actions .label{display:none}}
  </style>
</head>
<body>
  <header class="cg-nav"><div></div></header>
  <main class="page">
    <div class="title-row"><div><div class="page-kicker" data-i18n="dm.kicker">冒險者傳信所</div><h1 data-i18n="dm.heading">密語驛站</h1><p data-i18n="dm.subtitle">在驛站與同行好友交換密語；遇到不舒服的內容可以封鎖或檢舉。</p></div><button id="safety-btn" class="btn" type="button" data-i18n="dm.safety.open">安全提醒</button></div>
    <section class="dm-shell" id="dm-shell">
      <aside class="threads"><div class="panel-head" data-i18n="dm.threads">密語名冊</div><div id="thread-list" class="thread-list"><div class="empty" data-i18n="dm.loading">載入中...</div></div></aside>
      <section class="chat">
        <div id="chat-empty" class="chat-empty" data-i18n="dm.choose">從名冊選一位同行者，展開密語卷</div>
        <div id="chat-head" class="chat-head">
          <button id="back-btn" class="btn mobile-back" type="button" aria-label="返回" data-i18n-aria-label="dm.back.aria">‹</button>
          <div id="chat-avatar"></div><div class="info"><strong id="chat-name"></strong><small id="chat-status"></small></div>
          <div class="head-actions"><button id="block-btn" class="btn danger" type="button"><span class="label" data-i18n="dm.block">封鎖</span></button></div>
        </div>
        <div id="notice" class="notice"></div>
        <div id="message-wrap" class="message-wrap"><button id="load-old" class="btn load-old" type="button" data-i18n="dm.loadOlder">翻閱更早密語</button><div id="messages"></div></div>
        <form id="composer" class="composer"><div style="flex:1"><textarea id="message-input" rows="1" data-i18n-placeholder="dm.placeholder" placeholder="寫下密語..."></textarea><div class="compose-meta"><span id="char-count">0</span>/500</div></div><button id="send-btn" class="btn primary" type="submit" data-i18n="dm.send">封緘送出</button></form>
      </section>
    </section>
  </main>
  <div id="safety-modal" class="safety-modal" role="dialog" aria-modal="true" aria-labelledby="safety-title">
    <div class="safety-card">
      <h2 id="safety-title" data-i18n="dm.safety.title">密語驛站安全與家長提醒</h2>
      <ul>
        <li data-i18n="dm.safety.friend">私訊只開放給已成為好友的使用者。</li>
        <li data-i18n="dm.safety.personal">請勿傳送真實姓名、電話、地址、學校、密碼或其他個人資料。</li>
        <li data-i18n="dm.safety.report">遇到讓人不舒服的內容，請立即封鎖並檢舉；管理員只會在處理檢舉時查看必要的訊息上下文。</li>
        <li data-i18n="dm.safety.retention">一般訊息保存 180 天；仍在處理中的檢舉訊息會保留到案件結束。</li>
        <li data-i18n="dm.safety.parent">建議家長第一次陪同孩子使用，並提醒孩子不要透露個人資料。</li>
      </ul>
      <div class="actions"><button id="safety-close" class="btn primary" type="button" data-i18n="dm.safety.close">我知道了</button></div>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="/sound.js?v=2"></script>
  <script src="/site-nav.js?v=20260625presence1"></script>
  <script src="/mobile-nav.js?v=20260621rpg1"></script>
  <script>
  (() => {
    'use strict';
    const $ = id => document.getElementById(id);
    const state = { threads: [], meta: null, messages: new Map(), beforeId: null, afterId: null, hasMore: false, poll: null, listPoll: null };
    const CHARACTER_ART = {apprentice:'chibi_apprentice_normalized.webp',apprentice_girl:'chibi_apprentice_girl_normalized.webp',swordsman:'chibi_swordsman_normalized.webp',rogue:'chibi_rogue_normalized.webp',ranger:'chibi_ranger_normalized.webp',berserker:'chibi_berserker_normalized.webp',guardian:'chibi_guardian_normalized.webp',paladin:'chibi_paladin_normalized.webp',mage:'chibi_mage_normalized.webp',sage:'chibi_sage_normalized.webp'};
    const LAYERS = [['combat_aura','/assets/hero/accessories/','aura'],['combat_cape','/assets/hero/gear_v2/','cape'],['combat_armor','/assets/hero/gear_v2/','armor'],['combat_offhand','/assets/hero/gear_v2/','offhand'],['combat_weapon','/assets/hero/gear_v2/','weapon'],['combat_hat','/assets/hero/accessories/','hat'],['combat_pet','/assets/hero/accessories/','pet']];
    const t = key => (typeof I18n !== 'undefined' && I18n.t(key)) || key;
    function toast(message){$('toast').textContent=message;$('toast').classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>$('toast').classList.remove('show'),2500)}
    async function api(url, options={}){const response=await fetch(url,{credentials:'include',cache:'no-store',...options});if(response.status===401){location.href='/login';throw new Error('login required')}const data=await response.json().catch(()=>({}));if(!response.ok||data.error)throw new Error(data.error||`HTTP ${response.status}`);return data}
    const post=(url,body)=>api(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    function avatar(data){const box=document.createElement('span');box.className='avatar';const add=(src,cls)=>{const img=document.createElement('img');img.src=src;img.alt='';img.loading='lazy';img.className=cls;box.appendChild(img)};const art=CHARACTER_ART[data.character_key]||CHARACTER_ART.apprentice;add('/assets/hero/characters/'+art,'base');for(const [field,root,cls] of LAYERS){const value=data[field];if(value&&value!=='none'&&value!=='cloth')add(root+value+'.webp',cls)}return box}
    function relTime(iso){if(!iso)return'';const d=new Date(iso),diff=Math.max(0,Date.now()-d.getTime()),m=Math.floor(diff/60000);if(m<1)return t('dm.now');if(m<60)return m+t('dm.minutes');const h=Math.floor(m/60);if(h<24)return h+t('dm.hours');return d.toLocaleDateString()}
    function renderThreads(){const list=$('thread-list');list.replaceChildren();if(!state.threads.length){const empty=document.createElement('div');empty.className='empty';empty.textContent=t('dm.noThreads');list.appendChild(empty);return}for(const thread of state.threads){const button=document.createElement('button');button.type='button';button.className='thread'+(state.meta&&state.meta.username===thread.username?' active':'');button.appendChild(avatar(thread));const main=document.createElement('div');main.className='thread-main';const name=document.createElement('div');name.className='thread-name';name.textContent=thread.display_name||thread.username;const preview=document.createElement('div');preview.className='thread-preview';preview.textContent=thread.last_preview||t('dm.noMessages');main.append(name,preview);const meta=document.createElement('div');meta.className='thread-meta';meta.append(document.createTextNode(relTime(thread.last_at)));if(thread.unread_count){const badge=document.createElement('span');badge.className='unread';badge.textContent=thread.unread_count>99?'99+':thread.unread_count;meta.append(document.createElement('br'),badge)}button.append(main,meta);button.addEventListener('click',()=>openUser(thread.username));list.appendChild(button)}}
    async function loadThreads(){try{const data=await api('/api/dm/threads');state.threads=data.threads||[];renderThreads()}catch(error){toast(error.message)}}
    async function openUser(username){try{const meta=await api('/api/dm/thread/'+encodeURIComponent(username));state.meta=meta;state.messages.clear();state.beforeId=null;state.afterId=null;state.hasMore=false;$('dm-shell').classList.add('chat-open');$('chat-empty').style.display='none';$('chat-head').classList.add('show');$('message-wrap').classList.add('show');$('composer').classList.add('show');$('chat-avatar').replaceChildren(avatar(meta));$('chat-name').textContent=meta.display_name||meta.username;updateStateControls();$('messages').replaceChildren();if(meta.thread_id)await loadMessages(true);else renderMessages();renderThreads()}catch(error){toast(error.message)}}
    function updateStateControls(){const meta=state.meta;if(!meta)return;const blocked=meta.blocked_by_me||meta.blocked_by_them||!meta.is_friend;$('composer').classList.toggle('show',!blocked);$('block-btn').textContent=meta.blocked_by_me?t('dm.unblock'):t('dm.block');$('chat-status').textContent=meta.can_send?t('dm.friendOnly'):t('dm.readOnly');$('notice').classList.toggle('show',blocked);$('notice').textContent=meta.blocked_by_me?t('dm.blockedByMe'):(meta.blocked_by_them?t('dm.blockedByThem'):(!meta.is_friend?t('dm.notFriends'):''))}
    async function loadMessages(reset=false){if(!state.meta||!state.meta.thread_id)return;const query=new URLSearchParams({thread_id:state.meta.thread_id,limit:30});if(!reset&&state.beforeId)query.set('before_id',state.beforeId);try{const data=await api('/api/dm/messages?'+query);for(const message of data.messages||[])state.messages.set(message.id,message);const ids=[...state.messages.keys()].sort((a,b)=>a-b);state.beforeId=ids[0]||null;state.afterId=ids.at(-1)||null;state.hasMore=!!data.has_more;renderMessages();await markRead()}catch(error){toast(error.message)}}
    async function pollMessages(){if(document.hidden||!state.meta||!state.meta.thread_id||!state.afterId)return;try{const query=new URLSearchParams({thread_id:state.meta.thread_id,after_id:state.afterId,limit:100});const data=await api('/api/dm/messages?'+query);const incoming=(data.messages||[]).filter(message=>!state.messages.has(message.id));for(const message of incoming)state.messages.set(message.id,message);if(incoming.length){state.afterId=Math.max(...state.messages.keys());renderMessages(true);await markRead();if(incoming.some(m=>!m.is_mine)&&window.SFX)SFX.play('hint')}}catch(error){}}
    function renderMessages(scrollBottom=false){const box=$('messages');const wasNearBottom=$('message-wrap').scrollHeight-$('message-wrap').scrollTop-$('message-wrap').clientHeight<80;box.replaceChildren();const messages=[...state.messages.values()].sort((a,b)=>a.id-b.id);if(!messages.length){const empty=document.createElement('div');empty.className='empty';empty.textContent=t('dm.noMessages');box.appendChild(empty)}for(const message of messages){const row=document.createElement('div');row.className='message-row'+(message.is_mine?' mine':'');if(!message.is_mine&&!message.is_deleted&&!message.is_reported){const report=document.createElement('button');report.className='report-btn';report.type='button';report.textContent=t('dm.report');report.addEventListener('click',()=>reportMessage(message.id));row.appendChild(report)}const bubble=document.createElement('div');bubble.className='bubble'+(message.is_deleted||message.is_reported?' muted':'');const content=document.createElement('div');content.textContent=message.is_deleted?t('dm.deleted'):(message.is_reported?t('dm.reportedHidden'):message.body);const time=document.createElement('div');time.className='msg-time';time.textContent=new Date(message.created_at).toLocaleString();bubble.append(content,time);row.appendChild(bubble);box.appendChild(row)}$('load-old').style.display=state.hasMore?'block':'none';if(scrollBottom||wasNearBottom)setTimeout(()=>{$('message-wrap').scrollTop=$('message-wrap').scrollHeight},0)}
    async function markRead(){if(!state.meta||!state.meta.thread_id||!state.afterId)return;try{await post('/api/dm/read',{thread_id:state.meta.thread_id,up_to_msg_id:state.afterId});window.dispatchEvent(new Event('dm:read'));loadThreads()}catch(error){}}
    async function send(event){event.preventDefault();const input=$('message-input'),text=input.value.trim();if(!text||!state.meta)return;try{const body={text};if(state.meta.thread_id)body.thread_id=state.meta.thread_id;else body.username=state.meta.username;const data=await post('/api/dm/send',body);state.meta.thread_id=data.thread_id;state.messages.set(data.message.id,data.message);state.afterId=data.message.id;state.beforeId=state.beforeId||data.message.id;input.value='';updateCount();renderMessages(true);if(window.SFX)SFX.play('next');loadThreads()}catch(error){toast(error.message)}}
    async function reportMessage(id){const reason=prompt(t('dm.reportPrompt'));if(reason===null)return;try{await post('/api/dm/report',{message_id:id,reason});const message=state.messages.get(id);if(message){message.is_reported=true;message.body=''}renderMessages();toast(t('dm.reportDone'))}catch(error){toast(error.message)}}
    async function toggleBlock(){if(!state.meta)return;const unblock=state.meta.blocked_by_me;if(!unblock&&!confirm(t('dm.blockConfirm')))return;try{await post(unblock?'/api/dm/unblock':'/api/dm/block',{username:state.meta.username});state.meta.blocked_by_me=!unblock;state.meta.blocked=state.meta.blocked_by_me||state.meta.blocked_by_them;state.meta.can_send=state.meta.is_friend&&!state.meta.blocked;updateStateControls();loadThreads()}catch(error){toast(error.message)}}
    function updateCount(){const count=Array.from($('message-input').value).length;$('char-count').textContent=count;$('send-btn').disabled=count===0||count>500}
    function closeMobile(){ $('dm-shell').classList.remove('chat-open') }
    function openSafety(){ $('safety-modal').classList.add('open') }
    function closeSafety(){ $('safety-modal').classList.remove('open');localStorage.setItem('dm_safety_notice_v1','1') }
    async function init(){if(typeof I18n!=='undefined'){I18n.apply();document.documentElement.lang=I18n.getLang()==='en'?'en':'zh-Hant'}$('composer').addEventListener('submit',send);$('message-input').addEventListener('input',updateCount);$('message-input').addEventListener('keydown',event=>{if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();$('composer').requestSubmit()}});$('load-old').addEventListener('click',()=>loadMessages(false));$('block-btn').addEventListener('click',toggleBlock);$('back-btn').addEventListener('click',closeMobile);$('safety-btn').addEventListener('click',openSafety);$('safety-close').addEventListener('click',closeSafety);$('safety-modal').addEventListener('click',event=>{if(event.target===$('safety-modal'))closeSafety()});if(localStorage.getItem('dm_safety_notice_v1')!=='1')openSafety();await loadThreads();const username=new URLSearchParams(location.search).get('u');if(username)await openUser(username);state.poll=setInterval(pollMessages,4000);state.listPoll=setInterval(()=>{if(!document.hidden)loadThreads()},10000);document.addEventListener('visibilitychange',()=>{if(!document.hidden){loadThreads();pollMessages()}})}
    const previousLangChange=window.onLangChange;
    window.onLangChange=function(lang){if(typeof previousLangChange==='function')previousLangChange(lang);renderThreads();if(state.meta)updateStateControls();renderMessages()};
    document.addEventListener('DOMContentLoaded',init);
  })();
  </script>
</body>
</html>
