<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>用戶管理 — Colorful Go</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/i18n.js?v=20260513"></script>
<style>
.fade-in { animation: fadeIn .3s ease both; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-4">
        <h1 class="text-lg font-black tracking-widest text-amber-400 uppercase">👑 用戶管理</h1>
        <span class="text-xs font-mono text-slate-500 bg-slate-700 px-2 py-0.5 rounded" data-i18n="admin.admin_only">管理員專用</span>
    </div>
    <div class="flex items-center gap-3">
        <div id="lang-switcher-admin" style="display:flex;align-items:center;"></div>
        <span id="current-user" class="text-xs text-slate-500 font-mono"></span>
        <a href="/admin/shadow-dashboard" class="text-xs text-slate-500 hover:text-sky-300 transition px-3 py-1.5 border border-slate-600 hover:border-sky-400 rounded-lg">Shadow Dashboard</a>
        <a href="/" class="text-xs text-slate-500 hover:text-amber-400 transition px-3 py-1.5 border border-slate-600 hover:border-amber-400 rounded-lg" data-i18n="admin.back">← 回練習頁</a>
        <button onclick="doLogout()" class="text-xs text-slate-500 hover:text-red-400 transition px-3 py-1.5 border border-slate-600 hover:border-red-600 rounded-lg" data-i18n="nav.logout">登出</button>
    </div>
</header>

<div class="flex-1 p-6 max-w-5xl mx-auto w-full space-y-6">

    <!-- 統計 -->
    <div class="grid grid-cols-3 gap-4">
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 text-center">
            <div id="stat-users" class="text-3xl font-black text-teal-400">—</div>
            <div class="text-xs text-slate-500 mt-1">總用戶數</div>
        </div>
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 text-center">
            <div id="stat-admins" class="text-3xl font-black text-amber-400">—</div>
            <div class="text-xs text-slate-500 mt-1">管理員數</div>
        </div>
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 text-center">
            <div id="stat-active" class="text-3xl font-black text-green-400">—</div>
            <div class="text-xs text-slate-500 mt-1">曾登入用戶</div>
        </div>
    </div>

    <!-- 新增用戶 -->
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
        <h2 class="font-bold text-sm text-slate-300 mb-4 uppercase tracking-widest">＋ 新增用戶</h2>
        <div class="flex gap-3 flex-wrap items-end">
            <div>
                <label class="block text-xs text-slate-500 mb-1">帳號</label>
                <input id="new-username" type="text" placeholder="帳號名稱"
                    class="bg-slate-700 border border-slate-600 focus:border-teal-400 outline-none text-slate-100 text-sm px-3 py-2 rounded-lg w-44">
            </div>
            <div>
                <label class="block text-xs text-slate-500 mb-1">密碼（至少 6 字元）</label>
                <input id="new-password" type="password" placeholder="初始密碼"
                    class="bg-slate-700 border border-slate-600 focus:border-teal-400 outline-none text-slate-100 text-sm px-3 py-2 rounded-lg w-44">
            </div>
            <div class="flex items-center gap-2 pb-0.5">
                <input id="new-is-admin" type="checkbox" class="w-4 h-4 accent-amber-400">
                <label for="new-is-admin" class="text-sm text-slate-400 select-none">設為管理員</label>
            </div>
            <div>
                <label class="block text-xs text-slate-500 mb-1">方案</label>
                <select id="new-plan"
                    class="bg-slate-700 border border-slate-600 focus:border-teal-400 outline-none text-slate-100 text-sm px-3 py-2 rounded-lg">
                    <option value="free">免費</option>
                    <option value="premium">Premium</option>
                </select>
            </div>
            <button onclick="createUser()"
                class="bg-teal-600 hover:bg-teal-500 text-white font-bold text-sm px-5 py-2 rounded-lg transition">
                建立帳號
            </button>
        </div>
        <div id="create-msg" class="hidden mt-3 text-sm px-3 py-2 rounded-lg"></div>
    </div>

    <!-- 用戶列表 -->
    <div class="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-700 flex items-center justify-between">
            <h2 class="font-bold text-sm text-slate-300 uppercase tracking-widest">用戶列表</h2>
            <button onclick="loadUsers()" class="text-xs text-slate-500 hover:text-teal-400 transition">↺ 重新整理</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-slate-700/50 text-xs text-slate-500 uppercase tracking-wider">
                    <tr>
                        <th class="px-5 py-3 text-left">帳號</th>
                        <th class="px-4 py-3 text-center">身份</th>
                        <th class="px-4 py-3 text-center">方案</th>
                        <th class="px-4 py-3 text-center">答對題數</th>
                        <th class="px-4 py-3 text-center">最高連勝</th>
                        <th class="px-4 py-3 text-center">已獲獎章</th>
                        <th class="px-4 py-3 text-center">最後登入</th>
                        <th class="px-4 py-3 text-center">建立時間</th>
                        <th class="px-4 py-3 text-right">操作</th>
                    </tr>
                </thead>
                <tbody id="user-tbody">
                    <tr><td colspan="9" class="px-5 py-12 text-center text-slate-600">載入中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 重設密碼 Modal -->
<div id="reset-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-slate-800 border border-slate-600 rounded-xl p-6 w-96 shadow-2xl">
        <div class="font-bold text-lg text-slate-100 mb-1">重設密碼</div>
        <div id="reset-modal-sub" class="text-xs text-slate-500 mb-4"></div>
        <input id="reset-pw-input" type="password" placeholder="新密碼（至少 6 字元）"
            class="w-full bg-slate-700 border border-slate-600 focus:border-amber-400 outline-none text-slate-100 text-sm px-3 py-2 rounded-lg mb-5">
        <div class="flex gap-3 justify-end">
            <button onclick="closeResetModal()" class="px-4 py-2 text-sm border border-slate-600 text-slate-400 hover:border-slate-400 rounded-lg transition">取消</button>
            <button id="reset-confirm-btn" class="px-4 py-2 text-sm bg-amber-500 hover:bg-amber-400 text-black font-bold rounded-lg transition">確認重設</button>
        </div>
    </div>
</div>

<!-- 刪除確認 Modal -->
<div id="delete-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-slate-800 border border-slate-600 rounded-xl p-6 w-96 shadow-2xl">
        <div class="font-bold text-lg text-slate-100 mb-2">刪除用戶</div>
        <div id="delete-modal-body" class="text-sm text-slate-400 mb-6"></div>
        <div class="flex gap-3 justify-end">
            <button onclick="closeDeleteModal()" class="px-4 py-2 text-sm border border-slate-600 text-slate-400 hover:border-slate-400 rounded-lg transition">取消</button>
            <button id="delete-confirm-btn" class="px-4 py-2 text-sm bg-red-700 hover:bg-red-600 text-white font-bold rounded-lg transition">確認刪除</button>
        </div>
    </div>
</div>

<!-- 修改密碼 Modal（管理員自己用）-->
<div id="self-pw-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-slate-800 border border-slate-600 rounded-xl p-6 w-96 shadow-2xl">
        <div class="font-bold text-lg text-slate-100 mb-4">修改我的密碼</div>
        <div class="space-y-3 mb-5">
            <input id="self-old-pw" type="password" placeholder="舊密碼"
                class="w-full bg-slate-700 border border-slate-600 focus:border-teal-400 outline-none text-slate-100 text-sm px-3 py-2 rounded-lg">
            <input id="self-new-pw" type="password" placeholder="新密碼（至少 6 字元）"
                class="w-full bg-slate-700 border border-slate-600 focus:border-teal-400 outline-none text-slate-100 text-sm px-3 py-2 rounded-lg">
        </div>
        <div id="self-pw-msg" class="hidden mb-3 text-sm px-3 py-2 rounded-lg"></div>
        <div class="flex gap-3 justify-end">
            <button onclick="closeSelfPwModal()" class="px-4 py-2 text-sm border border-slate-600 text-slate-400 hover:border-slate-400 rounded-lg transition">取消</button>
            <button onclick="doChangeSelfPw()" class="px-4 py-2 text-sm bg-teal-600 hover:bg-teal-500 text-white font-bold rounded-lg transition">確認修改</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-4 opacity-0 pointer-events-none
    bg-amber-400 text-black text-sm font-bold px-5 py-2 rounded-lg transition-all duration-300 z-50"></div>

<script>
let _me = null;

async function init() {
    const me = await fetch('/api/auth/me',{credentials:'include'}).then(r=>r.json());
    if (!me.logged_in || !me.is_admin) { window.location.href='/login'; return; }
    _me = me;
    document.getElementById('current-user').textContent = `👤 ${me.username}`;
    loadUsers();
}

async function loadUsers() {
    const rows = await fetch('/api/admin/users',{credentials:'include'}).then(r=>r.json());
    if (rows.error) { toast('載入失敗：'+rows.error); return; }
    renderStats(rows);
    renderTable(rows);
}

function renderStats(rows) {
    document.getElementById('stat-users').textContent  = rows.length;
    document.getElementById('stat-admins').textContent = rows.filter(r=>r.is_admin).length;
    document.getElementById('stat-active').textContent = rows.filter(r=>r.last_login).length;
}

function fmtDate(iso) {
    if (!iso) return '<span class="text-slate-600">—</span>';
    const d = new Date(iso);
    return `<span class="font-mono text-xs">${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}</span>`;
}

function renderTable(rows) {
    const tbody = document.getElementById('user-tbody');
    if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="px-5 py-12 text-center text-slate-600">尚無用戶</td></tr>';
        return;
    }
    tbody.innerHTML = rows.map(u => {
        const isSelf = u.id === _me.user_id;
        const adminBadge = u.is_admin
            ? '<span class="bg-amber-500/20 text-amber-400 text-xs px-2 py-0.5 rounded-full font-bold">管理員</span>'
            : '<span class="bg-slate-700 text-slate-400 text-xs px-2 py-0.5 rounded-full">用戶</span>';
        const selfMark = isSelf ? ' <span class="text-teal-400 text-xs">(我)</span>' : '';

        const toggleAdminBtn = !isSelf
            ? `<button onclick="toggleAdmin(${u.id},'${u.username}')"
                class="text-xs px-2 py-1 border border-transparent text-slate-600 hover:border-amber-600 hover:text-amber-400 rounded transition">
                ${u.is_admin ? '取消管理員' : '設為管理員'}
               </button>`
            : '';

        const deleteBtn = !isSelf
            ? `<button onclick="confirmDelete(${u.id},'${u.username}')"
                class="text-xs px-2 py-1 border border-transparent text-slate-600 hover:border-red-700 hover:text-red-400 rounded transition">
                刪除
               </button>`
            : '';

        return `<tr class="border-t border-slate-700/50 hover:bg-slate-700/30 transition fade-in">
            <td class="px-5 py-3 font-bold text-slate-200">${u.username}${selfMark}</td>
            <td class="px-4 py-3 text-center">${adminBadge}</td>
            <td class="px-4 py-3 text-center">
                <button onclick="togglePlan(${u.id},'${u.username}','${u.plan||'free'}')"
                    class="text-xs px-2 py-0.5 rounded-full font-bold transition ${u.plan==='premium'
                        ? 'bg-amber-500/20 text-amber-400 hover:bg-amber-500/40'
                        : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}">
                    ${u.plan==='premium' ? '✨ Premium' : '免費'}
                </button>
            </td>
            <td class="px-4 py-3 text-center font-mono text-teal-400">${u.total_correct}</td>
            <td class="px-4 py-3 text-center font-mono text-rose-400">${u.max_streak}</td>
            <td class="px-4 py-3 text-center font-mono text-amber-400">${u.badge_count}</td>
            <td class="px-4 py-3 text-center">${fmtDate(u.last_login)}</td>
            <td class="px-4 py-3 text-center">${fmtDate(u.created_at)}</td>
            <td class="px-4 py-3 text-right flex items-center justify-end gap-1">
                <button onclick="openResetModal(${u.id},'${u.username}')"
                    class="text-xs px-2 py-1 border border-transparent text-slate-600 hover:border-slate-500 hover:text-slate-300 rounded transition">
                    重設密碼
                </button>
                ${toggleAdminBtn}
                ${deleteBtn}
            </td>
        </tr>`;
    }).join('');
}

// ── 新增用戶 ──────────────────────────────────────────────────
async function createUser() {
    const username = document.getElementById('new-username').value.trim();
    const password = document.getElementById('new-password').value;
    const is_admin = document.getElementById('new-is-admin').checked;
    const plan     = document.getElementById('new-plan').value;
    const msgEl    = document.getElementById('create-msg');

    const res  = await fetch('/api/admin/users', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password, is_admin, plan})
    });
    const data = await res.json();

    msgEl.classList.remove('hidden','bg-green-900/40','border-green-700','text-green-300','bg-red-900/40','border-red-700','text-red-300','border');
    if (data.ok) {
        msgEl.textContent = `✅ 已建立帳號「${username}」`;
        msgEl.className   = 'mt-3 text-sm px-3 py-2 rounded-lg bg-green-900/40 border border-green-700 text-green-300';
        document.getElementById('new-username').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('new-is-admin').checked = false;
        document.getElementById('new-plan').value = 'free';
        loadUsers();
    } else {
        msgEl.textContent = `❌ ${data.error}`;
        msgEl.className   = 'mt-3 text-sm px-3 py-2 rounded-lg bg-red-900/40 border border-red-700 text-red-300';
    }
    setTimeout(()=>msgEl.classList.add('hidden'), 4000);
}

// ── 切換方案 ──────────────────────────────────────────────────
async function togglePlan(uid, username, currentPlan) {
    const newPlan = currentPlan === 'premium' ? 'free' : 'premium';
    const label   = newPlan === 'premium' ? 'Premium ✨' : '免費';
    if (!confirm(`將「${username}」切換為 ${label} 方案？`)) return;
    const res  = await fetch(`/api/admin/users/${uid}/set-plan`, {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({plan: newPlan})
    });
    const data = await res.json();
    if (data.ok) { toast(`✅ 已更新為 ${label}`); loadUsers(); }
    else          toast('❌ ' + (data.error || '操作失敗'));
}

// ── 重設密碼 Modal ────────────────────────────────────────────
let _resetUid = null;
function openResetModal(uid, username) {
    _resetUid = uid;
    document.getElementById('reset-modal-sub').textContent = `用戶：${username}`;
    document.getElementById('reset-pw-input').value = '';
    document.getElementById('reset-confirm-btn').onclick = doResetPw;
    document.getElementById('reset-modal').classList.remove('hidden');
    setTimeout(()=>document.getElementById('reset-pw-input').focus(), 50);
}
function closeResetModal() { document.getElementById('reset-modal').classList.add('hidden'); }
async function doResetPw() {
    const pw = document.getElementById('reset-pw-input').value;
    const res = await fetch(`/api/admin/users/${_resetUid}/reset-password`, {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({new_password: pw})
    });
    const data = await res.json();
    closeResetModal();
    if (data.ok) toast('✅ 密碼已重設');
    else toast('❌ ' + data.error);
}
document.getElementById('reset-pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doResetPw();
    if (e.key === 'Escape') closeResetModal();
});

// ── 刪除 Modal ───────────────────────────────────────────────
let _deleteUid = null;
function confirmDelete(uid, username) {
    _deleteUid = uid;
    document.getElementById('delete-modal-body').textContent =
        `確定要永久刪除用戶「${username}」？此操作將刪除該用戶所有 SRS 進度、獎章和錯題記錄，無法復原。`;
    document.getElementById('delete-confirm-btn').onclick = doDelete;
    document.getElementById('delete-modal').classList.remove('hidden');
}
function closeDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); }
async function doDelete() {
    const res  = await fetch(`/api/admin/users/${_deleteUid}`, {
        method:'DELETE', credentials:'include'
    });
    const data = await res.json();
    closeDeleteModal();
    if (data.ok) { toast('✅ 用戶已刪除'); loadUsers(); }
    else toast('❌ ' + data.error);
}

// ── 切換管理員 ────────────────────────────────────────────────
async function toggleAdmin(uid, username) {
    if (!confirm(`確定要修改「${username}」的管理員權限嗎？`)) return;
    const res  = await fetch(`/api/admin/users/${uid}/toggle-admin`, {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: '{}'
    });
    const data = await res.json();
    if (data.ok) { toast(data.is_admin ? `✅ ${username} 已設為管理員` : `✅ ${username} 已取消管理員`); loadUsers(); }
    else toast('❌ ' + data.error);
}

// ── 自己改密碼 ────────────────────────────────────────────────
function openSelfPwModal() {
    document.getElementById('self-old-pw').value = '';
    document.getElementById('self-new-pw').value = '';
    document.getElementById('self-pw-msg').classList.add('hidden');
    document.getElementById('self-pw-modal').classList.remove('hidden');
    setTimeout(()=>document.getElementById('self-old-pw').focus(), 50);
}
function closeSelfPwModal() { document.getElementById('self-pw-modal').classList.add('hidden'); }
async function doChangeSelfPw() {
    const old_password = document.getElementById('self-old-pw').value;
    const new_password = document.getElementById('self-new-pw').value;
    const msgEl = document.getElementById('self-pw-msg');
    const res  = await fetch('/api/auth/change-password', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({old_password, new_password})
    });
    const data = await res.json();
    msgEl.classList.remove('hidden','bg-green-900/40','border-green-700','text-green-300','bg-red-900/40','border-red-700','text-red-300','border');
    if (data.ok) {
        msgEl.textContent = '✅ 密碼已更新';
        msgEl.className   = 'mb-3 text-sm px-3 py-2 rounded-lg bg-green-900/40 border border-green-700 text-green-300';
        setTimeout(closeSelfPwModal, 1500);
    } else {
        msgEl.textContent = '❌ ' + data.error;
        msgEl.className   = 'mb-3 text-sm px-3 py-2 rounded-lg bg-red-900/40 border border-red-700 text-red-300';
    }
}

// ── 登出 ─────────────────────────────────────────────────────
async function doLogout() {
    await fetch('/api/auth/logout',{method:'POST',credentials:'include'});
    window.location.href = '/login';
}

// ── Toast ────────────────────────────────────────────────────
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
    setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-50%) translateY(8px)';
    }, 2500);
}

// 關閉 Modal on backdrop click
['reset-modal','delete-modal','self-pw-modal'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
        if (e.target.id === id) document.getElementById(id).classList.add('hidden');
    });
});

window.onload = init;
</script>
<script>
window.onLangChange = () => { I18n.apply(); };
document.addEventListener('DOMContentLoaded',()=>{ I18n.renderSwitcher(document.getElementById('lang-switcher-admin')); });
</script>
</body>
</html>
