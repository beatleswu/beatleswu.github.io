manifest_version: 1
source_notes: gold_fixture_candidate_notes.txt
status: draft_owner_manifest
created: 2026-06-29
validation_notes:
  - Paths were normalized from the attached draft's mojibake text to the matching local real SGF paths.
  - Core root-child and child-continuation targets were checked with the current SGF parser against the local corpus.
  - GF-008 source SGF decodes as gb18030, not UTF-8; copying it into a UTF-8-only fixture flow will require an explicit encoding decision.

owner_confirmation:
  confirmed_ready:
    - GF-001
    - GF-002
    - GF-005
    - GF-008
    - GF-009
    - GF-010
  confirmed_candidate_requires_override:
    - GF-003
  confirmed_pending:
    - GF-004
    - GF-006
    - GF-007
  scope:
    - This confirmation records owner manifest draft classification only.
    - This confirmation does not enter the integration-test phase.
    - Without explicit owner announcement, do not write tests, copy SGF files, modify overrides, or treat candidate/pending fixtures as active test input.

policy:
  real_sgf_only: true
  mutate_sgf: false
  mutate_variation_overrides: false
  write_tests_in_this_phase: false
  scripts_are_read_only_verification_only: true
  owner_decides_go_meaning: true
  sgf_moves_must_include_19x19_coord: true

