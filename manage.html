      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({old: bookName, new: newName})
    });
    const data = await res.json();
    if (data.ok) {
      allQuestions.forEach(q => { if (groupLabel(q)===bookName) { q.topic=newName; } });
      if (currentBook===bookName) currentBook=newName;
      // 同步前端 bookBands：繼承原書的 rank
      const inheritedRank = _bookBands[bookName] !== undefined ? _bookBands[bookName] : bookDiffRank(bookName);
      delete _bookBands[bookName];
      _bookBands[newName] = inheritedRank;
      toast(`書名已改為「${newName}」`);
      renderTree(); updateStats();
    } else { toast(`改名失敗：${data.error}`); }

// ── 章節改名共用核心 ────────────────────────────────────────
async function _doRenameChapter(bookName, oldName, newName) {
  const res = await fetch('/api/rename-chapter-prefix', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({book: bookName, old_prefix: oldName, new_prefix: newName})
  });
  const data = await res.json();
  if (data.ok) {
    allQuestions.forEach(q => {
      if (groupLabel(q) === bookName && getChapterOf(q) === oldName) {
        // 同步更新 q.level（讓 getChapterOf 認得新名稱）
        if (q.level && q.level !== 'Unknown') q.level = newName;
        // 同步更新 display_name 前綴
        const dn = q.display_name || '';
        if (dn.startsWith(oldName)) q.display_name = newName + dn.slice(oldName.length);
      }
    });
    if (currentChapter === oldName) currentChapter = newName;
    toast(`章節名已改為「${newName}」`);
    renderTree(); updateStats();
    if (currentChapter === newName) selectChapter(currentBook, newName);
  } else {
    toast(`改名失敗：${data.error}`);
    renderTree(); // 恢復顯示
  }
}

// ── 章節名稱 inline 編輯 ─────────────────────────────────
function inlineRenameChapter(spanEl, bookName, oldName) {
  if (!spanEl || spanEl.tagName === 'INPUT') return; // 已在編輯中
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'chapter-name-input';
  inp.value = oldName;
  spanEl.replaceWith(inp);
  inp.focus(); inp.select();

  let committed = false;
  async function commit() {
    if (committed) return;
    committed = true;
    const newName = inp.value.trim();
    if (!newName || newName === oldName) { renderTree(); return; }
    await _doRenameChapter(bookName, oldName, newName);
  }
  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { committed = true; inp.removeEventListener('blur', commit); renderTree(); }
  });
}

// ── 新增章節 inline ──────────────────────────────────────
// 只建立一個「暫定空章節」，讓使用者把其他題目移進來；不強制上傳 SGF
function addChapterInline(bookName) {
  // 找到此書的 chapter-list
  let targetCl = null;
  document.querySelectorAll('.chapter-list').forEach(cl => {
    if (cl.dataset.book === bookName) targetCl = cl;
  });
  if (!targetCl) return;

  // 展開
  if (!targetCl.classList.contains('open')) {
    targetCl.classList.add('open');
    const bh = targetCl.previousElementSibling;
    if (bh) bh.querySelector('.book-toggle')?.classList.add('open');
    currentBook = bookName; currentChapter = null;
  }

  // 若已有輸入列，直接 focus
  const existing = targetCl.querySelector('.chapter-add-row');
  if (existing) { existing.querySelector('.chapter-add-input')?.focus(); return; }

  const row = document.createElement('div');
  row.className = 'chapter-add-row';
  row.innerHTML = `
    <span style="font-size:12px;color:#d97706;line-height:1;flex-shrink:0;">＋</span>
    <input type="text" class="chapter-add-input" placeholder="輸入章節名稱…">
    <button class="icon-btn" style="color:#16a34a;font-size:15px;line-height:1;padding:0 2px;" title="確認">✓</button>
    <button class="icon-btn" style="color:#9ca3af;font-size:13px;padding:0 2px;" title="取消">✕</button>
  `;
  targetCl.appendChild(row);

  const inp  = row.querySelector('.chapter-add-input');
  const [btnOk, btnX] = row.querySelectorAll('.icon-btn');
  inp.focus();

  function cancel() { row.remove(); }
  function confirm() {
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    // 檢查是否已存在同名章節
    const tree = buildTree();
    const existingChapters = tree.get(bookName) || new Map();
    if (existingChapters.has(name)) {
      toast(`「${name}」已存在，直接點選即可`);
      row.remove();
      currentChapter = name;
      renderTree();
      selectChapter(bookName, name);
      return;
    }
    row.remove();
    // 建立暫定章節（僅存在記憶體）
    if (!pendingChapters.has(bookName)) pendingChapters.set(bookName, new Set());
    pendingChapters.get(bookName).add(name);
    // 展開並選取新章節
    currentBook = bookName; currentChapter = name;
    renderTree();
    selectEmptyChapter(bookName, name);
  }

  btnOk.onclick = e => { e.stopPropagation(); confirm(); };
  btnX.onclick  = e => { e.stopPropagation(); cancel(); };
  inp.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter')  confirm();
    if (e.key === 'Escape') cancel();
  });
}

// ── modal 版本（保留相容性） ─────────────────────────────
function renameChapterDirect(bookName, chapterName) {
  // 找到畫面上的章節 span，優先 inline 編輯
  let targetSpan = null;
  document.querySelectorAll('.chapter-item').forEach(ci => {
    const bk = ci.closest('.chapter-list')?.dataset.book;
    if (bk === bookName) {
      const sp = ci.querySelector('.chapter-name');
      if (sp && sp.textContent === chapterName) targetSpan = sp;
    }
  });
  if (targetSpan) { inlineRenameChapter(targetSpan, bookName, chapterName); return; }
  // 若 span 找不到（章節未展開），用 modal
  showRenameModal(`改章節名`, `${bookName} › ${chapterName}`, chapterName, async newName => {
    await _doRenameChapter(bookName, chapterName, newName);
  });
}

function _getCheckedIds() {
  return [...document.querySelectorAll('.q-checkbox:checked')].map(el => parseInt(el.dataset.id));
}

function _updateBatchBar() {
  const ids  = _getCheckedIds();
  const bar  = document.getElementById('batch-select-bar');
  const lbl  = document.getElementById('batch-count-label');
  const all  = document.getElementById('check-all');
  const total = document.querySelectorAll('.q-checkbox').length;
  lbl.textContent = `已選 ${ids.length} 題`;
  bar.classList.toggle('visible', ids.length > 0);
  if (all) all.indeterminate = ids.length > 0 && ids.length < total;
  if (all) all.checked = total > 0 && ids.length === total;
}

function onRowCheck(el) { _updateBatchBar(); }

function toggleCheckAll(el) {
  document.querySelectorAll('.q-checkbox').forEach(cb => { cb.checked = el.checked; });
  _updateBatchBar();
}

function clearSelection() {
  document.querySelectorAll('.q-checkbox').forEach(cb => { cb.checked = false; });
  const allCb = document.getElementById('check-all');
  if (allCb) { allCb.checked = false; allCb.indeterminate = false; }
  _updateBatchBar();
}

async function batchDelete() {
  const ids = _getCheckedIds();
  if (!ids.length) return;
  showConfirmModal(
    `批次刪除 ${ids.length} 題`,
    `確定刪除選取的 ${ids.length} 道題目？此操作無法復原。`,
    async () => {
      const res  = await fetch('/api/batch-delete-questions', {
        method: 'POST', credentials: 'include',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ids})
      });
      const data = await res.json();
      if (data.ok) {
        const idSet = new Set(ids);
        allQuestions = allQuestions.filter(q => !idSet.has(q.id));
        filteredQuestions = filteredQuestions.filter(q => !idSet.has(q.id));
        clearSelection();
        renderTable(filteredQuestions, false);
        updateStats(); renderTree();
        toast(`已刪除 ${data.deleted} 題`);
      } else { toast(`刪除失敗：${data.error}`); }
    }
  );
}

// ── 擴展 doMoveQuestion 以支援批次 ──
async function doMoveQuestion(tree) {
  const book    = document.getElementById('move-book-select').value;
  const chapter = document.getElementById('move-chapter-select').value;
  if (!book || !chapter) { toast('請選擇書本和章節'); return; }

  // 批次模式
  if (tree.ids) {
    const res  = await fetch('/api/batch-move-questions', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ids: tree.ids, book, chapter})
    });
    const data = await res.json();
    closeMoveModal();
    if (data.ok) {
      const idSet  = new Set(tree.ids);
      const names  = data.updated_names || {};
      allQuestions.forEach(q => {
        if (idSet.has(q.id)) {
          q.topic = book;
          q.level = chapter;
          if (names[q.id] !== undefined) q.display_name = names[q.id];
        }
      });
      // 暫定章節已有題目 → 從 pendingChapters 移除
      _cleanPendingChapter(book, chapter);
      filteredQuestions = filteredQuestions.filter(q => !idSet.has(q.id));
      clearSelection();
      renderTable(filteredQuestions, false);
      updateStats(); renderTree();
      toast(`已移動 ${data.moved} 題到「${book} › ${chapter}」`);
    } else { toast(`移動失敗：${data.error}`); }
    return;
  }

  // 單題模式（原有邏輯）
  const res = await fetch('/api/move-question', {
    method:'POST', credentials:'include',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id: tree.id, book, chapter})
  });
  const data = await res.json();
  closeMoveModal();
  if (data.ok) {
    const q = allQuestions.find(x=>x.id===tree.id);
    if (q) {
      q.topic = book;
      q.level = chapter;
      if (data.display_name !== undefined) q.display_name = data.display_name;
    }
    _cleanPendingChapter(book, chapter);
    filteredQuestions = filteredQuestions.filter(x=>x.id!==tree.id);
    renderTable(filteredQuestions, false);
    updateStats(); renderTree();
    toast(`已移動到「${book} › ${chapter}」`);
  } else { toast(`移動失敗：${data.error}`); }
}

  document.getElementById('add-drawer').classList.add('open');
  setTimeout(() => document.getElementById('sgf-content').focus(), 180);
}

function closeAddDrawer() {
  document.getElementById('add-drawer-overlay').classList.remove('open');
  document.getElementById('add-drawer').classList.remove('open');
}

// Stop overlay click from closing when clicking inside drawer
document.getElementById('add-drawer').addEventListener('click', e => e.stopPropagation());

function _fillAddChapterSelect(bookName) {
  const tree = buildTree();
  const chapters = bookName ? [...(tree.get(bookName)||new Map()).keys()] : [];
  const sel = document.getElementById('add-chapter-select');
  sel.innerHTML = '<option value="">— 選現有章節 —</option>' +
    chapters.map(c => `<option value="${c}">${c}</option>`).join('');
}

function onAddBookChange() {
  const val = document.getElementById('add-book-select').value;
  if (val) document.getElementById('add-book-new').value = '';
  _fillAddChapterSelect(val);
}

function onAddBookNewInput() {
  if (document.getElementById('add-book-new').value.trim()) {
    document.getElementById('add-book-select').value = '';
    document.getElementById('add-chapter-select').innerHTML = '<option value="">— 選現有章節 —</option>';
  }
}

// Auto-extract GN[] from pasted SGF
function onSgfInput() {
  const sgf = document.getElementById('sgf-content').value;
  const m   = sgf.match(/GN\[([^\]]+)\]/);
  const nameEl = document.getElementById('add-display-name');
  if (m && !nameEl.value) nameEl.value = m[1].trim();
}

// File upload handling
function handleSgfFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('sgf-content').value = e.target.result;
    onSgfInput();
    const fn = document.getElementById('upload-filename');
    fn.textContent = `✓ ${file.name}`;
    fn.style.display = '';
  };
  reader.readAsText(file, 'utf-8');
}

function handleSgfDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-active');
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.sgf')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('sgf-content').value = ev.target.result;
    onSgfInput();
    const fn = document.getElementById('upload-filename');
    fn.textContent = `✓ ${file.name}`;
    fn.style.display = '';
  };
  reader.readAsText(file, 'utf-8');
}

async function submitAddQuestion() {
  const sgf       = document.getElementById('sgf-content').value.trim();
  const bookSel   = document.getElementById('add-book-select').value.trim();
  const bookNew   = document.getElementById('add-book-new').value.trim();
  const chSel     = document.getElementById('add-chapter-select').value.trim();
  const chNew     = document.getElementById('add-chapter-new').value.trim();
  const dispName  = document.getElementById('add-display-name').value.trim();
  const diff      = document.getElementById('add-difficulty').value;

  const book    = bookNew  || bookSel;
  const chapter = chNew   || chSel;

  const status = document.getElementById('drawer-status');
  const btn    = document.getElementById('btn-drawer-save');

  if (!sgf)     { _drawerErr('請貼入或上傳 SGF 內容');  return; }
  if (!book)    { _drawerErr('請選擇或輸入書本名稱');    return; }
  if (!chapter) { _drawerErr('請選擇或輸入章節名稱');    return; }

  btn.disabled = true;
  status.className = 'drawer-status';
  status.textContent = '儲存中…';

  try {
    const res  = await fetch('/api/add-question', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        sgf_content:  sgf,
        topic:        book,
        level:        chapter,
        display_name: dispName || null,
        difficulty:   diff || null,
      })
    });
    const data = await res.json();
    if (data.ok) {
      // Inject into local state
      allQuestions.push(data.question);
      status.textContent = `✅ 已新增 ID ${data.question.id}`;
      renderTree();
      updateStats();
      // Navigate to the new chapter
      setTimeout(() => {
        closeAddDrawer();
        selectChapter(book, chapter);
      }, 700);
    } else {
      _drawerErr(data.error || '新增失敗');
      btn.disabled = false;
    }
  } catch (e) {
    _drawerErr('網路錯誤，請重試');
    btn.disabled = false;
  }
}

function _drawerErr(msg) {
  const status = document.getElementById('drawer-status');
  status.className = 'drawer-status err';
  status.textContent = '⚠ ' + msg;
}

// ESC to close drawer or preview
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('add-drawer').classList.contains('open')) closeAddDrawer();
    else if (document.getElementById('preview-panel').classList.contains('open')) closePreview();
  }
});

// ══════════════════════════════════════════════════════════════
// SGF 解析器（與 index.html 同步）
// ══════════════════════════════════════════════════════════════
function parseSGF(sgf) {
    sgf = sgf.replace(/\r?\n|\r/g, ' ').trim();
    const result = { size:19, pl:'B', black:[], white:[], tree:null };
    function findClosing(str,start){let d=0;for(let i=start;i<str.length;i++){if(str[i]==='(')d++;else if(str[i]===')'){ d--;if(d===0)return i;}}return str.length-1;}
    function parseCoordList(s){return(s.match(/\[([a-zA-Z]{2})\]/g)||[]).map(m=>({x:m.charCodeAt(1)-97,y:m.charCodeAt(2)-97}));}
    const rm=sgf.match(/^\(;([\s\S]*?)(?=;|\(|\))/);if(!rm)return null;
    const rp=rm[1];
    const sz=rp.match(/SZ\[(\d+)\]/);if(sz)result.size=parseInt(sz[1]);
    const pl=rp.match(/PL\[([BW])\]/);if(pl)result.pl=pl[1];
    (rp.match(/AB((?:\[[a-zA-Z]{2}\])+)/g)||[]).forEach(s=>result.black.push(...parseCoordList(s)));
    (rp.match(/AW((?:\[[a-zA-Z]{2}\])+)/g)||[]).forEach(s=>result.white.push(...parseCoordList(s)));
    function parseSeq(str){
        str=str.trim();const ns=[];let i=0;
        while(i<str.length){
            if(str[i]===';'){let j=i+1,d=0;while(j<str.length){if(str[j]==='('){if(d===0)break;d++;}else if(str[j]===')'){ if(d===0)break;d--;}else if(str[j]===';'&&d===0)break;j++;}ns.push(str.slice(i,j));i=j;}
            else if(str[i]==='(')break;else i++;
        }
        const bs=i;if(!ns.length)return null;
        function scanNodeMove(node){
            node=node.trim();
            let i=0;
            while(i<node.length){
                const ch=node[i];
                if(ch===';'||ch<=' '){i++;continue;}
                if(ch<'A'||ch>'Z'){i++;continue;}
                const propStart=i;
                while(i<node.length&&node[i]>='A'&&node[i]<='Z')i++;
                const prop=node.slice(propStart,i);
                while(i<node.length&&node[i]==='['){
                    let value='';i++;
                    while(i<node.length){
                        const c=node[i];
                        if(c==='\\'&&i+1<node.length){value+=node[i+1];i+=2;continue;}
                        if(c===']'){i++;break;}
                        value+=c;i++;
                    }
                    if(prop==='B'||prop==='W'){
                        return{color:prop,move:value.length===2?{x:value.charCodeAt(0)-97,y:value.charCodeAt(1)-97}:null};
                    }
                }
            }
            return null;
        }
        function pn(s){const m=scanNodeMove(s);if(!m)return null;return{color:m.color,move:m.move,children:[]};}
        const nodes=ns.map(pn).filter(Boolean);if(!nodes.length)return null;
        for(let k=0;k<nodes.length-1;k++)nodes[k].children.push(nodes[k+1]);
        const last=nodes[nodes.length-1];let bi=bs;
        while(bi<str.length){if(str[bi]==='('){const e=findClosing(str,bi);const c=parseSeq(str.slice(bi+1,e));if(c)last.children.push(c);bi=e+1;}else bi++;}
        return nodes[0];
    }
    const after=sgf.slice(rm[0].length).trim();
    if(after.startsWith(';')){result.tree=parseSeq(after);}
    else if(after.startsWith('(')){
        const root={move:null,color:null,children:[]};let i=0;
        while(i<after.length){if(after[i]==='('){const e=findClosing(after,i);const c=parseSeq(after.slice(i+1,e));if(c)root.children.push(c);i=e+1;}else i++;}
        result.tree=root;
    }
    // 若 SGF 根節點無 PL 標記，從答案樹第一手顏色推斷先手方
    if(!pl&&result.tree){const fn=result.tree.move?result.tree:(result.tree.children&&result.tree.children[0]);if(fn&&fn.color)result.pl=fn.color;}
    // 最後備援：直接搜尋整個 SGF 是否含 PL[W]
    if(result.pl==='B'&&/PL\[W\]/.test(sgf))result.pl='W';
    return result;
}

// ══════════════════════════════════════════════════════════════
// 題目預覽面板
// ══════════════════════════════════════════════════════════════
let _previewBoard = null;
let _previewQid   = null;

async function openPreview(qid) {
  // 再次點同題 → 關閉
  if (_previewQid === qid && document.getElementById('preview-panel').classList.contains('open')) {
    closePreview(); return;
  }
  _previewQid = qid;

  // 移除前一列高亮，標記新列
  document.querySelectorAll('tr.previewing').forEach(r => r.classList.remove('previewing'));
  const row = document.querySelector(`tr[data-id="${qid}"]`);
  if (row) row.classList.add('previewing');

  // 開啟面板
  const panel = document.getElementById('preview-panel');
  panel.classList.add('open');

  // 載入狀態
  document.getElementById('preview-qid').textContent       = `#${qid}`;
  document.getElementById('preview-title-txt').textContent = '載入中…';
  document.getElementById('preview-meta').innerHTML        = '';
  const bw = document.getElementById('preview-board-wrap');
  bw.innerHTML = '<div style="padding:32px;color:var(--ink4);font-size:13px;text-align:center;">⏳ 載入棋盤…</div>';

  // 清除舊棋盤
  _destroyPreviewBoard();

  // 取單題完整資料（含 SGF content）
  let data;
  try {
    data = await fetch(`/api/question/${qid}`, {credentials:'include'}).then(r => r.json());
  } catch(e) {
    bw.innerHTML = '<div style="padding:20px;color:#dc2626;">⚠ 載入失敗</div>'; return;
  }

  // 若已切換到其他題，放棄
  if (_previewQid !== qid) return;

  // 補充本地 allQuestions 資料
  const qInfo   = allQuestions.find(q => q.id === qid) || {};
  const srsCard = allSrsCards[qid];

  // 標題
  const title = data.display_name || qInfo.display_name || `題目 ${qid}`;
  document.getElementById('preview-title-txt').textContent = title;

  // 解析 SGF → 建立棋盤
  const parsed = parseSGF((data.content || '').trim());
  bw.innerHTML = '';

  if (parsed && typeof WGo !== 'undefined') {
    // 讓 panel 先完成 transition 再建棋盤（確保容器有寬度）
    await new Promise(r => setTimeout(r, 60));
    if (_previewQid !== qid) return; // 再次確認未被切換
    const boardSize = bw.clientWidth - 28;
    _previewBoard = new WGo.Board(bw, {
      width: Math.max(200, boardSize),
      size:  parsed.size,
      section: { top:-.5, left:-.5, right:-.5, bottom:-.5 }
    });
    parsed.black.forEach(s => _previewBoard.addObject({x:s.x, y:s.y, c:WGo.B}));
    parsed.white.forEach(s => _previewBoard.addObject({x:s.x, y:s.y, c:WGo.W}));
  } else {
    bw.innerHTML = '<div style="padding:20px;color:var(--ink4);text-align:center;">無法解析 SGF</div>';
  }

  // Metadata
  const pl    = parsed ? parsed.pl : ((data.content||'').match(/PL\[([BW])\]/) || [])[1] || '?';
  const plTxt = pl === 'B' ? '⚫ 黑先' : pl === 'W' ? '⚪ 白先' : '?';
  const diff  = data.difficulty || qInfo.difficulty || '';
  const diffHtml = diff
    ? `<span style="background:${diff.endsWith('k')?'#3b82f6':'#f59e0b'};color:#fff;
                  font-size:10px;padding:1px 7px;border-radius:4px;font-weight:bold">${diff}</span>`
    : '<span style="color:var(--ink4)">未設定</span>';

  let srsHtml = '';
  if (srsCard) {
    const next = srsCard.interval === 0 ? '今日' : srsCard.interval === 1 ? '明天' : `${srsCard.interval} 天後`;
    srsHtml = `
      <div class="preview-row">
        <span class="preview-label">複習</span>
        <span class="preview-val">${next}</span>
      </div>
      <div class="preview-row">
        <span class="preview-label">穩定度</span>
        <span class="preview-val">${srsCard.ease_factor != null ? srsCard.ease_factor.toFixed(2) : '—'}</span>
      </div>`;
  } else {
    srsHtml = `<div class="preview-row"><span class="preview-label">SRS</span><span class="preview-val" style="color:var(--ink4)">尚未作答</span></div>`;
  }

  const enabledHtml = qInfo.enabled === false
    ? '<span style="color:#dc2626;">⊘ 停用</span>'
    : '<span style="color:var(--teal);">✓ 啟用</span>';

  // 解說文字
  const commentText = data.comment || '';

  document.getElementById('preview-meta').innerHTML = `
    <div class="preview-row">
      <span class="preview-label">先手</span>
      <span class="preview-val">${plTxt}</span>
    </div>
    <div class="preview-row">
      <span class="preview-label">難度</span>
      <span class="preview-val">${diffHtml}</span>
    </div>
    <div class="preview-row">
      <span class="preview-label">狀態</span>
      <span class="preview-val">${enabledHtml}</span>
    </div>
    ${srsHtml}
    <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
      <a href="/?preview=${qid}" target="_blank" class="preview-ext-link">在練習頁開啟 ↗</a>
    </div>
    <div class="expl-section">
      <div class="expl-section-head">
        <span class="expl-section-title">📝 題目解說</span>
        <button class="expl-edit-btn" id="expl-edit-btn" onclick="_explStartEdit(${qid})">✏️ 編輯</button>
      </div>
      <div id="expl-display" class="${commentText ? 'expl-text-display' : 'expl-text-display empty'}">${commentText ? _escHtml(commentText) : '尚無解說文字，點擊「編輯」新增…'}</div>
      <div id="expl-editor" style="display:none">
        <textarea id="expl-textarea" class="expl-textarea" placeholder="輸入解說文字…">${_escHtml(commentText)}</textarea>
        <div class="expl-actions">
          <button class="expl-save-btn" id="expl-save-btn" onclick="_explSave(${qid})">💾 儲存</button>
          <button class="expl-cancel-btn" onclick="_explCancelEdit(${qid}, \`${_escTpl(commentText)}\`)">取消</button>
        </div>
      </div>
    </div>
  `;
}

function _destroyPreviewBoard() {
  if (_previewBoard) {
    try { _previewBoard.removeAllObjects(); } catch(e) {}
    _previewBoard = null;
  }
}

// ── 解說文字工具函式 ──────────────────────────────────────────
function _escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// 反斜線 + backtick 跳脫，讓字串放進 template literal onclick
function _escTpl(s) {
  return (s || '').replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
}

function _explStartEdit(qid) {
  const display = document.getElementById('expl-display');
  const editor  = document.getElementById('expl-editor');
  const btn     = document.getElementById('expl-edit-btn');
  if (!display || !editor) return;
  display.style.display = 'none';
  editor.style.display  = 'block';
  if (btn) btn.style.display = 'none';
  const ta = document.getElementById('expl-textarea');
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

function _explCancelEdit(qid, originalText) {
  const display = document.getElementById('expl-display');
  const editor  = document.getElementById('expl-editor');
  const btn     = document.getElementById('expl-edit-btn');
  if (!display || !editor) return;
  editor.style.display  = 'none';
  display.style.display = '';
  if (btn) btn.style.display = '';
  // 還原 textarea 內容
  const ta = document.getElementById('expl-textarea');
  if (ta) ta.value = originalText;
}

async function _explSave(qid) {
  const ta      = document.getElementById('expl-textarea');
  const saveBtn = document.getElementById('expl-save-btn');
  if (!ta || !saveBtn) return;
  const text = ta.value.trim();
  saveBtn.disabled = true;
  saveBtn.textContent = '儲存中…';

  try {
    const res  = await fetch('/api/set-explanation', {
      credentials: 'include',
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: qid, text })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '儲存失敗');

    // 更新本地 allQuestions 的 has_explanation 旗標
    const q = allQuestions.find(x => x.id === qid);
    if (q) q.has_explanation = !!text;

    // 更新顯示
    const display = document.getElementById('expl-display');
    const editor  = document.getElementById('expl-editor');
    const btn     = document.getElementById('expl-edit-btn');
    if (display) {
      display.className = text ? 'expl-text-display' : 'expl-text-display empty';
      display.innerHTML = text ? _escHtml(text) : '尚無解說文字，點擊「編輯」新增…';
      // 更新 cancel 按鈕的 originalText
      const cancelBtn = editor ? editor.querySelector('.expl-cancel-btn') : null;
      if (cancelBtn) cancelBtn.setAttribute('onclick', `_explCancelEdit(${qid}, \`${_escTpl(text)}\`)`);
    }
    if (editor)  editor.style.display  = 'none';
    if (display) display.style.display = '';
    if (btn)     btn.style.display     = '';

    toast('解說已儲存 ✓');
  } catch(e) {
    toast('❌ ' + e.message);
    saveBtn.disabled = false;
    saveBtn.textContent = '💾 儲存';
  }
}

function closePreview() {
  _previewQid = null;
  document.getElementById('preview-panel').classList.remove('open');
  document.querySelectorAll('tr.previewing').forEach(r => r.classList.remove('previewing'));
  _destroyPreviewBoard();
  // 稍後清空，避免關閉動畫時看到空白
  setTimeout(() => {
    if (!document.getElementById('preview-panel').classList.contains('open')) {
      document.getElementById('preview-board-wrap').innerHTML =
        '<span style="color:var(--ink4);font-size:13px;">點擊題目列的「預覽」</span>';
      document.getElementById('preview-meta').innerHTML = '';
      document.getElementById('preview-title-txt').textContent = '題目預覽';
      document.getElementById('preview-qid').textContent = '';
    }
  }, 300);
}

window.onload = loadAll;
window.onLangChange = () => { I18n.apply(); if(typeof renderTable==='function'&&typeof filteredQuestions!=='undefined'&&filteredQuestions) renderTable(filteredQuestions); };
document.addEventListener('DOMContentLoaded', () => {
  I18n.renderSwitcher(document.getElementById('lang-switcher-manage'));
});
