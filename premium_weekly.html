<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title data-i18n="weekly.page.title">星辰戰報 · 弈境奇兵</title>
  <style>
    :root{--ink:#3a2410;--gold:#d9aa55;--paper:#f5e6c2;--deep:#17100b;--green:#2f8f63;--red:#a94632}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:"Noto Serif TC",serif;background:#120d09 url('/assets/go_rpg_assets/guild_hall_main.webp') center top/cover fixed no-repeat}
    body:before{content:"";position:fixed;inset:0;background:rgba(12,8,5,.72);z-index:-1}
    .wrap{max-width:1120px;margin:0 auto;padding:84px 18px 50px}.hero,.panel{border:1px solid rgba(217,170,85,.55);border-radius:18px;background:linear-gradient(180deg,rgba(250,237,204,.97),rgba(235,209,151,.97));box-shadow:0 18px 50px rgba(0,0,0,.38)}
    .hero{padding:26px 28px;margin-bottom:16px;display:flex;justify-content:space-between;gap:20px;align-items:center}.kicker{font:700 11px/1.2 monospace;letter-spacing:2px;color:#8d5a1e}.hero h1{margin:7px 0 4px;font-size:34px}.hero p{margin:0;color:#6b4a1e}.mode{display:flex;gap:7px}.mode button,.cta{border:1px solid #8d5a1e;border-radius:10px;padding:10px 14px;background:#fff5d9;color:var(--ink);font-weight:800;cursor:pointer}.mode button.active,.cta{background:linear-gradient(135deg,#8d5a1e,#d9aa55);color:#fff}
    .grid{display:grid;grid-template-columns:1.25fr .75fr;gap:16px}.panel{padding:20px}.panel h2{margin:0 0 14px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.stat,.disc,.quest-item{border:1px solid rgba(111,70,22,.25);border-radius:12px;background:rgba(255,250,235,.7);padding:12px}.stat strong{display:block;font-size:25px}.stat span,.muted{font-size:12px;color:#76552d}.disc{margin:8px 0;display:grid;grid-template-columns:1fr auto;gap:5px}.disc .bar{grid-column:1/-1;height:7px;background:#dfca9b;border-radius:9px;overflow:hidden}.disc .bar i{display:block;height:100%;background:var(--green)}.disc.needs_attention .bar i{background:var(--red)}.quest-list{display:grid;gap:8px}.quest-item{display:flex;justify-content:space-between;gap:12px;align-items:center}.quest-item.done{opacity:.62}.role{font:700 10px/1 monospace;letter-spacing:1px;color:#8d5a1e}.empty{text-align:center;padding:45px 15px}.notice{padding:10px 12px;border-radius:10px;background:#fff2c9;margin:10px 0}.parent-only{display:none}body.parent .child-only{display:none}body.parent .parent-only{display:block}.prefs{display:flex;gap:10px;align-items:center;margin-top:12px}
    @media(max-width:760px){.wrap{padding:68px 10px 30px}.hero{display:block;padding:18px}.hero h1{font-size:27px}.mode{margin-top:14px}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
<script src="/i18n.js?v=20260710a"></script>
  <script src="/site-nav.js?v=20260625presence1" defer></script>
</head>
<body>
<main class="wrap">
  <section class="hero">
    <div><div class="kicker">PREMIUM · WEEKLY CHRONICLE</div><h1 id="title" data-i18n="weekly.h1">星辰戰報</h1><p id="period" data-i18n="weekly.loading.period">正在翻閱本週卷宗…</p></div>
    <div class="mode"><button id="child-mode" class="active" data-i18n="weekly.mode.child">冒險者版</button><button id="parent-mode" data-i18n="weekly.mode.parent">家長／教練版</button><button id="share" data-i18n="weekly.share">分享成就</button></div>
  </section>
  <div id="loading" class="panel empty" data-i18n="weekly.loading">正在整理修行紀錄…</div>
  <div id="content" class="grid" hidden>
    <section class="panel"><h2 class="child-only" data-i18n="weekly.results.child">本週冒險成果</h2><h2 class="parent-only" data-i18n="weekly.results.parent">本週練習摘要</h2><div class="stats" id="stats"></div><div id="quality" class="notice"></div><h2 style="margin-top:20px" data-i18n="weekly.abilities">能力卷宗</h2><div id="disciplines"></div></section>
    <aside class="panel"><h2 data-i18n="weekly.route">專屬修行路線</h2><div id="quest" class="quest-list"></div><button id="start" class="cta" hidden data-i18n="weekly.start">繼續本週專屬修行</button><div class="prefs"><input id="email-enabled" type="checkbox"><label for="email-enabled" data-i18n="weekly.email">每週寄送戰報到已驗證信箱</label></div><div id="email-note" class="muted"></div></aside>
  </div>
</main>
<script>
const WEEKLY_LABELS={
  zh:{days:'練習天數',done:'完成題數',first:'首次答對率',fixed:'訂正成功',measured:'時間資料完整',legacy:'舊紀錄沒有思考時間，時間分析會從新作答開始累積。',insufficient_data:'資料累積中',tentative:'暫定趨勢',stable:'表現穩定',improving:'正在進步',needs_attention:'待突破',warmup:'熱身',secondary:'次要突破',primary:'主要突破',application:'綜合應用',mistake:'錯題挑戰'},
  en:{days:'Practice Days',done:'Problems Completed',first:'First-attempt Accuracy',fixed:'Corrections Mastered',measured:'Thinking-time data complete',legacy:'Older records do not include thinking time. Time analysis will accumulate from new answers.',insufficient_data:'Collecting Data',tentative:'Tentative Trend',stable:'Stable',improving:'Improving',needs_attention:'Needs Attention',warmup:'Warm-up',secondary:'Secondary Focus',primary:'Primary Focus',application:'Application',mistake:'Mistake Challenge'}
};
const WEEKLY_DISC_NAMES={
  zh:{tesuji:'手筋',life_death:'死活',endgame_counting:'官子與計算',opening_direction:'佈局方向',capture_escape:'吃子與逃脫',connection_cut:'連絡與切斷',shape_weakness:'棋形與弱點',whole_board:'全盤綜合'},
  en:{tesuji:'Tesuji',life_death:'Life & Death',endgame_counting:'Endgame & Counting',opening_direction:'Opening Direction',capture_escape:'Capture & Escape',connection_cut:'Connection & Cutting',shape_weakness:'Shape & Weakness',whole_board:'Whole-board Play'}
};
const weeklyEn=()=>window.I18n?.getLang?.()==='en';
const weeklyLabels=()=>WEEKLY_LABELS[weeklyEn()?'en':'zh'];
const weeklyDiscNames=()=>WEEKLY_DISC_NAMES[weeklyEn()?'en':'zh'];
let shareSummary=null;
let currentSet=null;
function el(tag,cls,text){const n=document.createElement(tag);if(cls)n.className=cls;if(text!=null)n.textContent=text;return n}
function pct(v){return v==null?'—':Math.round(Number(v)*100)+'%'}
function renderReport(r,training){const s=r.summary.summary;const labels=weeklyLabels();const names=weeklyDiscNames();shareSummary={days:s.practice_days,done:s.completed_count};document.getElementById('period').textContent=`${r.period_start} – ${r.period_end}`;const stats=document.getElementById('stats');stats.replaceChildren();[[labels.days,s.practice_days],[labels.done,s.completed_count],[labels.first,pct(s.first_attempt_accuracy)],[labels.fixed,s.correction_success_count]].forEach(([a,b])=>{const c=el('div','stat');c.append(el('strong','',b),el('span','',a));stats.append(c)});document.getElementById('quality').textContent=s.data_quality==='measured'?labels.measured:labels.legacy;const ds=document.getElementById('disciplines');ds.replaceChildren();r.disciplines.forEach(d=>{const c=el('div','disc '+d.status);const name=el('strong','',names[d.discipline]||d.discipline);const state=el('span','',labels[d.status]||d.status);const detailText=weeklyEn()?`Valid first attempts ${d.first_valid_count} · Actual ${pct(d.actual_accuracy)} · Difficulty-adjusted expected ${pct(d.expected_accuracy)} · Effective weight ${Number(d.effective_weight).toFixed(1)}`:`有效首次作答 ${d.first_valid_count} · 實際 ${pct(d.actual_accuracy)} · 難度校正期望 ${pct(d.expected_accuracy)} · 有效權重 ${Number(d.effective_weight).toFixed(1)}`;const detail=el('div','muted parent-only',detailText);detail.style.gridColumn='1/-1';const bar=el('div','bar');const fill=el('i');fill.style.width=Math.max(5,Math.min(100,50+Number(d.shrunk_residual||0)*200))+'%';bar.append(fill);c.append(name,state,detail,bar);ds.append(c)});renderTraining(training);document.getElementById('loading').hidden=true;document.getElementById('content').hidden=false}
function renderTraining(t){const labels=weeklyLabels();const names=weeklyDiscNames();currentSet=t?.set?.id||null;const host=document.getElementById('quest');host.replaceChildren();(t?.items||[]).forEach(i=>{const row=el('div','quest-item'+(i.completed_at?' done':''));const left=el('div');const display=weeklyEn()?(i.display_name_en||i.display_name):i.display_name;left.append(el('div','role',labels[i.role]||i.role),el('strong','',display),el('div','muted',`${i.rank||'—'} · ${names[i.discipline]||i.discipline||'—'}`));row.append(left,el('span','',i.completed_at?'✓':String(i.item_order)));host.append(row)});const btn=document.getElementById('start');btn.hidden=!t?.next_item||!!t?.read_only;btn.textContent=t?.rescue?(weeklyEn()?'Start Rescue Training':'啟動卡關救援修行'):I18n.t('weekly.start')}
async function load(){const params=new URLSearchParams(location.search);let setId=params.get('set');const me=await fetch('/api/auth/me',{cache:'no-store'}).then(r=>r.json());const list=await fetch('/api/premium/weekly/reports'+(me.is_admin?'?include_shadow=1':''),{cache:'no-store'}).then(r=>r.json());if(!list.reports?.length){document.getElementById('loading').textContent=weeklyEn()?'This week’s report has not been published yet. It will open after coach calibration.':'本週戰報尚未發布。資料會先經過教練校準後再開放。';return}let reportId=list.reports[0].id;if(setId&&me.is_admin){const admin=await fetch('/api/admin/premium/weekly/reports',{cache:'no-store'}).then(r=>r.json());const match=admin.reports?.find(r=>String(r.training_set_id)===String(setId));if(match)reportId=match.id}const report=await fetch(`/api/premium/weekly/reports/${reportId}`,{cache:'no-store'}).then(r=>r.json());setId=setId||report.training_set_id;const training=setId?await fetch(`/api/premium/weekly/training/${setId}`,{cache:'no-store'}).then(r=>r.json()):null;renderReport(report,training);const pref=await fetch('/api/premium/weekly/email-preferences',{cache:'no-store'}).then(r=>r.json());document.getElementById('email-enabled').checked=!!pref.weekly_report_enabled}
document.getElementById('child-mode').onclick=()=>{document.body.classList.remove('parent');document.getElementById('child-mode').classList.add('active');document.getElementById('parent-mode').classList.remove('active')};document.getElementById('parent-mode').onclick=()=>{document.body.classList.add('parent');document.getElementById('parent-mode').classList.add('active');document.getElementById('child-mode').classList.remove('active')};document.getElementById('start').onclick=()=>{if(currentSet)location.href=`/?premium_set=${encodeURIComponent(currentSet)}`};document.getElementById('email-enabled').onchange=async e=>{const res=await fetch('/api/premium/weekly/email-preferences',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:e.target.checked,locale:(window.I18n?.getLang?.()||'zh')})});const d=await res.json();if(!res.ok){e.target.checked=false;document.getElementById('email-note').textContent=d.error==='email_unverified'?(weeklyEn()?'Verify your email in account settings first.':'請先到帳號設定驗證 Email。'):(weeklyEn()?'Could not update settings. Please try again.':'設定失敗，請稍後再試。')}else document.getElementById('email-note').textContent=weeklyEn()?'Settings updated.':'設定已更新。'};load().catch(e=>{document.getElementById('loading').textContent=weeklyEn()?'Could not load the report. Please try again.':'戰報載入失敗，請稍後再試。';console.error(e)});
document.getElementById('share').onclick=async()=>{if(!shareSummary)return;const text=weeklyEn()?`I completed ${shareSummary.done} problems across ${shareSummary.days} training days on Go Odyssey this week!`:`我本週在弈境奇兵完成 ${shareSummary.done} 題、修行 ${shareSummary.days} 天！`;if(navigator.share)await navigator.share({title:weeklyEn()?'Go Odyssey Weekly Achievement':'弈境奇兵修行成就',text,url:location.origin});else{await navigator.clipboard.writeText(text+' '+location.origin);document.getElementById('email-note').textContent=weeklyEn()?'Achievement text copied.':'成就文字已複製。'}};
window.onLangChange=()=>location.reload();
</script>
</body></html>
