<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="cur.page.title">冒險者公會 — 弈境奇兵 (Go Odyssey)</title>
<style>/* anti-FOUC: site-nav.js will replace this header with .cg-nav; reveal after 3s if it never loads */header:not(.cg-nav):not(.hero){visibility:hidden;animation:cgNavReveal 0s 3s forwards}@keyframes cgNavReveal{to{visibility:visible}}</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+TC:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/i18n.js?v=20260710a"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:    #faf7f2;
  --cream2:   #f3ede3;
  --cream3:   #ede4d4;
  --ink:      #1c1409;
  --ink2:     #3d2f1a;
  --ink3:     #6b5740;
  --amber:    #d97706;
  --amber-l:  #fbbf24;
  --amber-bg: #fffbeb;
  --teal:     #0d9488;
  --teal-l:   #14b8a6;
  --teal-bg:  #f0fdfa;
  --border:   #e5ddd0;
  --border2:  #d4c9b8;
  --red:      #dc2626;
  --shadow:   0 1px 3px rgba(28,20,9,.06), 0 4px 16px rgba(28,20,9,.06);
  --shadow-lg:0 8px 40px rgba(28,20,9,.10);
  --radius:   14px;
}

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: 'DM Sans', sans-serif;
  background:
    radial-gradient(circle at 52% 0%, rgba(251,191,36,.22), transparent 24%),
    url('assets/guild_ui/guild_wood_bg.webp') center top / cover fixed,
    #140905;
  color: var(--ink);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(circle at 16% 12%, rgba(245,158,11,.18), transparent 18%),
    radial-gradient(circle at 82% 20%, rgba(20,184,166,.12), transparent 20%),
    linear-gradient(90deg, rgba(0,0,0,.55), transparent 18%, transparent 82%, rgba(0,0,0,.55));
  opacity: .9;
}

/* ── Header ── */
header:not(.cg-nav) {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,242,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 52px;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 700; color: var(--ink);
  text-decoration: none; letter-spacing: .5px;
}
.logo-mark { color: var(--teal); font-size: 14px; }
.header-nav { display: flex; align-items: center; gap: 4px; }
.nav-link {
  font-size: 14px; font-weight: 500; color: var(--ink3);
  text-decoration: none; padding: 7px 13px; border-radius: 8px;
  transition: background .15s, color .15s;
}
.nav-link:hover, .nav-link.active { background: var(--cream2); color: var(--ink); }
.nav-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.btn-logout {
  font-size: 11px; color: var(--ink3); background: none;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 4px 10px; cursor: pointer; transition: all .15s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── Page Layout ── */
.page {
  position: relative; z-index: 1;
  max-width: 1180px; margin: 0 auto;
  padding: 42px 24px 96px;
}

/* ── Hero ── */
.hero {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 24px; margin-bottom: 24px;
  flex-wrap: wrap;
  background: linear-gradient(135deg, rgba(28,20,9,.94), rgba(13,148,136,.92) 62%, rgba(217,119,6,.86));
  border-radius: 22px;
  padding: 30px;
  color: #fff;
  box-shadow: 0 18px 50px rgba(28,20,9,.15);
}
.hero-left h1 {
  font-family: 'DM Sans', sans-serif;
  font-size: 36px; font-weight: 700; color: #fff;
  letter-spacing: 0; line-height: 1.12;
}
.hero-left p {
  max-width: 560px;
  font-size: 14px; color: rgba(255,255,255,.82); line-height: 1.7; margin-top: 8px;
}
.hero-stats {
  display: flex; gap: 12px; flex-wrap: wrap;
}
.stat-chip {
  display: flex; flex-direction: column; align-items: center;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  border-radius: 12px; padding: 10px 18px; min-width: 80px;
}
.stat-chip .num {
  font-family: 'DM Mono', monospace;
  font-size: 22px; font-weight: 500; color: #fff;
  line-height: 1;
}
.stat-chip .lbl {
  font-size: 10px; color: rgba(255,255,255,.68); margin-top: 4px;
  letter-spacing: .5px;
}
.stat-chip.highlight { border-color: rgba(255,255,255,.36); background: rgba(255,255,255,.18); }
.stat-chip.highlight .num { color: #fff; }

/* ── Overall Progress Bar ── */
.overall-progress {
  background: #fff; border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
  margin-bottom: 32px;
  display: flex; align-items: center; gap: 16px;
}
.overall-progress .label {
  font-size: 12px; font-weight: 600; color: var(--ink2);
  white-space: nowrap; min-width: 68px;
}
.op-bar-bg {
  flex: 1; height: 8px; background: var(--cream3);
  border-radius: 99px; overflow: hidden;
}
.op-bar-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--teal), var(--teal-l));
  transition: width .8s cubic-bezier(.4,0,.2,1);
}
.overall-progress .pct {
  font-size: 12px; font-family: 'DM Mono', monospace;
  color: var(--teal); font-weight: 500; white-space: nowrap;
}

/* ── Continue Banner ── */
.continue-banner {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
  border-radius: var(--radius); padding: 14px 20px; margin-bottom: 32px;
  text-decoration: none; color: #fff;
  box-shadow: 0 4px 20px rgba(13,148,136,.25);
  transition: transform .15s, box-shadow .15s;
}
.continue-banner:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 28px rgba(13,148,136,.35);
}
.continue-banner .cb-left { display: flex; align-items: center; gap: 12px; }
.continue-banner .cb-icon { font-size: 22px; }
.continue-banner .cb-title {
  font-size: 13px; font-weight: 600; opacity: .8; letter-spacing: .3px;
}
.continue-banner .cb-name { font-size: 16px; font-weight: 700; margin-top: 1px; }
.continue-banner .cb-arrow { font-size: 20px; opacity: .7; }

/* ── Plan Banner ── */
.plan-banner {
  display: flex; align-items: center; justify-content: space-between;
  border-radius: var(--radius); padding: 14px 20px; margin-bottom: 36px;
  gap: 12px;
}
.plan-banner.premium {
  background: var(--teal-bg); border: 1px solid #99f6e4;
}
.plan-banner.free {
  background: var(--amber-bg); border: 1px solid #fde68a;
}
.plan-info { display: flex; align-items: center; gap: 10px; }
.plan-icon { font-size: 22px; }
.plan-text { font-size: 13px; }
.plan-text strong { display: block; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.plan-text span { color: var(--ink3); font-size: 12px; }
.upgrade-btn {
  font-size: 12px; font-weight: 600;
  background: var(--amber); color: #fff;
  border: none; border-radius: 8px;
  padding: 7px 16px; cursor: pointer; text-decoration: none;
  transition: background .15s; white-space: nowrap; flex-shrink: 0;
}
.upgrade-btn:hover { background: #b45309; }

/* ── Section Header ── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; margin-top: 12px;
}
.section-label {
  font-size: 9px; font-family: 'DM Mono', monospace;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--ink3);
  display: flex; align-items: center; gap: 10px;
}
.section-label::after {
  content: ''; display: block; width: 40px;
  height: 1px; background: var(--border);
}
.section-count {
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--ink3); background: var(--cream2);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 2px 8px;
}

/* ── Timeline ── */
.timeline {
  position: relative;
  padding-left: 32px;
  margin-bottom: 48px;
}
.timeline::before {
  content: '';
  position: absolute; left: 10px; top: 8px; bottom: 8px;
  width: 2px;
  background: linear-gradient(180deg, var(--teal) 0%, var(--border) 100%);
}
.timeline.locked-section::before {
  background: var(--border);
}

/* ── Unit Card ── */
.unit-card {
  position: relative;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  text-decoration: none; color: inherit; display: block;
  animation: fadeSlideIn .3s ease both;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}
.unit-card:hover {
  border-color: var(--teal);
  box-shadow: var(--shadow-lg);
  transform: translateX(4px);
}
.unit-card.locked {
  cursor: default; opacity: .65;
  background: var(--cream);
}
.unit-card.locked:hover {
  border-color: var(--border); box-shadow: none; transform: none;
}
.unit-card.completed {
  border-color: #99f6e4; background: var(--teal-bg);
}
.unit-card.in-progress {
  border-color: var(--amber-l);
  background: linear-gradient(to right, #fffbeb, #fff);
}

/* Timeline dot */
.unit-card::before {
  content: '';
  position: absolute; left: -26px; top: 20px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--border2); border: 2px solid var(--cream);
  transition: background .2s, transform .2s;
}
.unit-card:hover::before { transform: scale(1.2); }
.unit-card.completed::before  { background: var(--teal); }
.unit-card.in-progress::before { background: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,.15); }
.unit-card.locked::before { background: var(--border); }

/* Card body */
.card-main {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.diff-badge {
  font-size: 10px; font-weight: 700; font-family: 'DM Mono', monospace;
  padding: 4px 9px; border-radius: 7px; letter-spacing: .5px;
  flex-shrink: 0; line-height: 1.2;
}
.diff-badge.kyu { background: #dbeafe; color: #1d4ed8; }
.diff-badge.dan  { background: #fef3c7; color: #92400e; }
.diff-badge.dan3 { background: #fde8ff; color: #7e22ce; }

.card-info { flex: 1; min-width: 0; }
.card-name {
  font-size: 14px; font-weight: 600; color: var(--ink);
  line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-sub {
  font-size: 11px; color: var(--ink3); margin-top: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.card-badge {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
}
.lock-icon { font-size: 15px; opacity: .5; }
.free-tag {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--teal);
  background: var(--teal-bg); border: 1px solid #99f6e4;
  border-radius: 5px; padding: 2px 7px;
}
.done-tag {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--teal);
  background: var(--teal-bg); border: 1px solid #99f6e4;
  border-radius: 5px; padding: 2px 7px;
}
.active-tag {
  font-size: 9px; font-weight: 700; letter-spacing: .5px;
  text-transform: uppercase; color: #92400e;
  background: #fef3c7; border: 1px solid #fde68a;
  border-radius: 5px; padding: 2px 7px;
}

/* Progress bar */
.progress-wrap {
  display: flex; align-items: center; gap: 10px;
}
.progress-bar-bg {
  flex: 1; height: 5px; background: var(--cream3);
  border-radius: 99px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--teal), var(--teal-l));
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.unit-card.locked .progress-bar-fill { background: var(--border2); }
.unit-card.in-progress .progress-bar-fill {
  background: linear-gradient(90deg, var(--amber), var(--amber-l));
}
.progress-text {
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--ink3); white-space: nowrap; min-width: 60px; text-align: right;
}

/* ── Skill Map ── */
.skill-map-shell {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.skill-map-intro {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
  background: rgba(255,255,255,.92);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px;
  box-shadow: var(--shadow);
}
.skill-map-intro h2 {
  font-size: 20px;
  line-height: 1.2;
  margin-bottom: 4px;
}
.skill-map-intro p {
  font-size: 13px;
  color: var(--ink3);
  line-height: 1.65;
}
.map-legend {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.legend-pill {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  border-radius: 99px;
  padding: 5px 9px;
  border: 1px solid var(--border);
  background: var(--cream);
  color: var(--ink3);
}
.legend-pill.done { background: var(--teal-bg); border-color: #99f6e4; color: var(--teal); }
.legend-pill.active { background: var(--amber-bg); border-color: #fde68a; color: var(--amber); }
.legend-pill.locked { background: var(--cream2); color: var(--border2); }
.ability-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.ability-card {
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  background: rgba(255,255,255,.94);
  box-shadow: var(--shadow);
  cursor: pointer;
  text-align: left;
  color: inherit;
  transition: transform .15s, border-color .15s, box-shadow .15s, background .15s;
}
.ability-card:hover {
  transform: translateY(-2px);
  border-color: var(--teal);
  box-shadow: var(--shadow-lg);
}
.ability-card.active {
  border-color: var(--teal);
  background: var(--teal-bg);
  box-shadow: 0 0 0 4px rgba(13,148,136,.08), var(--shadow);
}
.ability-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.ability-mark {
  width: 34px;
  height: 34px;
  border-radius: 12px;
  background: var(--cream2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--teal);
}
.ability-card.active .ability-mark {
  background: #fff;
  border-color: #99f6e4;
}
.ability-pct {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--teal);
}
.ability-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
}
.ability-sub {
  font-size: 11px;
  color: var(--ink3);
  line-height: 1.45;
  min-height: 32px;
  margin-top: 5px;
}
.ability-mini-bar {
  height: 5px;
  border-radius: 99px;
  background: var(--cream3);
  overflow: hidden;
  margin-top: 12px;
}
.ability-mini-bar span {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--teal), var(--teal-l));
}
.skill-lane {
  background: rgba(255,255,255,.94);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  box-shadow: var(--shadow);
  transition: border-color .18s, box-shadow .18s, transform .18s;
}
.skill-lane.focused {
  border-color: var(--teal);
  box-shadow: 0 0 0 4px rgba(13,148,136,.08), var(--shadow-lg);
}
.lane-head {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: center;
  margin-bottom: 14px;
}
.lane-mark {
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: var(--teal-bg);
  border: 1px solid #99f6e4;
  color: var(--teal);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  font-weight: 700;
}
.lane-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
}
.lane-sub {
  font-size: 12px;
  color: var(--ink3);
  margin-top: 3px;
}
.lane-score {
  text-align: right;
  font-family: 'DM Mono', monospace;
  color: var(--ink3);
  font-size: 11px;
}
.lane-score strong {
  display: block;
  color: var(--teal);
  font-size: 18px;
  line-height: 1.1;
}
.stage-grid {
  display: grid;
  grid-template-columns: repeat(10, minmax(0, 1fr));
  gap: 8px;
}
.stage-node {
  min-height: 154px;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 11px 10px;
  background: var(--cream);
  color: inherit;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
  transition: transform .15s, border-color .15s, box-shadow .15s, background .15s;
}
.stage-node:hover {
  transform: translateY(-2px);
  border-color: var(--teal);
  box-shadow: var(--shadow);
}
.stage-node.completed {
  background: var(--teal-bg);
  border-color: #99f6e4;
}
.stage-node.in-progress {
  background: var(--amber-bg);
  border-color: #fde68a;
}
.stage-node.locked {
  opacity: .56;
  background: var(--cream2);
}
.stage-node.empty {
  opacity: .38;
  pointer-events: none;
}
.stage-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.stage-lv {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
}
.stage-status {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--ink3);
}
.stage-name {
  font-size: 11px;
  color: var(--ink3);
  line-height: 1.35;
}
.stage-progress {
  margin-top: auto;
  height: 5px;
  border-radius: 99px;
  background: var(--cream3);
  overflow: hidden;
}
.stage-progress span {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--teal), var(--teal-l));
}
.stage-node.in-progress .stage-progress span {
  background: linear-gradient(90deg, var(--amber), var(--amber-l));
}
.stage-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink3);
  white-space: nowrap;
}
/* ── Rank badge inside stage node ── */
.stage-rank-badge {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 99px;
  background: rgba(13,148,136,.10);
  color: var(--teal);
  border: 1px solid rgba(13,148,136,.25);
  letter-spacing: .3px;
  align-self: flex-start;
}
.stage-rank-badge.dan {
  background: rgba(220,38,38,.09);
  color: #dc2626;
  border-color: rgba(220,38,38,.22);
}
.stage-node.completed .stage-rank-badge {
  background: rgba(13,148,136,.18);
}
.stage-node.empty .stage-rank-badge {
  opacity: .5;
  background: var(--cream2);
  color: var(--ink3);
  border-color: var(--border);
}
.stage-empty-msg {
  font-size: 10px;
  color: var(--ink3);
  opacity: .6;
  font-style: italic;
  margin-top: auto;
}
/* Remove min-height on empty node so it stays compact */
.stage-node.empty {
  min-height: 80px !important;
  gap: 5px;
}

/* Ability card LV range badge */
.ability-lv-range {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 6px;
  background: var(--cream2);
  color: var(--ink3);
  border: 1px solid var(--border);
}

}

  height: 82px; background: #fff;
  border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 10px; overflow: hidden; position: relative;
}
.skeleton-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.7) 50%, transparent 100%);
  animation: shimmer 1.4s infinite;
}

  from { transform: translateX(-100%); }
  to   { transform: translateX(100%); }

  font-weight: 900;
  letter-spacing: .08em;
}
.guild-attr-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 7px;
}
.guild-attr {
  min-width: 0;
  padding: 7px 4px 8px;
  text-align: center;
  border: 1px solid rgba(251,191,36,.18);
  background: linear-gradient(180deg, rgba(251,191,36,.08), rgba(0,0,0,.24));
  box-shadow: inset 0 0 14px rgba(255,255,255,.035);
}
.guild-attr img {
  display: block;
  width: 36px;
  height: 36px;
  margin: 0 auto 3px;
  object-fit: contain;
  filter: drop-shadow(0 0 8px rgba(251,191,36,.2));
}
.guild-attr-name {
  display: block;
  color: rgba(255,246,224,.72);
  font-size: 11px;
  line-height: 1.15;
}
.guild-attr-value {
  display: block;
  margin-top: 3px;
  color: #f8e7bd;
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  font-weight: 900;
}
.reward-toast {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 200;
  min-width: 220px;
  padding: 14px 18px;
  border-radius: 10px;
  border: 2px solid #c2a050;
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,.02) 0 2px, transparent 2px 5px),
    radial-gradient(120% 100% at 28% -10%, #25446b 0%, #163052 48%, #0e2240 100%);
  box-shadow: inset 0 0 0 4px rgba(7,16,32,.9), inset 0 0 0 5px rgba(196,162,82,.55), 0 18px 40px rgba(0,0,0,.5);
  color: #ece3cf;
  transform: translateY(140%);
  opacity: 0;
  transition: transform .45s cubic-bezier(.2,.9,.3,1.2), opacity .45s;
}
.reward-toast.show { transform: translateY(0); opacity: 1; }
.reward-toast .rt-title { font-family:'Noto Serif TC',serif; font-weight:900; font-size:14px; color:#e9c46a; margin-bottom:4px; }
.reward-toast .rt-body { font-size:13px; }
.reward-toast .rt-coin { color:#f0c75a; font-weight:700; }
.reward-toast .rt-xp { color:#7fe3c0; font-weight:700; }
.hero-wallet {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.hero-wallet .hw-item {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 7px 6px;
  border-radius: 8px;
  border: 1px solid rgba(201,161,74,.32);
  background: rgba(5,11,12,.42);
  font-size: 12px;
  color: rgba(255,246,224,.7);
}
.hero-wallet .hw-item strong {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
}
.hero-wallet .hw-coin strong { color: #f0c75a; }
.hero-wallet .hw-xp strong { color: #7fe3c0; }
.guild-side-summary {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.guild-side-stat {
  padding: 8px 7px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(0,0,0,.16);
  font-size: 11px;
  color: rgba(255,246,224,.62);
}
.guild-side-stat strong {
  display: block;
  margin-top: 2px;
  color: #f8e7bd;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}
/* ── 移入右側主角欄的「公會聲望 / 公會通行證」── */
.guild-side .overall-progress,
.guild-side .plan-banner {
  width: 100%;
  box-sizing: border-box;
  margin: 12px 0 0;
  border-radius: 8px;
  background: rgba(5,11,12,.42);
  border: 1px solid rgba(251,191,36,.22);
  box-shadow: none;
}
.guild-side .overall-progress {
  padding: 10px 14px;
  gap: 10px;
  min-height: 0;
}
.guild-side .overall-progress .label {
  color: rgba(255,246,224,.72);
  min-width: auto;
}
.guild-side .op-bar-bg { background: rgba(255,255,255,.12); }
.guild-side .overall-progress .pct { color: #5eead4; }
.guild-side .plan-banner,
.guild-side .plan-banner.free,
.guild-side .plan-banner.premium {
  padding: 10px 14px;
  flex-wrap: wrap;
  gap: 8px;
  background: rgba(5,11,12,.42);
  border-color: rgba(251,191,36,.22);
}
.guild-side .plan-text strong { color: #f8e7bd; }
.guild-side .plan-text span { color: rgba(248,231,189,.7); }
.guild-side .plan-banner .upgrade-btn { font-size: 11px; padding: 5px 11px; }
/* ── 公會委託榜（佈告欄）─────────────────────────────── */
.quest-board {
  position: relative;
  border-radius: 14px;
  padding: 16px 16px 20px;
  margin-bottom: 20px;
  background: url('assets/guild_ui/qb_board_bg.webp') center/cover no-repeat #2b1a0e;
  border: 3px solid #4a3218;
  box-shadow: inset 0 0 0 2px rgba(0,0,0,.45), 0 14px 38px rgba(0,0,0,.45);
}
.qb-head {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin: 0 0 16px;
}
.qb-sign-wrap {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
}
.qb-sign-img {
  height: 62px;
  mix-blend-mode: screen;
  pointer-events: none;
  filter: brightness(1.05);
}
.qb-sign-text {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none; gap: 1px;
}
.qb-title {
  font-family: 'Noto Serif TC', serif;
  font-weight: 900; font-size: 17px; color: #f5e8c0;
  text-shadow: 0 1px 4px rgba(0,0,0,.7);
  letter-spacing: 2px; line-height: 1;
}
.qb-title-en {
  font-family: 'DM Mono', monospace; font-size: 9px;
  color: rgba(240,214,146,.7); letter-spacing: 3px;
}
.qb-count {
  margin-left: auto; font-size: 11px; color: rgba(255,246,224,.6);
}
.qb-count strong { color: #f0c75a; font-family: 'DM Mono', monospace; }
.qb-section-label {
  display: flex; align-items: center; gap: 8px;
  margin: 14px 4px 8px;
  font-family: 'Noto Serif TC', serif; font-weight: 700;
  font-size: 12px; color: rgba(240,214,146,.85); letter-spacing: 2px;
}
.qb-section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(201,161,74,.45), transparent);
}
.qb-section-label .qb-badge-n {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: #20120a; background: #e9c46a; border-radius: 99px;
  padding: 0 7px; line-height: 16px;
}
.qb-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(228px, 1fr));
  gap: 13px;
  align-items: stretch;
}
.quest-card {
  position: relative;
  display: flex; flex-direction: column; gap: 6px;
  border-radius: 6px;
  padding: 16px 14px 12px;
  background-image: url('assets/guild_ui/qb_parchment.webp');
  background-size: 100% 100%;
  background-color: #f0e2bb;
  background-blend-mode: soft-light;
  border: 1px solid #b8965a;
  box-shadow: 0 6px 18px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.3);
  color: var(--ink);
  transform: rotate(-.55deg);
  transition: transform .18s, box-shadow .18s;
}
.qb-cards .quest-card:nth-child(2n)   { transform: rotate(.5deg); }
.qb-cards .quest-card:nth-child(3n)   { transform: rotate(-.25deg); }
.quest-card:hover { transform: rotate(0deg) translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.35); z-index: 2; }
/* 圖釘：img 元素，::before 只作後備 */
.quest-card::before {
  content: none;
}
.qc-pin-img {
  position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  width: 28px; height: 28px;
  object-fit: contain;
  mix-blend-mode: multiply;
  pointer-events: none;
  filter: drop-shadow(0 3px 4px rgba(0,0,0,.5));
  z-index: 10;
}
.qc-top { display: flex; align-items: center; gap: 8px; }
.qc-crest { width: 34px; height: 34px; flex: none; }
.qc-crest img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 2px 2px rgba(0,0,0,.2)); }
.qc-titles { min-width: 0; }
.qc-name {
  font-family: 'Noto Serif TC', serif; font-weight: 900;
  font-size: 14px; line-height: 1.25; color: #2b1a0e;
}
.qc-sub { font-size: 10.5px; color: var(--ink3); margin-top: 1px; }
.qc-rank { /* 蠟封難度章 */
  position: relative;
  margin-left: auto; flex: none;
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  transform: rotate(8deg);
  box-shadow: 0 3px 6px rgba(0,0,0,.45);
}
.qc-seal-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 50%;
}
.qc-rank-text {
  position: relative; z-index: 1;
  font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700;
  color: #ffe8e8; text-align: center; line-height: 1.05;
  text-shadow: 0 1px 3px rgba(0,0,0,.7);
  padding: 0 2px;
}
.qc-prog { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
.qc-prog-bg { flex: 1; height: 7px; border-radius: 99px; background: rgba(107,87,64,.22); overflow: hidden; }
.qc-prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--teal), var(--teal-l)); }
.qc-prog-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink3); white-space: nowrap; }
.qc-reward {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  font-size: 12px; padding-top: 7px; margin-top: auto;
  border-top: 1px dashed rgba(107,87,64,.35);
}
.qc-reward .rw-label { font-size: 10px; color: var(--ink3); letter-spacing: 1px; }
.qc-reward .rw-coin { color: #92400e; font-weight: 700; display: flex; align-items: center; gap: 3px; }
.qc-reward .rw-xp  { color: #065f46; font-weight: 700; display: flex; align-items: center; gap: 3px; }
.qc-range {
  align-self: flex-start;
  padding: 3px 7px;
  border-radius: 999px;
  background: rgba(120, 67, 18, .11);
  color: #6b3f12;
  font-size: 10.5px;
  font-weight: 700;
  white-space: nowrap;
}
.qc-icon-coin {
  width: 18px; height: 18px;
  border-radius: 50%; object-fit: cover;
  flex: none;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.3));
}
.qc-icon-star {
  width: 17px; height: 17px;
  object-fit: contain; flex: none;
  mix-blend-mode: screen;
  filter: saturate(1.4) drop-shadow(0 1px 2px rgba(0,0,0,.2));
}
/* 寶箱按鈕 */
.qc-chest-wrap {
  display: inline-flex; align-items: center; gap: 7px;
}
.qc-chest-icon {
  width: 26px; height: 26px;
  object-fit: contain;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,.4));
  transition: transform .25s cubic-bezier(.2,.9,.3,1.3), filter .25s;
  flex: none;
}
.qc-chest-icon.opening {
  transform: scale(1.35);
  filter: drop-shadow(0 2px 8px rgba(240,195,80,.8));
}
.qc-btn {
  display: block; width: 100%; margin-top: 8px;
  text-align: center; text-decoration: none; cursor: pointer;
  font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 13px;
  padding: 8px 10px; border-radius: 7px; border: 1px solid transparent;
  transition: transform .12s, box-shadow .12s, filter .12s;
}
.qc-btn:hover { transform: translateY(-1px); filter: brightness(1.06); }
.qc-btn.accept {
  color: #fff7e6; background: linear-gradient(180deg, #8a5a2b, #6b421c);
  border-color: #a8743d; box-shadow: 0 3px 8px rgba(0,0,0,.3);
}
.qc-btn.go {
  color: #f0fdfa; background: linear-gradient(180deg, #0f9488, #0c6e64);
  border-color: #2dd4bf; box-shadow: 0 3px 8px rgba(13,148,136,.35);
}
.qc-btn.claim {
  color: #451a03; background: linear-gradient(180deg, #fbd06d, #e9a83a);
  border-color: #fde68a; box-shadow: 0 3px 12px rgba(233,168,58,.5);
}
.qc-abandon {
  position: absolute; top: 6px; right: 8px;
  font-size: 11px; color: rgba(107,87,64,.55); cursor: pointer;
  background: none; border: none; padding: 2px 4px;
}
.qc-abandon:hover { color: var(--red); }
/* 進行中：紅印章（蓋在卡片中央，像公文章） */
.quest-card.accepted .qc-stamp {
  position: absolute; top: 44%; left: 50%;
  font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 15px;
  color: rgba(185,28,28,.5); border: 2.5px solid rgba(185,28,28,.42);
  border-radius: 5px; padding: 2px 10px; letter-spacing: 5px;
  transform: translate(-50%, -50%) rotate(-14deg);
  pointer-events: none; white-space: nowrap;
}
/* 可回報：金光呼吸 */
.quest-card.claimable {
  border-color: #e9c46a;
  animation: qcGlow 1.8s ease-in-out infinite;
}
@keyframes qcGlow {
  0%, 100% { box-shadow: inset 0 0 0 1px rgba(255,255,255,.5), 0 6px 16px rgba(0,0,0,.45), 0 0 0 0 rgba(233,196,106,.0); }
  50%      { box-shadow: inset 0 0 0 1px rgba(255,255,255,.5), 0 6px 16px rgba(0,0,0,.45), 0 0 22px 4px rgba(233,196,106,.55); }
}
.quest-card.claimable::after {
  content: '✦';
  position: absolute; top: 8px; right: 10px;
  color: #d97706; font-size: 14px;
  animation: qcSpin 2.6s linear infinite;
}
@keyframes qcSpin { to { transform: rotate(360deg); } }
/* 長老推薦 */
.quest-card.recommended { border: 1.5px solid #c9a14a; }
.qc-recommend-tag {
  position: absolute; top: -9px; left: 10px;
  font-family: 'Noto Serif TC', serif; font-weight: 700; font-size: 10px;
  color: #451a03; background: linear-gradient(180deg, #f5d889, #dfb054);
  border: 1px solid #b98a36; border-radius: 4px;
  padding: 1px 8px; letter-spacing: 2px;
  box-shadow: 0 2px 5px rgba(0,0,0,.35);
}
/* 每日急件（小卡） */
.quest-card.daily { padding: 12px 12px 10px; }
.quest-card.daily .qc-name { font-size: 13px; }
.quest-card.daily .qc-icon { font-size: 22px; flex: none; filter: drop-shadow(0 2px 2px rgba(0,0,0,.18)); }
.quest-card.daily.done {
  filter: saturate(.55);
  opacity: .82;
}
.quest-card.daily.done::after {
  content: '✓';
  position: absolute; right: 12px; bottom: 10px;
  font-size: 26px; font-weight: 900; color: rgba(13,148,136,.8);
  transform: rotate(-8deg);
}
.qc-daily-xp { margin-left: auto; font-size: 11px; font-weight: 700; color: #0f766e; white-space: nowrap; }
.qc-daily-coin { margin-left: auto; font-size: 11px; font-weight: 800; color: #92400e; white-space: nowrap; }
.qc-daily-coin + .qc-daily-xp { margin-left: 6px; }
/* 公會制霸（全學科無可接委託時） */
.qb-empty {
  text-align: center; padding: 18px 12px; font-size: 13px;
  color: rgba(240,214,146,.75); font-family: 'Noto Serif TC', serif;
}
/* ── 右欄「當前委託」追蹤器 ── */
.guild-quest-tracker { margin-top: 12px; }
.gqt-title {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px;
  color: rgba(240,214,146,.6); margin-bottom: 7px;
}
.gqt-item {
  display: block; text-decoration: none;
  padding: 7px 9px; margin-bottom: 6px;
  border: 1px solid rgba(201,161,74,.3); border-radius: 7px;
  background: rgba(5,11,12,.42);
  transition: border-color .15s, background .15s;
}
.gqt-item:hover { border-color: rgba(233,196,106,.7); background: rgba(5,11,12,.6); }
.gqt-name { font-size: 11.5px; color: #f8e7bd; font-weight: 600; }
.gqt-bar { height: 4px; border-radius: 99px; background: rgba(255,255,255,.12); margin-top: 5px; overflow: hidden; }
.gqt-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #e9c46a, #f0c75a); }
.gqt-num { font-family: 'DM Mono', monospace; font-size: 9.5px; color: rgba(255,246,224,.55); margin-top: 3px; display: block; }
.gqt-item.claimable .gqt-name::after { content: ' ✦ '; color: #f0c75a; }
.gqt-empty { font-size: 11px; color: rgba(255,246,224,.45); padding: 4px 2px; }
/* 飛行金幣 / 領賞動效 */
.coin-fly {
  position: fixed; z-index: 320; font-size: 17px; pointer-events: none;
  transition: transform .85s cubic-bezier(.3,-.2,.6,1), opacity .85s ease-in;
  will-change: transform;
}
.hero-wallet .hw-item.bump { animation: hwBump .5s ease; }
@keyframes hwBump {
  0% { transform: scale(1); }
  35% { transform: scale(1.16); box-shadow: 0 0 14px rgba(240,199,90,.65); }
  100% { transform: scale(1); }
}
@media (max-width: 640px) {
  .quest-board { padding: 12px 10px 16px; }
  .qb-cards { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .quest-card { padding: 13px 11px 10px; }
  .qc-rank { width: 32px; height: 32px; font-size: 8px; }
}
.skill-map-intro {
  display: none;
  position: relative;
  border: none;
  border-radius: 10px;
  background:
    url('assets/guild_ui/quest_card.png') center center / 100% 100% no-repeat;
  box-shadow: 0 16px 32px rgba(0,0,0,.26);
  padding: 28px 30px;
}
.skill-map-intro::before {
  content: '';
  position: absolute;
  left: 50%;
  top: -16px;
  width: 56px;
  height: 56px;
  transform: translateX(-50%);
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ffefe0, #9f1239 36%, #4c0519 100%);
  box-shadow: 0 8px 18px rgba(0,0,0,.35);
}
.skill-map-intro h2 {
  font-family: 'Noto Serif TC', serif;
  font-size: 25px;
  color: #2b170c;
}
.skill-map-intro p {
  max-width: 780px;
  color: #4a2b12;
  font-family: 'Noto Serif TC', serif;
}
.map-legend {
  align-self: end;
}
.legend-pill {
  background: rgba(255,255,255,.32);
  border-color: rgba(74,43,18,.2);
  color: #4a2b12;
}
.ability-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
}
.ability-card {
  min-height: 0;
  border-radius: 10px;
  border: none;
  background:
    url('assets/guild_ui/quest_card.png') center center / 100% 100% no-repeat;
  box-shadow: 0 14px 26px rgba(0,0,0,.3);
  position: relative;
  overflow: hidden;
  padding: 18px 14px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 5px;
}
.ability-card::before,
.ability-card::after {
  content: '';
  position: absolute;
  width: 12px;

  box-shadow: inset 0 0 0 1px rgba(0,0,0,.28);
}
.ability-card::before { left: 10px; top: 10px; }
.ability-card::after { right: 10px; top: 10px; }
.ability-card:hover,
.ability-card.active {
  background:
    url('assets/guild_ui/quest_card.png') center center / 100% 100% no-repeat;
  box-shadow: 0 0 0 3px rgba(251,191,36,.24), 0 22px 42px rgba(0,0,0,.42);
}
.ability-card-top {
  display: contents;
}
.ability-mark {
  width: 92px;
  height: 78px;
  display: block;
  border-radius: 12px;
  overflow: hidden;
  background: none !important;
  border: 2px solid rgba(201,161,74,.7) !important;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,.35),
    0 5px 12px rgba(0,0,0,.4) !important;
  margin-bottom: 3px;
}
.ability-mark img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.ability-pct {
  position: absolute;
  top: 11px;
  right: 13px;
  font-size: 14px;
}
.ability-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  line-height: 1.2;
  color: #2b170c;
}
.ability-sub {
  color: #67431e;
  font-size: 11px;
  line-height: 1.4;
}
.ability-quest {
  display: none;
}
.ability-mini-bar {
  width: 100%;
  margin-top: 8px;
}
/* ── 下關委託獎勵列 ── */
.ability-reward {
  font-size: 11px;
  font-weight: 600;
  color: #5b3a18;
  letter-spacing: .2px;
  line-height: 1.4;
  white-space: nowrap;
}
.ability-reward .rw-next { color: #7c5a2a; }
.ability-reward .rw-coin { color: #b8860b; }
.ability-reward .rw-xp   { color: #2f8f6b; }
.ability-reward .rw-attr { color: #b4533a; }
.ability-reward .rw-master { color: #b8860b; font-weight: 800; }
.ability-reward .rw-lock { color: #8a7a63; }
/* ── 寶石進度條（每關一顆，通關點亮）── */
.ability-gems {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 5px;
  width: 100%;
  margin-top: 9px;
}
.gem {
  width: 11px;
  height: 11px;
  transform: rotate(45deg);
  border-radius: 2px;
  background: rgba(70,48,22,.18);
  box-shadow: inset 0 0 0 1px rgba(80,55,25,.55), inset 0 1px 2px rgba(0,0,0,.25);
}
.gem.lit {
  background: radial-gradient(circle at 32% 28%, #ffffff, var(--gem, #fbbf24) 62%, rgba(0,0,0,.25));
  box-shadow:
    0 0 6px var(--gem, #fbbf24),
    inset 0 0 0 1px rgba(255,255,255,.6),
    inset -1px -1px 2px rgba(0,0,0,.3);
}
.skill-lane.focused {
  border-radius: 8px;
  border: none;
  background:
    url('assets/guild_ui/quest_card.png') center top / 100% 100% no-repeat;
  padding: 18px;
  box-shadow: 0 18px 34px rgba(0,0,0,.26);
}
.lane-head {
  border-bottom: 1px solid rgba(92,64,33,.18);
  padding-bottom: 14px;
}
.lane-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
}
.stage-node {
  border-radius: 8px;
  background: linear-gradient(180deg, #fff4d6, #ead0a0);
  border-color: rgba(78,52,25,.24);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.34);
}
.stage-node.in-progress {
  background: linear-gradient(180deg, #fff7e6, #f6d58f);
}
.stage-node.completed {
  background: linear-gradient(180deg, #ecfdf5, #b7e3d7);
}
.stage-node.locked,
.stage-node.empty {
  background: rgba(216,200,172,.74);
}
.stage-lv,
.stage-count,
.stage-boss-chip {
  font-family: 'DM Mono', monospace;
}

/* ── LV1–LV10 木牌吊旗（取代原關卡格）── */
.stage-grid {
  display: grid;
  grid-template-columns: repeat(10, minmax(0, 1fr));
  gap: 7px;
  align-items: start;
  padding-top: 10px;
}
.stage-node {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-height: 0 !important;
  padding: 11px 3px 24px;
  text-decoration: none;
  color: #4a2f12;
  background: linear-gradient(180deg, #f4e4be 0%, #ecd6a4 70%, #e3c98f 100%) !important;
  border: 1px solid rgba(150,110,50,.45);
  border-radius: 6px 6px 0 0;
  clip-path: polygon(0 0, 100% 0, 100% 86%, 50% 100%, 0 86%);
  box-shadow: 0 8px 15px rgba(0,0,0,.32);
  transition: transform .12s ease;
}
.stage-node::before {
  content: '';
  position: absolute;
  top: -5px; left: 50%; transform: translateX(-50%);
  width: 112%; height: 11px;
  border-radius: 3px;
  background: linear-gradient(180deg, #8a5e34, #4a3017);
  box-shadow: 0 2px 5px rgba(0,0,0,.45);
}
.stage-node:hover { transform: translateY(-3px); }
.stage-icon {
  width: 86%;
  aspect-ratio: 1 / 1;
  margin-top: 3px;
  display: grid;
  place-items: center;
}
.stage-icon img {
  width: 100%; height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.3));
}
.stage-lv {
  font-family: 'Cinzel', 'Noto Serif TC', serif !important;
  font-weight: 700;
  font-size: 14px;
  color: #4a2f12;
}
.stage-rank-badge {
  font-size: 9px;
  color: #836138;
  background: none !important;
  border: none !important;
  padding: 0 !important;
  min-width: 0 !important;
}
.stage-gem {
  width: 14px; height: 14px;
  transform: rotate(45deg);
  border-radius: 3px;
  background: radial-gradient(circle at 32% 28%, #fff, var(--g, #c8803c) 62%, rgba(0,0,0,.25));
  box-shadow: 0 0 7px var(--g, #c8803c), inset 0 0 0 1px rgba(255,255,255,.55), inset -1px -1px 2px rgba(0,0,0,.3);
  margin-top: 2px;
}
.stage-node.completed { box-shadow: 0 8px 15px rgba(0,0,0,.32), 0 0 0 2px rgba(70,190,110,.55); }
.stage-node.in-progress { box-shadow: 0 8px 15px rgba(0,0,0,.32), 0 0 0 2px rgba(230,180,70,.5); }
.stage-node.locked { filter: grayscale(.65) brightness(.82); }
.stage-node.locked .stage-gem,
.stage-node.empty .stage-gem { background: rgba(80,60,30,.4) !important; box-shadow: inset 0 0 0 1px rgba(0,0,0,.3) !important; }
.stage-node.empty { opacity: .5; }
.stage-flag {
  position: absolute; top: 5px; right: 6px;
  font-size: 12px; z-index: 3; line-height: 1;
}
.stage-flag.done { color: #1a8f3a; text-shadow: 0 0 3px rgba(255,255,255,.6); }
.stage-empty-msg { font-size: 9px; color: #8a6a40; }

/* ── Responsive ── */

function getGuildCombatGear() {
  const def = { character:'apprentice', armor:'cloth', cape:'none', weapon:'none', offhand:'none', hat:'none', pet:'none', aura:'none', acc:'none' };
  let g;
  try { g = { ...def, ...JSON.parse(localStorage.getItem(GUILD_COMBAT_STORAGE_KEY) || '{}') }; }
  catch { g = { ...def }; }
  if (!GUILD_CHARACTER_ART[g.character]) g.character = 'apprentice';   // 舊存檔的角色 key → 退回見習生
  return g;
}

// 裝備/配件 key 形如 'armor_t3' / 'hat_t2'；預設階(cloth/none)無圖檔
function guildCombatGearAssetSrc(slot, key) {
  if (!/_t\d+$/.test(key || '')) return '';
  const root = GUILD_ACCESSORY_SLOTS.includes(slot) ? GUILD_HERO_ACCESSORY_ROOT : GUILD_HERO_GEAR_ROOT;
  return `${root}${key}.webp`;
}

function setGuildHeroLayer(id, slot, key) {
  const layer = document.getElementById(id);
  if (!layer) return;
  const src = guildCombatGearAssetSrc(slot, key);
  if (!src) {
    layer.removeAttribute('src');
    layer.classList.remove('active');
    layer.dataset.gear = 'none';
    return;
  }
  layer.src = src;
  layer.dataset.gear = key;
  layer.classList.add('active');
}

function renderGuildHeroAvatar() {
  const gear = getGuildCombatGear();

  const art = GUILD_CHARACTER_ART[gear.character] || GUILD_CHAR_FALLBACK_ART;
  stage.dataset.character = gear.character;
  character.onerror = () => { character.onerror = null; character.src = GUILD_HERO_CHARACTER_ROOT + GUILD_CHAR_FALLBACK_ART; };

function isDan(diff) { const s = String(diff||''); return s.endsWith('d'); }
function isHighDan(diff) {
  if (!isDan(diff)) return false;
  const n = parseInt(diff);

}

function diffBadge(diff) {
  if (diff === '' || diff === null || diff === undefined) return '';
  const s = String(diff);
  // KataGo 整數難度 1-10：紫色標籤；kyu/dan：原配色
  const isInt = /^\d+$/.test(s) && !s.endsWith('k') && !s.endsWith('d');
  const cls = isInt ? 'int-diff' : isHighDan(s) ? 'dan3' : isDan(s) ? 'dan' : 'kyu';
  return `<span class="diff-badge ${cls}">${s}</span>`;
}

function stageReward(stage) {
  const lv = parseInt(String(stage).replace(/\D/g, '')) || 1;
  const coins = 20 + (lv - 1) * 12;
  return { coins, xp: Math.round(coins * 1.5) };
}
function questKey(u) { return u.quest_key || u.stage_key || `${u.discipline}::${u.stage}`; }
function questReward(unit) {
  const base = stageReward(unit.stage);
  return {
    coins: Number(unit.coins != null ? unit.coins : base.coins),
    xp: Number(unit.xp != null ? unit.xp : base.xp),
  };
}
function questRangeText(unit) {
  if (!unit.range_start || !unit.range_end) return '';
  const idx = unit.segment_index ? ` #${unit.segment_index}` : '';
  const unit_word = _isEnCur() ? ` pcs` : '題';
  return `${idx} · ${unit.range_start}-${unit.range_end}${unit_word}`;
}
function questUnitFromApi(q) {
  if (!q) return null;
  const discipline = q.discipline || 'whole_board';
  const stage = q.stage || 'LV2';
  const key = q.quest_key || q.stage_key || `${discipline}::${stage}`;
  return {
    ...q,
    quest_key: key,
    stage_key: q.stage_key || key,
    discipline,
    stage,
    practiced: Number(q.practiced || 0),
    total: Number(q.total || 0),
    coins: Number(q.coins || 0),
    xp: Number(q.xp || 0),
    href: q.href || `/?discipline=${encodeURIComponent(discipline)}&stage=${encodeURIComponent(stage)}&quest=${encodeURIComponent(key)}&resume=1`,
  };
}
function questLookup(unitStats) {
  const nonAgg = (unitStats || []).filter(u => !u.aggregate);
  const byKey = new Map(nonAgg.map(u => [questKey(u), u]));
  [
    ...(_questBoard.open_quests || []),
    ...(_questBoard.quest_meta || []),
    ...(_questBoard.claimable || []),
  ].forEach(q => {
    const u = questUnitFromApi(q);
    if (u) byKey.set(questKey(u), u);
  });
  return byKey;
}

function buildQuestBoard(unitStats) {
  const nonAgg = unitStats.filter(u => !u.aggregate);
  const byKey = questLookup(unitStats);
  const acceptedSet = new Set(_questBoard.accepted || []);
  const claimableSet = new Set((_questBoard.claimable || []).map(c => c.stage_key));

  const grouped = new Map();
  nonAgg.forEach(u => {
    if (!grouped.has(u.discipline)) grouped.set(u.discipline, []);
    grouped.get(u.discipline).push(u);
  });
  // 各學科的「下一關」委託
  const nextByDisc = [];
  DISCIPLINE_ORDER.forEach(disc => {
    const items = (grouped.get(disc) || []).slice().sort((a, b) => a.stageOrder - b.stageOrder);
    const next = items.find(u => !u.completed && !u.locked);
    if (next) nextByDisc.push(next);
  });
  // 長老推薦：練習量最少的學科
  let recommendKey = null, minP = Infinity;
  nextByDisc.forEach(u => {
    const p = (grouped.get(u.discipline) || []).reduce((s, x) => s + (x.practiced || 0), 0);
    if (p < minP) { minP = p; recommendKey = questKey(u); }
  });

  const claimCards = (_questBoard.claimable || [])
    .map(c => byKey.get(c.stage_key)).filter(Boolean)
    .map(u => questCard(u, 'claim'));
  const activeUnits = [...acceptedSet]
    .filter(k => !claimableSet.has(k))
    .map(k => byKey.get(k)).filter(Boolean).filter(u => !u.completed);
  const activeCards = activeUnits.map(u => questCard(u, 'accepted'));
  const backendOpen = (_questBoard.open_quests || []).map(questUnitFromApi).filter(Boolean);
  const openSource = backendOpen.length ? backendOpen : nextByDisc;
  const openCards = openSource
    .filter(u => !acceptedSet.has(questKey(u)) && !claimableSet.has(questKey(u)))
    .map((u, idx) => questCard(u, 'open', { recommended: backendOpen.length ? idx === 0 : questKey(u) === recommendKey }));
  const dailyCards = (_dailyQuests || []).map(dailyQuestCard);

  const board = document.createElement('section');
  board.className = 'quest-board';
  board.id = 'quest-board';
  board.innerHTML = `<div class="qb-head">
    <div class="qb-sign-wrap">
      <img class="qb-sign-img" src="assets/guild_ui/qb_sign.webp" alt="" loading="eager" decoding="async">
      <div class="qb-sign-text">
        <span class="qb-title">${qbT('board_title')}</span>
        <span class="qb-title-en">BOUNTY BOARD</span>
      </div>
    </div>
    <span class="qb-count">${qbT('active_n')} <strong>${activeCards.length + claimCards.length}</strong></span>
  </div>`;
  const addSection = (label, cards) => {
    if (!cards.length) return;
    const lab = document.createElement('div');
    lab.className = 'qb-section-label';
    lab.innerHTML = `${label} <span class="qb-badge-n">${cards.length}</span>`;
    board.appendChild(lab);
    const grid = document.createElement('div');
    grid.className = 'qb-cards';
    cards.forEach(c => grid.appendChild(c));
    board.appendChild(grid);
  };
  addSection(qbT('sec_claim'), claimCards);
  addSection(qbT('sec_active'), activeCards);
  addSection(qbT('sec_daily'), dailyCards);
  addSection(qbT('sec_open'), openCards);
  if (!claimCards.length && !activeCards.length && !openCards.length && !dailyCards.length) {
    const empty = document.createElement('div');
    empty.className = 'qb-empty';
    empty.textContent = qbT('all_done');
    board.appendChild(empty);
  }
  return board;
}

function questTrackerHtml(unitStats) {
  const byKey = questLookup(unitStats);
  const claimSet = new Set((_questBoard.claimable || []).map(c => c.stage_key));
  const keys = [...new Set([...claimSet, ...(_questBoard.accepted || [])])];
  const items = keys.map(k => {
    const u = byKey.get(k);
    if (!u) return '';
    const isC = claimSet.has(k);
    if (!isC && u.completed) return '';
    const pct = u.total ? Math.round(u.practiced / u.total * 100) : 0;
    return `<a class="gqt-item${isC ? ' claimable' : ''}" href="${isC ? '#quest-board' : u.href}">
      <span class="gqt-name">${dLabel(u.discipline)} · ${u.stage}${questRangeText(u) ? ` · ${questRangeText(u)}` : ''}</span>
      <span class="gqt-bar"><span class="gqt-fill" style="width:${isC ? 100 : pct}%"></span></span>
      <span class="gqt-num">${isC ? qbT('cleared') : `${u.practiced.toLocaleString()} / ${u.total.toLocaleString()}`}</span>
    </a>`;
  }).join('');
  return `<div class="guild-quest-tracker">
    <div class="gqt-title">${qbT('tracker')}</div>
    ${items || `<div class="gqt-empty">${qbT('tracker_empty')}</div>`}
  </div>`;
}

  if (_cachedRenderData) {

    renderCurriculum(unitStats, isPremium, statsRes);
  }
}

async function acceptQuest(key, href) {
  try {
    await fetch('/api/quest-board/accept', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quest_key: key })
    });
  } catch (e) {}
  if (!_questBoard.accepted.includes(key)) _questBoard.accepted.push(key);
  const newbieAdvanced = await _nqCheckCurriculumTask();
  if (href && !newbieAdvanced) { location.href = href; return; }
  rerenderBoard();
}

async function abandonQuest(key) {
  if (!confirm(qbT('abandon_confirm'))) return;
  try {
    await fetch('/api/quest-board/abandon', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ quest_key: key })
    });
  } catch (e) {}
  _questBoard.accepted = _questBoard.accepted.filter(k => k !== key);
  rerenderBoard();
}

let _claiming = false;
async function claimRewards(btn) {
  if (_claiming) return;
  _claiming = true;
  // 寶箱開蓋動畫
  const chestIcon = btn ? btn.querySelector('.qc-chest-icon') : null;
  if (chestIcon) {
    chestIcon.src = 'assets/guild_ui/qb_chest_open.webp';
    chestIcon.classList.add('opening');
  }
  if (btn) btn.disabled = true;
  const fromRect = btn ? btn.getBoundingClientRect() : null;
  let res;
  try {
    res = await fetch('/api/rewards/sync', { method: 'POST', credentials: 'include' }).then(r => r.json());
  } catch (e) {
    // 預覽 / 離線：本地模擬發放
    const tc = (_questBoard.claimable || []).reduce((s, c) => s + c.coins, 0);
    const tx = (_questBoard.claimable || []).reduce((s, c) => s + c.xp, 0);
    res = {
      granted: (_questBoard.claimable || []).map(c => ({ stage_key: c.stage_key })),
      gained_coins: tc, gained_xp: tx,
      coins: _questBoard.coins + tc, xp: _questBoard.xp + tx
    };
  }
  const grantedKeys = new Set((res.granted || []).map(g => g.stage_key));
  _questBoard.claimable = (_questBoard.claimable || []).filter(c => !grantedKeys.has(c.stage_key));
  _questBoard.accepted = (_questBoard.accepted || []).filter(k => !grantedKeys.has(k));
  const oldCoins = _questBoard.coins, oldXp = _questBoard.xp;
  _questBoard.coins = Number(res.coins != null ? res.coins : oldCoins + (res.gained_coins || 0));
  _questBoard.xp = Number(res.xp != null ? res.xp : oldXp + (res.gained_xp || 0));
  _claiming = false;
  rerenderBoard();
  if ((res.gained_coins || 0) > 0 || (res.gained_xp || 0) > 0) {
    flyCoins(fromRect);
    showRewardToast(res);
    npcCongrats();
    countUpWallet(oldCoins, _questBoard.coins, oldXp, _questBoard.xp);
  }
}

function flyCoins(fromRect) {
  const target = document.querySelector('.hero-wallet .hw-coin');
  if (!fromRect || !target) return;
  const tr = target.getBoundingClientRect();
  const x0 = fromRect.left + fromRect.width / 2, y0 = fromRect.top + fromRect.height / 2;
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('span');
    s.className = 'coin-fly';
    s.textContent = i % 2 ? '⭐' : '🪙';
    s.style.left = x0 + 'px';
    s.style.top = y0 + 'px';
    document.body.appendChild(s);
    const dx = tr.left + tr.width / 2 - x0 + (Math.random() * 36 - 18);
    const dy = tr.top + tr.height / 2 - y0 + (Math.random() * 24 - 12);
    setTimeout(() => { s.style.transform = `translate(${dx}px,${dy}px) scale(.4)`; s.style.opacity = '0'; }, 40 + i * 65);
    setTimeout(() => s.remove(), 1150 + i * 65);
  }
}

function countUp(el, from, to, dur = 900) {
  if (!el) return;
  if (from === to) { el.textContent = Number(to).toLocaleString(); return; }
  const t0 = performance.now();
  const tick = t => {
    const p = Math.min(1, (t - t0) / dur);
    const v = Math.round(from + (to - from) * (1 - Math.pow(1 - p, 3)));
    el.textContent = v.toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function countUpWallet(c0, c1, x0, x1) {
  countUp(document.getElementById('hero-coins-val'), c0, c1);
  countUp(document.getElementById('hero-xp-val'), x0, x1);
  document.querySelectorAll('.hero-wallet .hw-item').forEach(el => {
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
  });
}

  ['overall-progress','plan-banner'].forEach(id => {
    const el = document.getElementById(id);

  wrap.innerHTML = '';

  const grouped = new Map();

  const selectedDisc = new URLSearchParams(location.search).get('discipline');

  const nonAggregateUnits = unitStats.filter(u => !u.aggregate);
  const practicedTotal = nonAggregateUnits.reduce((sum, u) => sum + (u.practiced || 0), 0);
  const questionTotal = nonAggregateUnits.reduce((sum, u) => sum + (u.total || 0), 0);
  const completedTotal = nonAggregateUnits.filter(u => u.completed).length;
  const attrScore = (disciplines) => {
    const practiced = nonAggregateUnits
      .filter(u => disciplines.includes(u.discipline))
      .reduce((sum, u) => sum + (u.practiced || 0), 0);
    return 12 + Math.min(28, Math.floor(practiced / 85));

  const heroAttr = {
    vit: attrScore(['life_death', 'capture_escape']),
    str: attrScore(['tesuji', 'connection_cut']),
    dex: attrScore(['shape_weakness', 'endgame_counting']),
    wis: attrScore(['opening_direction', 'whole_board'])

    const total = items.reduce((sum, u) => sum + u.total, 0);
    const pct = total ? Math.round(practiced / total * 100) : 0;
    const meta = dMeta(disc) || dMetaFallback();
    const originalLabel = dOrig(disc);

    const hasQStages = items.filter(u=>u.total>0).length;

    lane.className = 'skill-lane focused';

    lane.innerHTML = `
      <div class="lane-head">
        <div class="lane-mark" style="background:${meta.color}18;border:1.5px solid ${meta.color}44;color:${meta.color};font-size:18px">${meta.mark}</div>

          <div class="lane-title">${dLabel(disc)}</div>

    for (let i = 1; i <= 10; i++) {
      const stage = `LV${i}`;
      const unit = byStage.get(stage);
      const rankLabel = STAGE_RANK[stage] || '';
      const isDanStage = STAGE_IS_DAN[stage] || false;

        <div class="guild-vital-row">

          <span class="guild-vital-value">${heroMpMax} / ${heroMpMax}</span>

          <span class="guild-vital-label">XP</span>

  const board = shell.querySelector('.guild-board');

  board.appendChild(buildQuestBoard(unitStats));

  const abilityGrid = document.createElement('div');

  availableDisc.forEach(disc => {

    const total = items.reduce((sum, u) => sum + u.total, 0);

    card.type = 'button';
    card.className = 'ability-card' + (disc === activeDisc ? ' active' : '');
    card.dataset.discipline = disc;
    // 計算這個學科有題目的 LV 範圍
    const availLevels = items.map(u => parseInt(u.stage.replace('LV',''))).sort((a,b)=>a-b);
    const lvRange = availLevels.length
      ? (availLevels.length === 1
          ? `LV${availLevels[0]}`
          : `LV${availLevels[0]}–LV${availLevels[availLevels.length-1]}`)
      : '';

    const sortedItems = items.slice().sort((a,b)=>a.stageOrder-b.stageOrder);

        ? ` <span class="rw-attr">🛡${dAttr(disc)}+1</span>` : '';

      <div class="ability-sub"><span class="ability-lv-range">${originalLabel}</span></div>
      <div class="ability-reward">${rewardHtml}</div>
      <div class="ability-gems" style="--gem:${meta.color}" title="${_it('curr.g.stages_done',{done,total:gemTotal})}">${gemsHtml}</div>
    `;
    abilityGrid.appendChild(card);
  });

  board.appendChild(abilityGrid);

  const laneMount = document.createElement('div');
  laneMount.id = 'active-skill-lane';
  if (activeDisc) laneMount.appendChild(buildLane(activeDisc));
  board.appendChild(laneMount);
  const sideFocus = shell.querySelector('#guild-side-focus');
  if (sideFocus && activeDisc) sideFocus.textContent = dLabel(activeDisc) || _it('curr.g.unassigned');

  wrap.appendChild(shell);

  abilityGrid.querySelectorAll('.ability-card').forEach(card => {
    card.addEventListener('click', () => {
      const disc = card.dataset.discipline;
      abilityGrid.querySelectorAll('.ability-card').forEach(el => el.classList.toggle('active', el === card));

      if (sideFocus) sideFocus.textContent = dLabel(disc) || _it('curr.g.unassigned');
      history.replaceState(null, '', `/curriculum?discipline=${encodeURIComponent(disc)}`);
      laneMount.scrollIntoView({ block: 'start', behavior: 'smooth' });

  renderPlanBanner(isPremium, statsRes);

  // 把「公會聲望」與「公會通行證」搬到右側主角欄（HERO STATUS）下方
  const _side = shell.querySelector('.guild-side');

    const _op = document.getElementById('overall-progress');
    const _pb = document.getElementById('plan-banner');
    if (_op) _side.appendChild(_op);
    if (_pb) _side.appendChild(_pb);
  }
}

function buildPreviewUnitStats() {
  const stageTotals = [680, 740, 620, 520, 460, 390, 320, 260, 210, 160];
  return DISCIPLINE_ORDER.flatMap((discipline, di) => {
    const maxLv = discipline === 'capture_escape' ? 9 : discipline === 'connection_cut' ? 8 : 10;
    return Array.from({ length: maxLv }, (_, i) => {
      const stage = `LV${i + 1}`;
      const total = Math.max(80, Math.round(stageTotals[i] * (0.72 + di * 0.045)));
      const practiced = i === 0 ? Math.round(total * (di === 0 ? 0.18 : 0.04)) : (di === 3 && i === 3 ? Math.round(total * 0.36) : 0);
      const pct = total ? Math.round(practiced / total * 100) : 0;
      return {
        key: stageLabelOf(stage),
        name: `${dLabel(discipline)} · ${_it('curr.g.q',{n:total.toLocaleString()})}`,
        diff: stage,
        free: true,
        locked: false,
        total,
        practiced,
        pct,
        completed: false,
        inProgress: practiced > 0,
        mapCount: 3 + (i % 4),
        familyLabel: '',
        chapterBossTotal: 2 + (i % 3),
        chapterBossDefeated: practiced > 0 ? 1 : 0,
        bookBossTotal: 1,
        bookBossDefeated: 0,
        discipline,
        stage,
        stageOrder: i + 1,
        aggregate: false,
        href: `http://127.0.0.1:5000/?discipline=${encodeURIComponent(discipline)}&stage=${encodeURIComponent(stage)}&resume=1`,
      };
    });
  });
}

async function init() {
  if (location.protocol === 'file:' || new URLSearchParams(location.search).has('preview')) {
    renderPreviewCurriculum();
    return;
  }

  const [meRes, statsRes, sumRes, boardRes, dailyRes] = await Promise.all([
    fetch('/api/auth/me').then(r=>r.json()),
    fetch('/api/subscription/status').then(r=>r.json()),
    fetch('/api/curriculum/summary').then(r=>r.json()),
    fetch('/api/quest-board', { credentials:'include' }).then(r=>r.json()).catch(()=>({accepted:[],claimable:[],open_quests:[],quest_meta:[],coins:0,xp:0})),
    fetch('/api/quests/today', { credentials:'include' }).then(r=>r.json()).catch(()=>({quests:[]})),
  ]);
  _questBoard = {
    accepted:  boardRes.accepted  || [],
    claimable: boardRes.claimable || [],
    open_quests: boardRes.open_quests || [],
    quest_meta: boardRes.quest_meta || [],
    coins: Number(boardRes.coins || 0),
    xp:    Number(boardRes.xp    || 0),
  };
  _dailyQuests = dailyRes.quests || [];

  if (!meRes.logged_in) { location.href = '/login'; return; }

  document.getElementById('username-display').textContent = meRes.display_name || meRes.nickname || meRes.username || 'Player';

  const isPremium = meRes.is_premium;

  // 章節聚合改由後端 /api/curriculum/summary 計算，前端不再抓 60MB 全題庫做 group by
  const stageOrderOf = stage => {
    const m = String(stage || '').match(/LV(\d+)/);
    return m ? parseInt(m[1], 10) : 99;
  };

  const unitStats = (sumRes.units || []).map(u => {
    const discipline = u.discipline, stage = u.stage;
    const total = u.total || 0;
    const practiced = u.practiced || 0;
    const unlocked = u.unlocked || 0;
    const pct = total > 0 ? Math.round(practiced / total * 100) : 0;
    const completed = pct >= 100 && total > 0;
    const inProgress = practiced > 0 && !completed;
    const locked = !isPremium && unlocked === 0;
    const stageLabel = stageLabelOf(stage);
    const discLabel = dLabel(discipline);
    return {
      key: stageLabel,
      name: _isEnCur()
        ? `${discLabel} · ${unlocked.toLocaleString()} available / ${total.toLocaleString()} total`
        : `${discLabel} · ${unlocked.toLocaleString()} 可練 / ${total.toLocaleString()} 題`,
      diff: stage,
      free: unlocked > 0,
      locked,
      total,
      practiced,
      pct,
      completed,
      inProgress,
      mapCount: u.mapCount || 0,
      familyLabel: u.familyLabel || '',
      chapterBossTotal: u.chapterBossTotal || 0,
      chapterBossDefeated: u.chapterBossDefeated || 0,
      bookBossTotal: u.bookBossTotal || 0,
      bookBossDefeated: u.bookBossDefeated || 0,
      discipline,
      stage,
      stageOrder: stageOrderOf(stage),
      aggregate: !!u.aggregate,
      href: `/?discipline=${encodeURIComponent(discipline)}&stage=${encodeURIComponent(stage)}&resume=1`,
    };
  }).filter(unit => unit.total > 0);

  // Overall stats
  const totalQ     = unitStats.filter(u => !u.aggregate).reduce((sum, u) => sum + u.total, 0);
  const practicedQ = sumRes.cardsCount || 0;
  const unitsDone  = unitStats.filter(u=>!u.aggregate && u.completed).length;
  const overallPct = totalQ > 0 ? Math.round(practicedQ / totalQ * 100) : 0;

  // Render hero stats
  document.getElementById('stat-practiced').textContent = practicedQ.toLocaleString();
  document.getElementById('stat-units-done').textContent = unitsDone;
  document.getElementById('stat-total').textContent = totalQ.toLocaleString();
  document.getElementById('hero-stats').style.display = 'flex';

  // Overall progress bar
  const opEl = document.getElementById('overall-progress');
  opEl.style.display = 'flex';
  setTimeout(() => {
    document.getElementById('op-bar-fill').style.width = overallPct + '%';
    document.getElementById('op-pct').textContent = overallPct + '%';
  }, 80);

  // 今日公會急件已移除

  // Cache data for lang re-render
  _cachedRenderData = { unitStats, isPremium, statsRes };

  // Render curriculum
  document.getElementById('skeleton-wrap').style.display = 'none';
  document.getElementById('curriculum-wrap').style.display = 'block';
  renderCurriculum(unitStats, isPremium, statsRes);
  // 通關獎勵不再自動發放：改由玩家在佈告欄點「✦ 領取獎賞」觸發（claimRewards → /api/rewards/sync）
}
function showRewardToast(res) {
  const n = (res.granted||[]).length;
  const t = document.createElement('div');
  t.className = 'reward-toast';
  const _coins = Number(res.gained_coins||0).toLocaleString();
  const _xp    = Number(res.gained_xp||0).toLocaleString();
  const _toastTitle = _isEnCur()
    ? `⚔ Quest cleared ×${n}`
    : `⚔ 委託達成 ×${n}`;
  const _toastBody = _isEnCur()
    ? `Gained <span class="rt-coin">🪙 ${_coins}</span> · <span class="rt-xp">⭐ ${_xp}</span>`
    : `獲得 <span class="rt-coin">🪙 ${_coins}</span> ・ <span class="rt-xp">⭐ ${_xp}</span>`;
  t.innerHTML =
    `<div class="rt-title">${_toastTitle}</div>` +
    `<div class="rt-body">${_toastBody}</div>`;
  document.body.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 500); }, 5000);
}

<script>
const SpotlightManager = (() => {
  let _raf = null;
  let _target = null;

  function _calcHole(el) {
    const r = el.getBoundingClientRect();
    const pad = 8;
    return { x: r.left - pad, y: r.top - pad, w: r.width + pad * 2, h: r.height + pad * 2 };
  }

  function _updateClip() {
    const overlay = document.getElementById('nq-spotlight-overlay');
    const bubble = document.getElementById('nq-claire-bubble');
    if (!overlay || !bubble || !_target) return;
    const { x, y, w, h } = _calcHole(_target);
    const W = window.innerWidth;
    const H = window.innerHeight;
    overlay.style.clipPath =
      `polygon(evenodd, 0 0, ${W}px 0, ${W}px ${H}px, 0 ${H}px, 0 0, ` +
      `${x}px ${y}px, ${x}px ${y + h}px, ${x + w}px ${y + h}px, ${x + w}px ${y}px, ${x}px ${y}px)`;
    bubble.style.left = `${Math.max(8, Math.min(x, W - 288))}px`;
    bubble.style.top = `${Math.min(H - 120, y + h + 12)}px`;
  }

  function _tick() {
    _updateClip();
    _raf = requestAnimationFrame(_tick);
  }

  return {
    show(targetSelector, text, skipKey, onSkip) {
      if (typeof skipKey === 'function') {
        onSkip = skipKey;
        skipKey = 'nq_spotlight_s1_skipped';
      } else if (!skipKey) {
        skipKey = 'nq_spotlight_s1_skipped';
      }
      _target = document.querySelector(targetSelector);
      if (!_target) return;
      const overlay = document.getElementById('nq-spotlight-overlay');
      const bubble = document.getElementById('nq-claire-bubble');
      if (!overlay || !bubble) return;
      const textEl = bubble.querySelector('.nq-bubble-text');
      const skipBtn = bubble.querySelector('.nq-bubble-skip');
      if (textEl) textEl.textContent = text;
      if (skipBtn) {
        skipBtn.onclick = () => {
          try {
            if (skipKey) localStorage.setItem(skipKey, '1');
          } catch(e) {}
          SpotlightManager.hide();
          if (typeof onSkip === 'function') onSkip();
        };
      }
      overlay.hidden = false;
      bubble.hidden = false;
      if (_raf) cancelAnimationFrame(_raf);
      _raf = requestAnimationFrame(_tick);
    },
    hide(onComplete) {
      if (_raf) {
        cancelAnimationFrame(_raf);
        _raf = null;
      }
      _target = null;
      const overlay = document.getElementById('nq-spotlight-overlay');
      const bubble = document.getElementById('nq-claire-bubble');
      if (overlay) {
        overlay.hidden = true;
        overlay.style.clipPath = '';
      }
      if (bubble) bubble.hidden = true;
      if (typeof onComplete === 'function') onComplete();
    }
  };
})();

let _nqCurriculumTaskPending = false;
function _nqRewardLine(rewards) {
  const parts = [];
  if (rewards?.coins) {
    parts.push(`+${rewards.coins} ${I18n.getLang && I18n.getLang() === 'en' ? 'coins' : '金幣'}`);
  }
  (rewards?.items || []).forEach(item => {
    const name = I18n.getLang && I18n.getLang() === 'en'
      ? (item.name_en || item.key)
      : (item.name || item.key);
    parts.push(`${item.icon || ''} ${name} ×${item.qty || 1}`.trim());
  });
  return parts.join(' · ');
}
async function _nqCheckCurriculumTask() {
  if (_nqCurriculumTaskPending) return false;
  _nqCurriculumTaskPending = true;
  try {
    SpotlightManager.hide();
    const res = await fetch('/api/newbie_quest/checkpoint', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_key: 'stage4_curriculum_task' })
    });
    const d = await res.json();
    if (!res.ok || !d?.ok) return false;
    if (!d.newly_completed?.length) return false;
    const t = document.createElement('div');
    const rewardLine = _nqRewardLine(d.rewards || {});
    t.textContent = rewardLine ? `${I18n.t('curr.newbie.accepted')} ${rewardLine}` : I18n.t('curr.newbie.accepted');
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0d9488;color:#fff;padding:10px 20px;border-radius:8px;z-index:9999;font-size:.95rem';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
    const bar = document.createElement('div');
    bar.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;background:#0d9488;color:#fff;padding:12px 24px;border-radius:12px;font-size:.95rem;box-shadow:0 4px 16px rgba(0,0,0,.35);cursor:pointer;white-space:nowrap;';
    bar.textContent = I18n.t('curr.newbie.hero_next');
    bar.onclick = () => { window.location.href = '/hero'; };
    document.body.appendChild(bar);
    return true;
  } catch(e) {
    console.warn('[NQ stage4]', e);
    return false;
  } finally {
    _nqCurriculumTaskPending = false;
  }
}

(async function _nqCurriculumInit() {
  try {
    const res = await fetch('/api/auth/newbie_quest', { credentials: 'include' });
    const data = await res.json();
    if (!res.ok || !data.eligible) return;
    if (Number(data.state?.stage || 0) !== 4) return;
    const scope = `:u:${data.user_id}`;
    const shownKey = `nq_spotlight_s4_shown${scope}`;
    const skippedKey = `nq_spotlight_s4_skipped${scope}`;
    if (localStorage.getItem(shownKey)) return;
    if (localStorage.getItem(skippedKey)) return;
    await new Promise(r => setTimeout(r, 600));
    const btn = document.querySelector('.qc-btn.accept');
    if (!btn || btn.getBoundingClientRect().width === 0) return;
    localStorage.setItem(shownKey, '1');
    SpotlightManager.show(
      '.qc-btn.accept',
      I18n.t('curr.newbie.spotlight'),
      skippedKey
    );
  } catch(e) {}
})();
