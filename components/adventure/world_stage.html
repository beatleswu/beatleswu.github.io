<!--
  Component: Adventure World Stage (CRITICAL slot — see js/e9/shell.js)
  Stable root id: adventure-stage  (Rule #6)
  Real data source: GET /api/adventure/bootstrap (same endpoint the legacy
  Adventure Map uses) -- response.zones[] with {key,label,name,icon,status,
  can_enter,completed,stars,boss:{available,name,name_en}}. No new API.
  Zone-state text reuses the EXISTING index.adv.* i18n keys (zone_locked,
  boss_ready, boss_cleared, summary, load_fail, start_challenge) -- no
  second translation dictionary for adventure semantics. Zone display
  names (zone.name) are passed through verbatim, same as legacy, since
  the API has no separate English zone-name field today.
  No Avatar, Monster, Boss art, or Fog of War -- placeholder tiles only,
  per E9.1A2 scope.
-->
<main id="adventure-stage" class="e9-stage" data-e9-component="world_stage" data-i18n-aria-label="e9.world_stage.aria_label">
  <div class="e9-stage__status" id="e9-world-stage-status" data-i18n="e9.world_stage.loading" aria-live="polite">Loading adventure map…</div>
  <div class="e9-stage__zones" id="e9-world-stage-zones" role="list" hidden></div>
  <section class="e9-zone-details" id="e9-world-stage-details" tabindex="-1" aria-live="polite" hidden>
    <p class="e9-zone-details__label" id="e9-world-stage-details-label"></p>
    <p class="e9-zone-details__summary" id="e9-world-stage-details-summary"></p>
  </section>
  <section class="e9-newbie-mainline" id="e9-newbie-mainline" tabindex="-1" aria-live="polite" hidden>
    <p class="e9-newbie-mainline__kicker" id="e9-newbie-mainline-kicker"></p>
    <h2 class="e9-newbie-mainline__title" id="e9-newbie-mainline-title"></h2>
    <p class="e9-newbie-mainline__summary" id="e9-newbie-mainline-summary"></p>
    <ol class="e9-newbie-mainline__steps" id="e9-newbie-mainline-steps"></ol>
    <p class="e9-newbie-mainline__boss" id="e9-newbie-mainline-boss"></p>
    <p class="e9-newbie-mainline__goal" id="e9-newbie-mainline-goal"></p>
    <button class="e9-newbie-mainline__cta" id="e9-newbie-mainline-cta" type="button"></button>
  </section>
  <p class="e9-stage__note" data-i18n="e9.world_stage.note">Tap a zone to continue your adventure</p>
</main>
