<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="LV1 Slime">
  <defs>
    <radialGradient id="slime-bg" cx="34%" cy="23%" r="82%">
      <stop offset="0" stop-color="#6fffd5"/>
      <stop offset=".58" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#080d18"/>
    </radialGradient>
    <linearGradient id="slime-gold" x1="26" y1="22" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2b8"/>
      <stop offset=".42" stop-color="#d7a84c"/>
      <stop offset="1" stop-color="#714715"/>
    </linearGradient>
    <linearGradient id="slime-body" x1="62" y1="52" x2="194" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#caffea"/>
      <stop offset=".47" stop-color="#28d894"/>
      <stop offset="1" stop-color="#045a45"/>
    </linearGradient>
    <filter id="slime-shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity=".48"/>
    </filter>
    <filter id="slime-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="slime-clip"><rect x="28" y="28" width="200" height="200" rx="38"/></clipPath>
  </defs>
