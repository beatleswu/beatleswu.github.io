upstream flask_app {
    server app:8080;
}

# ── 認證端點 rate limit（防註冊腳本 / 暴力破解 / 測卡攻擊）──
limit_req_zone $binary_remote_addr zone=auth_reg:10m   rate=3r/m;
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=10r/m;
limit_req_status 429;

# ── HTTP (Port 80) 自動跳轉 HTTPS ─────────────
server {
    listen 80;
    server_name godokoro.com www.godokoro.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (Port 443) ──────────────────────────
server {
    listen 443 ssl;
    server_name godokoro.com www.godokoro.com;

    # SSL 憑證路徑 (掛載自外部 /etc/letsencrypt)
    ssl_certificate /etc/letsencrypt/live/godokoro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/godokoro.com/privkey.pem;

    # SSL 安全設定
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── 基本設定 ────────────────────────────────────────────
    client_max_body_size 20M;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;

    # ── 安全標頭 ────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip 壓縮 ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # ── WebSocket (Socket.IO) ──────────────────────────────
    location /socket.io/ {
        proxy_pass http://flask_app/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # ── 認證端點：套用 rate limit ──────────────────────────
    location = /api/auth/register {
        limit_req zone=auth_reg burst=3 nodelay;
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/auth/login {
        limit_req zone=auth_login burst=5 nodelay;
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/auth/forgot_password {
        limit_req zone=auth_reg burst=2 nodelay;
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 所有其他請求 ───────────────────────────────────────
    location / {
        proxy_pass http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
