<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="mk.title">修煉之書 — 弈境奇兵 (Go Odyssey)</title>
<style>/* anti-FOUC: site-nav.js will replace this header with .cg-nav; reveal after 3s if it never loads */header:not(.cg-nav):not(.hero){visibility:hidden;animation:cgNavReveal 0s 3s forwards}@keyframes cgNavReveal{to{visibility:visible}}</style>
<script src="/wgo/wgo.min.js?v=20260513"></script>
<script src="/wgo/stone_skin.js?v=3"></script>
<link rel="stylesheet" href="/wgo/wgo.player.css">
<script src="/i18n.js?v=20260710a"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --cream:    #faf7f2;
    --cream2:   #f3ede3;
    --cream3:   #ede4d4;
    --ink:      #1c1409;
    --ink2:     #3d2f1a;
    --ink3:     #6b5740;
    --amber:    #d97706;
    --amber-bg: #fffbeb;
    --teal:     #0d9488;
    --teal-bg:  #f0fdfa;
    --border:   #e5ddd0;
    --border2:  #d4c9b8;
    --white:    #ffffff;
    --shadow:   0 1px 3px rgba(28,20,9,.06), 0 4px 16px rgba(28,20,9,.06);
    --shadow-lg:0 8px 40px rgba(28,20,9,.10);
    --green:    #16a34a;
    --green-bg: #f0fdf4;
    --red:      #dc2626;
    --red-bg:   #fef2f2;
    --mono:     'DM Mono', monospace;
    --rpg-bg:   #171008;
    --rpg-wood: #2b1a0d;
    --rpg-wood2:#4b2d14;
    --rpg-gold: #c9962e;
    --rpg-gold2:#f3d37b;
    --rpg-paper:#ecd6a3;
    --rpg-paper2:#d5b978;
    --rpg-ink:  #2a1708;
}

html, body { height: 100%; overflow: hidden; }

body {
    font-family: 'DM Sans', sans-serif;
    background:
        radial-gradient(circle at 74% 18%, rgba(243,211,123,.16), transparent 34%),
        radial-gradient(circle at 12% 90%, rgba(13,148,136,.10), transparent 32%),
        linear-gradient(135deg, #0f0a06 0%, #24170c 52%, #100b07 100%);
    color: #f7ead0;
    display: flex; flex-direction: column;
}

body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
        repeating-linear-gradient(90deg, rgba(255,220,140,.06) 0 1px, transparent 1px 14px),
        repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 2px, transparent 2px 13px),
        linear-gradient(90deg, rgba(0,0,0,.18), transparent 18%, transparent 82%, rgba(0,0,0,.22));
    background-size: auto; opacity: .55;
}

/* ══ HEADER ══════════════════════════════════════════════════ */
header:not(.cg-nav) {
    position: relative; z-index: 100; flex-shrink: 0;
    background: rgba(12,9,6,.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,150,46,.35);
    box-shadow: 0 10px 32px rgba(0,0,0,.28);
    padding: 0 20px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
}
.logo {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 700; color: #f7dfaa;
    text-decoration: none; letter-spacing: .5px; flex-shrink: 0;
}
.logo-mark {
    width: 26px; height: 26px; border-radius: 50%; background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: white;
}
.header-center {
    display: flex; align-items: center; gap: 16px; flex: 1;
}
.header-stat {
    font-family: var(--mono); font-size: 11px; color: #bca77d;
    display: flex; align-items: center; gap: 4px;
}
.header-stat strong { color: var(--rpg-gold2); font-weight: 700; }
.header-stat .v-amber { color: #ffce6b; }
.header-stat .v-teal  { color: #7dded6;  }
.nav-sep { width: 1px; height: 16px; background: rgba(201,150,46,.28); }

.header-nav { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.nav-link {
    font-size: 14px; color: #c9b688; text-decoration: none;
    padding: 7px 13px; border-radius: 6px; transition: all .15s;
}
.nav-link:hover, .nav-link.active { background: rgba(201,150,46,.16); color: #ffe7ad; }

/* Filter select */
.filter-select {
    font-family: var(--mono); font-size: 11px;
    background: rgba(19,12,6,.82); border: 1px solid rgba(201,150,46,.42);
    color: #f6dfaa; padding: 7px 10px; border-radius: 7px;
    cursor: pointer; outline: none; transition: border-color .15s;
}
.filter-select:focus { border-color: var(--rpg-gold2); }
.pet-reward-toast {
    position: fixed; right: 18px; bottom: 18px; z-index: 3000;
    display: flex; align-items: center; gap: 10px;
    min-width: 210px; max-width: 290px; padding: 12px 14px;
    border-radius: 12px; border: 1.5px solid var(--rpg-gold);
    background: linear-gradient(180deg,#fff8df,#ead6a6); color: var(--rpg-ink);
    box-shadow: 0 12px 28px rgba(0,0,0,.32);
    transform: translateY(12px); opacity: 0; pointer-events: none;
    transition: transform .18s ease, opacity .18s ease;
}
.pet-reward-toast.show { transform: translateY(0); opacity: 1; }
.pet-reward-toast .prt-icon { font-size: 24px; }
.pet-reward-toast .prt-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
    color: #9a5a10; text-transform: uppercase; margin-bottom: 2px;
}
.pet-reward-toast .prt-name { font-size: 13px; font-weight: 900; }
.sidebar-header .filter-select {
    grid-column: 1 / -1;
    width: 100% !important;
    margin-top: 2px !important;
}

/* Practice button */
.btn-practice {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    background: linear-gradient(#9a6926,#5b3511); color: #fff0c9;
    border: 1px solid rgba(243,211,123,.48); border-radius: 7px; padding: 5px 14px;
    cursor: pointer; transition: all .15s; letter-spacing: .3px;
}
.btn-practice:hover { background: #b45309; }

#mistakes-username { font-size: 11px; color: #c9b688; font-family: var(--mono); padding: 0 4px; }
.btn-logout {
    font-size: 11px; color: #c9b688; background: rgba(255,255,255,.03); border: 1px solid rgba(201,150,46,.28);
    cursor: pointer; padding: 4px 9px; border-radius: 6px; transition: all .15s;
}
.btn-logout:hover { background: var(--red-bg); color: var(--red); border-color: #fecaca; }

/* ══ BODY LAYOUT ═════════════════════════════════════════════ */
.body-wrap {
    flex: 1; display: flex; overflow: hidden; position: relative; z-index: 1;
}

/* ══ SIDEBAR ═════════════════════════════════════════════════ */
aside {
    width: 320px; flex-shrink: 0;
    background:
        linear-gradient(90deg, rgba(0,0,0,.22), transparent 16%, transparent 84%, rgba(0,0,0,.22)),
        repeating-linear-gradient(0deg, rgba(255,218,136,.05) 0 2px, transparent 2px 16px),
        linear-gradient(180deg, #3a2411 0%, #1b1008 100%);
    border-right: 1px solid rgba(201,150,46,.34);
    box-shadow: inset -14px 0 28px rgba(0,0,0,.25);
    display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
    padding: 14px; border-bottom: 1px solid rgba(201,150,46,.34);
    display: grid; grid-template-columns: 1fr auto; gap: 9px;
    background: rgba(18,11,6,.46);
}
.sidebar-label {
    font-family: var(--mono); font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: #e7c477;
}
#list-count {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    background: rgba(255,213,118,.14); color: #ffd678;
    border: 1px solid rgba(243,211,123,.42); border-radius: 99px;
    padding: 1px 8px;
}

#q-list { flex: 1; overflow-y: auto; }
#q-list::-webkit-scrollbar { width: 4px; }
#q-list::-webkit-scrollbar-thumb { background: rgba(243,211,123,.42); border-radius: 99px; }

/* Question row */
.q-row {
    display: grid;
    grid-template-columns: 42px 1fr auto;
    align-items: center; gap: 10px;
    margin: 10px 10px 0;
    padding: 12px 12px;
    border: 1px solid rgba(88,54,20,.65);
    border-radius: 10px;
    cursor: pointer; transition: transform .12s, box-shadow .15s, border-color .15s, filter .15s;
    font-size: 13px;
    min-height: 70px;
    background:
        radial-gradient(circle at 14% 20%, rgba(255,247,210,.42), transparent 28%),
        linear-gradient(135deg, #f0d9a1 0%, #d9b872 100%);
    box-shadow: 0 7px 14px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,250,220,.26);
}
.q-row:hover  { transform: translateY(-1px); border-color: rgba(243,211,123,.72); box-shadow: 0 10px 18px rgba(0,0,0,.28), 0 0 0 1px rgba(243,211,123,.25); }
.q-row.active {
    background:
        radial-gradient(circle at 20% 16%, rgba(255,255,220,.52), transparent 32%),
        linear-gradient(135deg, #ffe0a2 0%, #d89b3a 100%);
    border-color: var(--rpg-gold2);
    box-shadow: 0 10px 24px rgba(0,0,0,.34), 0 0 18px rgba(243,211,123,.32);
}
.q-row.purified { filter: saturate(.9); }
.q-row.haunted { filter: saturate(1.08); }

/* Heat dots */
.trial-mark { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.trial-icon { font-size: 18px; line-height: 1; filter: drop-shadow(0 1px 1px rgba(0,0,0,.35)); }
.heat-bar { display: flex; gap: 2px; align-items: center; }
.heat-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(60,34,12,.24); flex-shrink: 0;
    border: 1px solid rgba(60,34,12,.24);
}
.heat-dot.on { background: #9f241b; border-color: #6f120d; box-shadow: 0 0 6px rgba(159,36,27,.45); }

.q-main { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.q-label {
    color: var(--rpg-ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    line-height: 1.25;
    font-weight: 700;
}
.q-sub {
    color: #6b4b22;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
    line-height: 1.25;
}
.q-row.active .q-label { color: #261504; }
.q-row.active .q-sub { color: #61400f; }
.q-status { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.q-corrected {
    font-family: var(--mono); font-size: 10px; color: #14532d; font-weight: 700;
    background: rgba(187,247,208,.72); border: 1px solid rgba(22,101,52,.28); border-radius: 999px; padding: 2px 6px;
}
.q-count {
    font-family: var(--mono); font-size: 11px; color: #ffe6d1; font-weight: 700;
    background: linear-gradient(#8d241b,#4b100b); border: 1px solid rgba(255,196,150,.32); border-radius: 999px; padding: 3px 7px;
    min-width: 36px; text-align: center;
}

/* Empty / loading */
.list-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 8px;
    color: #dbc18a; font-size: 12px; font-family: var(--mono);
    padding: 24px; text-align: center;
}

/* ══ PRACTICE AREA ═══════════════════════════════════════════ */
.practice {
    flex: 1; overflow-y: auto; padding: 24px 28px 28px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    background:
        radial-gradient(circle at 50% 18%, rgba(243,211,123,.10), transparent 34%),
        linear-gradient(180deg, rgba(0,0,0,.16), rgba(0,0,0,.30));
}
.practice::-webkit-scrollbar { width: 4px; }
.practice::-webkit-scrollbar-thumb { background: rgba(243,211,123,.42); border-radius: 99px; }

/* Question header */
.q-header {
    width: 100%; max-width: 680px; text-align: center;
    padding: 12px 18px 11px;
    border: 1px solid rgba(201,150,46,.38);
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(31,19,9,.88), rgba(18,12,7,.88));
    box-shadow: 0 12px 30px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,234,166,.08);
}
.q-header { display: none; }
#q-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 700; color: #dcc390; letter-spacing: .3px;
}
#q-title.active { color: #ffe6ad; }
.q-meta-row {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-top: 5px;
}
#q-wrong-count  { font-family: var(--mono); font-size: 11px; color: #ff9c8b; }
#q-correct-after { font-family: var(--mono); font-size: 11px; color: #8be5df; }

/* Practice progress */
#practice-progress { width: 100%; max-width: 820px; display: none; }
.prog-top {
    display: flex; justify-content: space-between;
    font-size: 11px; font-family: var(--mono); color: #d8bd83; margin-bottom: 5px;
}
.prog-bar-wrap { height: 7px; background: rgba(10,7,4,.72); border: 1px solid rgba(201,150,46,.36); border-radius: 99px; overflow: hidden; }
#p-bar { height: 100%; background: linear-gradient(90deg,#b16b18,#ffd36c); border-radius: 99px; transition: width .5s; }

/* Message box */
#msg-box {
    width: 100%; max-width: 820px;
    padding: 9px 16px; border-radius: 9px;
    text-align: center; font-size: 13px; font-weight: 500;
    border: 1px solid rgba(201,150,46,.38);
    background: linear-gradient(180deg, rgba(31,19,9,.88), rgba(12,8,5,.92)); color: #e6cf9d;
    transition: background .2s, color .2s, border-color .2s;
    box-shadow: inset 0 0 0 1px rgba(255,234,166,.06), 0 8px 20px rgba(0,0,0,.18);
}
#msg-box.info { background: linear-gradient(180deg,#1b2b36,#0b1820); color: #b9ecff; border-color: rgba(125,211,252,.42); }
#msg-box.ok   { background: linear-gradient(180deg,#173523,#091a10); color: #bdf7ce; border-color: rgba(134,239,172,.45); }
#msg-box.err  { background: linear-gradient(180deg,#451711,#1b0906); color: #ffc0b6; border-color: rgba(252,165,165,.45); }
#msg-box.warn { background: linear-gradient(180deg,#4b2e10,#1c1005); color: #ffdf91; border-color: rgba(253,230,138,.48); }
.mk-alt-report-panel {
    display: none;
    max-width: 720px;
    margin: 0 auto 12px;
    padding: 11px 14px;
    border: 1px solid rgba(212,175,55,.30);
    border-radius: 12px;
    background: linear-gradient(180deg,rgba(43,31,15,.78),rgba(15,18,18,.72));
    color: #f4e5bf;
    font-size: 12px;
    line-height: 1.65;
}
.mk-alt-report-panel.active { display: block; }
.mk-alt-report-panel strong { color: #ffe29a; }
.mk-alt-report-status { margin-top: 6px; color: #c9b688; }
.mk-alt-report-status.ok { color: #bdf7ce; }
.mk-alt-report-status.warn { color: #ffdf91; }
.mk-alt-report-status.err { color: #ffc0b6; }
.mk-problem-report-note {
    width: 100%;
    min-height: 92px;
    resize: vertical;
    border-radius: 10px;
    border: 1px solid rgba(201, 182, 136, .28);
    background: rgba(0, 0, 0, .18);
    color: #f7ead0;
    padding: 10px 12px;
    font: inherit;
}
.mk-problem-report-note:focus {
    outline: none;
    border-color: rgba(243, 211, 123, .7);
    box-shadow: 0 0 0 3px rgba(243, 211, 123, .12);
}
.mk-problem-report-select {
    width: 100%;
    border-radius: 10px;
    border: 1px solid rgba(201, 182, 136, .28);
    background: rgba(0, 0, 0, .18);
    color: #f7ead0;
    padding: 10px 12px;
    font: inherit;
}
.mk-problem-report-select:focus {
    outline: none;
    border-color: rgba(243, 211, 123, .7);
    box-shadow: 0 0 0 3px rgba(243, 211, 123, .12);
}
.mk-problem-report-hint {
    font-size: 12px;
    color: #d7c49a;
    line-height: 1.55;
}
.mk-problem-report-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
}
.mk-problem-report-count {
    font-family: var(--mono);
    font-size: 11px;
    color: #e8d7af;
}

/* 推薦練習題 */
#recommend-box {
    width: 100%; max-width: 820px;
    margin-top: 8px;
    animation: fadeInUp .3s ease;
}
@keyframes fadeInUp {
    from { opacity:0; transform:translateY(6px); }
    to   { opacity:1; transform:translateY(0); }
}
#recommend-box .rec-title {
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
    color: #e8c97c; text-transform: uppercase;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
}
#recommend-box .rec-cards {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px;
}
.rec-card {
    background:
        radial-gradient(circle at 12% 18%, rgba(255,247,210,.40), transparent 28%),
        linear-gradient(135deg, #efd59b, #cfad68);
    border: 1px solid rgba(88,54,20,.65);
    border-radius: 9px; padding: 8px 10px;
    cursor: pointer; transition: background .15s, border-color .15s, transform .1s;
    display: flex; flex-direction: column; gap: 2px;
}
.rec-card:hover {
    border-color: rgba(243,211,123,.72);
    transform: translateY(-1px);
}
.rec-card .rc-name {
    font-size: 12px; font-weight: 700; color: var(--rpg-ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rec-card .rc-topic {
    font-size: 10px; color: #6b4b22;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rec-card .rc-tags {
    display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px;
}
.rc-tag {
    font-size: 9px; padding: 1px 5px; border-radius: 4px;
    background: rgba(31,41,55,.15); color: #38210b; font-weight: 700;
}
.rc-tag.wrong { background: rgba(159,36,27,.16); color: #8d241b; }

/* Board */
#board-wrap {
    width: min(820px, 100%, calc(100vh - 240px));
    max-width: 820px;
    min-width: min(520px, 100%);
    aspect-ratio: 1/1;
    flex-shrink: 0;   /* 不被直欄壓扁，永遠維持正方形，避免 canvas 底部被裁切 */
    border-radius: 16px; overflow: hidden;
    border: 8px solid #3a2412;
    outline: 2px solid rgba(243,211,123,.62);
    box-shadow:
        0 24px 70px rgba(0,0,0,.42),
        0 0 0 1px rgba(0,0,0,.62),
        inset 0 0 0 2px rgba(255,231,173,.18);
    background:
        radial-gradient(circle at 50% 42%, rgba(255,244,196,.42), transparent 58%),
        linear-gradient(135deg, #ead294 0%, #dfbd76 100%);
}
#board-wrap canvas { display: block; }
/* ── 錯題頁陪伴棋靈 ── */
.mk-board-anchor {
    position: relative;
    width: min(820px, 100%, calc(100vh - 240px));
    max-width: 820px; min-width: min(520px, 100%); flex-shrink: 0;
}
.mk-board-anchor > #board-wrap { width: 100%; min-width: 0; max-width: none; }
#quiz-pet {
    position: absolute; left: -26px; bottom: -6px; width: 124px; z-index: 8;
    cursor: pointer; user-select: none; animation: quizPetBob 3s ease-in-out infinite;
}
#quiz-pet img { width: 100%; height: auto; display: block; filter: drop-shadow(0 7px 13px rgba(0,0,0,.55)); -webkit-user-drag: none; }
#quiz-pet.react { animation: quizPetJump .55s ease; }
@keyframes quizPetBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes quizPetJump { 0%{transform:translateY(0)} 30%{transform:translateY(-15px) scale(1.06)} 60%{transform:translateY(0)} 80%{transform:translateY(-5px)} 100%{transform:translateY(0)} }
#quiz-pet-speech {
    position: fixed; background: #1c1409; color: #faf7f2;
    border-radius: 12px; padding: 8px 12px; font-size: 12px; font-weight: 600;
    line-height: 1.5; max-width: 220px; box-shadow: 0 6px 22px rgba(0,0,0,.55);
    pointer-events: none; z-index: 9990; animation: speechPop .25s cubic-bezier(.34,1.56,.64,1);
}
#quiz-pet-speech::before {
    content: ''; position: absolute; top: 50%; left: -5px; width: 11px; height: 11px;
    transform: translateY(-50%) rotate(45deg); background-color: inherit; border-radius: 2px;
}
#quiz-pet-speech.flip::before { left: auto; right: -5px; }
@keyframes speechPop { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
#quiz-pet-speech.cheer { background: #b4660f; }
#quiz-pet-speech.cozy  { background: #0b6f69; }
#quiz-pet-speech.win   { background: #6d3bd0; }
@media (max-width: 768px) { #quiz-pet { width: 72px; left: 6px; bottom: -4px; } }
.board-stage {
    width: 100%;
    height: 100%;
    position: relative;
}
#board-wrap:empty {
    display: flex; align-items: center; justify-content: center;
}
#board-wrap:empty::before {
    content: attr(data-waiting-text);
    font-family: var(--mono);
    font-size: 12px;
    color: rgba(58,36,18,.52);
    letter-spacing: 2px;
}

/* Nav buttons */

<script>
// ═══════════════════════════════════════════════════════════════
// SGF 解析
// ═══════════════════════════════════════════════════════════════
function parseSGF(sgf) {
    sgf = sgf.replace(/\r?\n|\r/g,' ').trim();
    const result={size:19,pl:'B',black:[],white:[],tree:null};
    function findClosing(str,start){let d=0;for(let i=start;i<str.length;i++){if(str[i]==='(')d++;else if(str[i]===')'){ d--;if(d===0)return i;}}return str.length-1;}
    function parseCoordList(s){return(s.match(/\[([a-zA-Z]{2})\]/g)||[]).map(m=>({x:m.charCodeAt(1)-97,y:m.charCodeAt(2)-97}));}
    const rm=sgf.match(/^\(;([\s\S]*?)(?=;|\(|\))/);if(!rm)return null;
    const rp=rm[1];
    const sz=rp.match(/SZ\[(\d+)\]/);if(sz)result.size=parseInt(sz[1]);
    const pl=rp.match(/PL\[([BW])\]/);if(pl)result.pl=pl[1];
    (rp.match(/AB((?:\s*\[[a-zA-Z]{2}\])+)/g)||[]).forEach(s=>result.black.push(...parseCoordList(s)));
    (rp.match(/AW((?:\s*\[[a-zA-Z]{2}\])+)/g)||[]).forEach(s=>result.white.push(...parseCoordList(s)));
    function parseSeq(str){
        str=str.trim();const ns=[];let i=0;
        while(i<str.length){
            if(str[i]===';'){let j=i+1,d=0;while(j<str.length){if(str[j]==='('){ if(d===0)break;d++;}else if(str[j]===')'){ if(d===0)break;d--;}else if(str[j]===';'&&d===0)break;j++;}ns.push(str.slice(i,j));i=j;}
            else if(str[i]==='(')break;else i++;
        }
        const bs=i;if(!ns.length)return null;
        function scanNodeMove(node){
            node=node.trim();
            let i=0;
            while(i<node.length){
                const ch=node[i];
                if(ch===';'||ch<=' '){i++;continue;}
                if(ch<'A'||ch>'Z'){i++;continue;}
                const propStart=i;
                while(i<node.length&&node[i]>='A'&&node[i]<='Z')i++;
                const prop=node.slice(propStart,i);
                while(i<node.length&&node[i]==='['){
                    let value='';i++;
                    while(i<node.length){
                        const c=node[i];
                        if(c==='\\'&&i+1<node.length){value+=node[i+1];i+=2;continue;}
                        if(c===']'){i++;break;}
                        value+=c;i++;
                    }
                    if(prop==='B'||prop==='W'){
                        return{color:prop,move:value.length===2?{x:value.charCodeAt(0)-97,y:value.charCodeAt(1)-97}:null};
                    }
                }
            }
            return null;
        }
        function pn(s){const m=scanNodeMove(s);if(!m)return null;return{color:m.color,move:m.move,children:[]};}
        const nodes=ns.map(pn).filter(Boolean);if(!nodes.length)return null;
        for(let k=0;k<nodes.length-1;k++)nodes[k].children.push(nodes[k+1]);
        const last=nodes[nodes.length-1];let bi=bs;
        while(bi<str.length){if(str[bi]==='('){const e=findClosing(str,bi);const c=parseSeq(str.slice(bi+1,e));if(c)last.children.push(c);bi=e+1;}else bi++;}
        return nodes[0];
    }
    const after=sgf.slice(rm[0].length).trim();
    if(after.startsWith(';')){result.tree=parseSeq(after);}
    else if(after.startsWith('(')){const root={move:null,color:null,children:[]};let i=0;while(i<after.length){if(after[i]==='('){const e=findClosing(after,i);const c=parseSeq(after.slice(i+1,e));if(c)root.children.push(c);i=e+1;}else i++;}result.tree=root;}
    // 若 SGF 根節點無 PL 標記，從答案樹第一手顏色推斷先手方
    if(!pl&&result.tree){const fn=result.tree.move?result.tree:(result.tree.children&&result.tree.children[0]);if(fn&&fn.color)result.pl=fn.color;}
    // 最後備援：直接搜尋整個 SGF 是否含 PL[W]
    if(result.pl==='B'&&/PL\[W\]/.test(sgf))result.pl='W';
    return result;
}

// ═══════════════════════════════════════════════════════════════
// 棋盤裁切：角落題自動放大成 9/13 路局部視圖
// ═══════════════════════════════════════════════════════════════
function calcCropSection(problem) {
    const size = problem.size;
    const answerMoves = [];
    (function walk(node){
        if(!node) return;
        if(node.move) answerMoves.push(node.move);
        (node.children||[]).forEach(walk);
    })(problem.tree);
    const stones = [...(problem.black||[]), ...(problem.white||[]), ...answerMoves];
    const full = { displayLines:size, startX:0, startY:0 };
    if (!stones.length || size <= 9) return full;

    const xs = stones.map(s => s.x);
    const ys = stones.map(s => s.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);

    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;
    const th = size * 0.40;
    const inLeft   = cx <= th;
    const inRight  = cx >= size - 1 - th;
    const inTop    = cy <= th;
    const inBottom = cy >= size - 1 - th;
    if ((!inLeft && !inRight) || (!inTop && !inBottom)) return full;

    const MARGIN = 2;
    const needH = inRight ? (size - minX + MARGIN) : (maxX + 1 + MARGIN);
    const needV = inTop   ? (maxY + 1 + MARGIN)    : (size - minY + MARGIN);
    const need  = Math.max(needH, needV);

    let displayLines;
    if      (need <= 9)  displayLines = 9;
    else if (need <= 13) displayLines = 13;
    else return full;

    return {
        displayLines,
        startX: inRight  ? size - displayLines : 0,
        startY: inBottom ? size - displayLines : 0,
        offsetX: 0,
        offsetY: 0,
    };
}

// ═══════════════════════════════════════════════════════════════
// 音效
// ═══════════════════════════════════════════════════════════════
// 答對／答錯音效改走共用引擎 sound.js（原本是本地 AudioContext 合成）
function playCorrect(){if(window.SFX)SFX.play('correct');}
function playWrong(){if(window.SFX)SFX.play('wrong');}

// ═══════════════════════════════════════════════════════════════
// 狀態
// ═══════════════════════════════════════════════════════════════
let allMistakes   = [];
let displayList   = [];
let practiceQueue = [];
let practiceIdx   = -1;
let practiceMode  = false;

let board=null, currentProblem=null, currentNode=null, currentMistake=null;
let playerColor='B', solved=false, answering=false;
let logicBoard=[], boardSize=19;
let _cropInfo={displayLines:19,startX:0,startY:0,offsetX:0,offsetY:0};
function _bx(x){return x-(_cropInfo?_cropInfo.startX:0)+(_cropInfo?.offsetX||0);}
function _by(y){return y-(_cropInfo?_cropInfo.startY:0)+(_cropInfo?.offsetY||0);}
function _ox(x){return x-(_cropInfo?.offsetX||0)+(_cropInfo?_cropInfo.startX:0);}
function _oy(y){return y-(_cropInfo?.offsetY||0)+(_cropInfo?_cropInfo.startY:0);}

// ═══════════════════════════════════════════════════════════════
// KataGo
// ═══════════════════════════════════════════════════════════════
async function askKataGo(oppColor, wrongMove){
    const black=[],white=[];
    for(let x=0;x<boardSize;x++)for(let y=0;y<boardSize;y++){
        if(wrongMove&&x===wrongMove.x&&y===wrongMove.y)continue;
        if(logicBoard[x][y]==='B')black.push({x,y});
        else if(logicBoard[x][y]==='W')white.push({x,y});
    }
    try{const res=await fetch('/api/katago-move',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({boardSize,black,white,player:oppColor,moves:wrongMove?[{player:oppColor==='W'?'B':'W',x:wrongMove.x,y:wrongMove.y}]:[],visits:20})});
        const d=await res.json();if(d.ok)return{x:d.x,y:d.y};}catch(e){}
    return null;
}

// ═══════════════════════════════════════════════════════════════
// 邏輯棋盤
// ═══════════════════════════════════════════════════════════════
function initLogicBoard(s){boardSize=s;logicBoard=Array.from({length:s},()=>Array(s).fill(null));}
function placeStone(x,y,c){logicBoard[x][y]=c;}
function getNeighbors(x,y){return[[1,0],[-1,0],[0,1],[0,-1]].map(([dx,dy])=>[x+dx,y+dy]).filter(([nx,ny])=>nx>=0&&ny>=0&&nx<boardSize&&ny<boardSize);}
function getGroup(x,y,color){const vis=new Set(),stack=[[x,y]],g=[];while(stack.length){const[cx,cy]=stack.pop(),k=cx+','+cy;if(vis.has(k))continue;vis.add(k);if(logicBoard[cx][cy]!==color)continue;g.push({x:cx,y:cy});getNeighbors(cx,cy).forEach(([nx,ny])=>{if(!vis.has(nx+','+ny))stack.push([nx,ny]);});}return g;}
function countLiberties(g){const s=new Set();g.forEach(({x,y})=>getNeighbors(x,y).forEach(([nx,ny])=>{if(logicBoard[nx][ny]===null)s.add(nx+','+ny);}));return s.size;}
function applyCaptures(x,y,color){const opp=color==='B'?'W':'B',cap=[];getNeighbors(x,y).forEach(([nx,ny])=>{if(logicBoard[nx][ny]===opp){const g=getGroup(nx,ny,opp);if(countLiberties(g)===0)g.forEach(s=>{logicBoard[s.x][s.y]=null;cap.push(s);});}});return cap;}
function playStone(x,y,color){
    const bx=_bx(x), by=_by(y);
    if(bx<0||by<0||bx>=(_cropInfo?.displayLines||boardSize)||by>=(_cropInfo?.displayLines||boardSize))return false;
    if(logicBoard[x][y]!==null)return false;
    placeStone(x,y,color);
    if(window.SFX)SFX.play('stone');
    const opp=color==='B'?'W':'B',cap=applyCaptures(x,y,color);
    board.addObject({x:bx,y:by,c:color==='B'?WGo.B:WGo.W});
    cap.forEach(s=>board.removeObject({x:_bx(s.x),y:_by(s.y),c:opp==='B'?WGo.B:WGo.W}));
    return true;
}

// ═══════════════════════════════════════════════════════════════
// 棋盤初始化
// ═══════════════════════════════════════════════════════════════
function initBoard(size,cropInfo){
    _cropInfo=cropInfo||{displayLines:size,startX:0,startY:0};
    const wrap=document.getElementById('board-wrap');
    wrap.innerHTML='<div class="board-stage"></div>';
    const stage=wrap.querySelector('.board-stage');
    const stageWidth=stage.clientWidth || stage.getBoundingClientRect().width || wrap.clientWidth || 500;
    const cropped=_cropInfo.displayLines<size;
    const width=Math.max(260, stageWidth);
    const edgePad=cropped ? -1.05 : -.5;
    board=new WGo.Board(stage,{width,size:_cropInfo.displayLines,section:{top:edgePad,left:edgePad,right:edgePad,bottom:edgePad}});
    board.addEventListener('click',onBoardClick);
}
function makeAnswerRoot(tree){
    if(!tree) return {move:null,color:null,children:[]};
    return tree.move ? {move:null,color:null,children:[tree]} : tree;
}
function turnPrompt(){
    return playerColor==='B'
        ? I18n.t('mk.turnBlack')
        : I18n.t('mk.turnWhite');
}
function resetBoard(){
    if(!currentProblem)return;
    solved=false;answering=false;
    _altAnswerReportMode=false;

    board.removeAllObjects();initLogicBoard(currentProblem.size);
    const crop=calcCropSection(currentProblem);
    initBoard(currentProblem.size,crop);
    currentProblem.black.forEach(s=>{placeStone(s.x,s.y,'B');board.addObject({x:_bx(s.x),y:_by(s.y),c:WGo.B});});
    currentProblem.white.forEach(s=>{placeStone(s.x,s.y,'W');board.addObject({x:_bx(s.x),y:_by(s.y),c:WGo.W});});
    currentNode=makeAnswerRoot(currentProblem.tree);
    setAlternativeAnswerReportVisible(!!currentMistake, '');
    setMsg(turnPrompt(),'info');
}

// ═══════════════════════════════════════════════════════════════
// 載入題目
// ═══════════════════════════════════════════════════════════════
function loadMistake(m){
    currentMistake=m;
    setNpc('select');
    hideRecommend();   // 切題時清掉舊推薦
    _altAnswerReportMode = false;

    const label=mistakeTitle(m);
    const titleEl = document.getElementById('q-title');
    titleEl.textContent=label;
    titleEl.className='active';

    const diff=String(m.rank||m.difficulty||'');
    const isKyu=diff.endsWith('k');
    const isDan=diff.endsWith('d');
    const diffCls=isKyu?'diff-kyu':isDan?'diff-dan':'diff-int';
    document.getElementById('q-diff').innerHTML=diff
        ?`<span class="diff-badge ${diffCls}">${diff}</span>`:'';
    document.getElementById('q-wrong-count').textContent=I18n.t('mk.wrongCount').replace('{n}', m.wrong_count);
    document.getElementById('q-correct-after').textContent=m.correct_after>0?I18n.t('mk.purifyCount').replace('{n}', m.correct_after):'';

    document.querySelectorAll('.q-row').forEach(r=>r.classList.remove('active'));
    const activeRow=document.querySelector(`.q-row[data-id="${m.question_id}"]`);
    if(activeRow){activeRow.classList.add('active');activeRow.scrollIntoView({block:'nearest'});}

    showBtn('btn-reset');showBtn('btn-answer');showBtn('btn-alt-report');showBtn('btn-problem-report');showBtn('btn-remove');
    showBtn('btn-prev');showBtn('btn-next');
    setAlternativeAnswerReportVisible(true, '');
    closeProblemReportPanel();
    updateNavBtns();

    currentProblem=parseSGF(m.content);
    if(!currentProblem){setMsg(I18n.t('mk.brokenScroll'),'warn');return;}
    playerColor=currentProblem.pl;
    const crop=calcCropSection(currentProblem);
    initBoard(currentProblem.size,crop);
    initLogicBoard(currentProblem.size);
    currentProblem.black.forEach(s=>{placeStone(s.x,s.y,'B');board.addObject({x:_bx(s.x),y:_by(s.y),c:WGo.B});});
    currentProblem.white.forEach(s=>{placeStone(s.x,s.y,'W');board.addObject({x:_bx(s.x),y:_by(s.y),c:WGo.W});});
    currentNode=makeAnswerRoot(currentProblem.tree);
    solved=false;answering=false;
    setMsg(turnPrompt(),'info');
    loadTeacherComments(m.question_id);
}

// ═══════════════════════════════════════════════════════════════
// 點棋盤
// ═══════════════════════════════════════════════════════════════
function onBoardClick(bx,by){
    const x=_ox(bx), y=_oy(by);
    if(_altAnswerReportMode){
        if(x>=0 && y>=0 && x<boardSize && y<boardSize) submitAlternativeAnswerReport({x,y});
        return;
    }
    if(solved||answering||!currentNode)return;
    if(!logicBoard[x] || y<0 || y>=boardSize)return;
    const matched=currentNode.children.find(c=>c.move&&c.move.x===x&&c.move.y===y);
    if(!matched){
        playWrong();
        petReact('wrong');   // 陪伴棋靈：答錯加油打氣
        const opp=playerColor==='B'?'W':'B';
        playStone(x,y,playerColor);
        setMsg(I18n.t('mk.msgBacklash'),'err');
        loadRecommend();   // 答錯 → 觸發推薦
        answering=true;
        askKataGo(opp,{x,y}).then(mv=>{
            answering=false;
            if(mv){playStone(mv.x,mv.y,opp);setMsg(I18n.t('mk.msgCounter'),'err');}
            else setMsg(I18n.t('mk.msgNotYet'),'err');
        });
        return;
    }
    playStone(x,y,playerColor);currentNode=matched;
    if(currentNode.children.length===0){solved=true;playCorrect();setMsg(I18n.t('mk.msgPurified'),'ok');submitSRS(3);return;}
    answering=true;
    setTimeout(()=>{
        answering=false;
        const reply=currentNode.children[0];
        if(!reply||!reply.move){solved=true;playCorrect();setMsg(I18n.t('mk.msgPurified'),'ok');submitSRS(3);return;}
        const placed=playStone(reply.move.x,reply.move.y,reply.color);
        currentNode=reply;
        if(!placed||currentNode.children.length===0){solved=true;playCorrect();setMsg(I18n.t('mk.msgPurified'),'ok');submitSRS(3);}
        else setMsg(I18n.t('mk.msgBurning'),'info');
    },400);
}

function _petLineEn(){ return typeof I18n!=='undefined' && I18n.getLang && I18n.getLang()==='en'; }

async function loadQuizPet() {
    try {
        const d = await fetch('/api/pet/status', { credentials:'include' }).then(r=>r.json());
        if (!d || !d.pet) return;
        const petName = _petLineEn() && d.pet.name_en && d.pet.nickname === d.pet.name
            ? d.pet.name_en : (d.pet.nickname || (_petLineEn() ? d.pet.name_en : d.pet.name) || '');
        _quizPet = { key:d.pet.pet_key, nickname:petName };
        const fig = document.getElementById('quiz-pet');

        fig.title = I18n.t('mk.petOwner') + petName;

        setTimeout(() => petReact('greet'), 1300);
    } catch(e) {}
}

function showPetSpeech(text, mood='cheer') {
    const old = document.getElementById('quiz-pet-speech');
    if (old) old.remove();
    clearTimeout(window._quizPetSpeechTimer);
    const anchor = document.getElementById('quiz-pet');
    if (!anchor || anchor.style.display === 'none' || !text) return;
    const el = document.createElement('div');
    el.id = 'quiz-pet-speech'; el.className = mood; el.textContent = text;
    document.body.appendChild(el);
    const rect = anchor.getBoundingClientRect();
    const bw = el.offsetWidth || 160, bh = el.offsetHeight || 36;
    // 對話框放在棋靈「旁邊」：預設右側、與棋靈垂直置中
    let left = rect.right + 12;
    let top  = rect.top + rect.height / 2 - bh / 2;
    if (left + bw > window.innerWidth - 8) {
        left = rect.left - bw - 12;
        el.classList.add('flip');
    }
    if (left < 8) left = 8;
    if (top < 8) top = 8;
    if (top + bh > window.innerHeight - 8) top = window.innerHeight - bh - 8;
    el.style.top = top + 'px'; el.style.left = left + 'px';
    const dur = 1800 + Math.min(text.length * 55, 2200);
    window._quizPetSpeechTimer = setTimeout(() => {
        el.style.transition = 'opacity .35s'; el.style.opacity = '0';
        setTimeout(() => el.remove(), 380);
    }, dur);
}

function petReact(event) {
    if (!_quizPet) return;
    const set = QUIZ_PET_LINES[_quizPet.key]; if (!set) return;
    const lines = set[event]; if (!lines || !lines.length) return;
    const now = Date.now();
    const highPrio = (event === 'wrong' || event === 'levelup' || event === 'greet');
    if (!highPrio && now - _quizPetSpeakTs < 1600) return;
    _quizPetSpeakTs = now;
    const o = lines[Math.floor(Math.random() * lines.length)];
    showPetSpeech(_petLineEn() ? o.en : o.zh, _QUIZ_PET_MOOD[event] || 'cheer');
    const fig = document.getElementById('quiz-pet');
    if (fig) { fig.classList.remove('react'); void fig.offsetWidth; fig.classList.add('react'); }
}

async function submitSRS(grade){
    if(!currentMistake)return;
    const res = await fetch('/api/srs/review',{credentials:'include',method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({question_id:currentMistake.question_id,grade})});
    const data = await res.json();

    // ── XP ──────────────────────────────────────────────────
    if (grade >= 3 && data.xp_gain) {
        spawnXpFloat(data.xp_gain, data.combo_mult);
        if (data.ranked_up && data.new_rank_level) showRankUpPopup(data.new_rank_level);
    }
    // ── 陪伴棋靈反應（每次淨化僅取一句最高優先）──────────────
    if (_quizPet && grade >= 3) {
        if (data.ranked_up)                                        setTimeout(() => petReact('levelup'), 700);
        else if (data.combo_streak && data.combo_streak % 5 === 0) petReact('combo');
        else                                                       petReact('correct');
    }

    if(grade===0){ resetBoard(); return; }

    currentMistake.correct_after=(currentMistake.correct_after||0)+1;
    document.getElementById('q-correct-after').textContent=I18n.t('mk.purifyCount').replace('{n}', currentMistake.correct_after);

    if(practiceMode){
        updatePracticeProgress();
        setTimeout(()=>{ if(practiceIdx<practiceQueue.length-1){practiceIdx++;loadMistake(practiceQueue[practiceIdx]);}else{endPractice();}},600);
    }
}

// 練習模式
// ═══════════════════════════════════════════════════════════════
function startPractice(){
    if(!displayList.length){alert(I18n.t('mk.noUnpurified'));return;}
    practiceMode=true;
    practiceQueue=[...displayList].sort((a,b)=>b.wrong_count-a.wrong_count);
    practiceIdx=0;
    document.getElementById('practice-progress').style.display='block';
    document.getElementById('p-total').textContent=practiceQueue.length;
    updatePracticeProgress();
    loadMistake(practiceQueue[0]);
}

function updatePracticeProgress(){
    const done=practiceIdx, total=practiceQueue.length;
    document.getElementById('p-done').textContent=done;
    document.getElementById('p-bar').style.width=(total>0?Math.round(done/total*100):0)+'%';
}

function endPractice(){
    practiceMode=false;
    document.getElementById('practice-progress').style.display='none';
    setMsg(I18n.t('mk.roundDone'),'ok');
}

function updateNavBtns(){
    let idx, total;
    if(practiceMode){
        idx   = practiceIdx;
        total = practiceQueue.length;
    } else {
        idx   = displayList.findIndex(x=>x.question_id===currentMistake?.question_id);
        total = displayList.length;
    }
    document.getElementById('btn-prev').disabled = (idx <= 0);
    document.getElementById('btn-next').disabled = (idx < 0 || idx >= total - 1);
}

function prevQ(){
    if(practiceMode){
        if(practiceIdx<=0)return;
        practiceIdx--;
        loadMistake(practiceQueue[practiceIdx]);
        updatePracticeProgress();
    } else {
        const idx=displayList.findIndex(x=>x.question_id===currentMistake?.question_id);
        if(idx<=0)return;
        loadMistake(displayList[idx-1]);
    }
}

function nextQ(){
    if(practiceMode){
        if(practiceIdx<practiceQueue.length-1){
            practiceIdx++;
            loadMistake(practiceQueue[practiceIdx]);
            updatePracticeProgress();
        } else {
            endPractice();
        }
    } else {
        const idx=displayList.findIndex(x=>x.question_id===currentMistake?.question_id);
        if(idx<0||idx>=displayList.length-1)return;
        loadMistake(displayList[idx+1]);
    }
}

function showAnswer(){
    if(!currentProblem||!currentProblem.tree)return;
    answering=true;solved=true;

    board.removeAllObjects();initLogicBoard(currentProblem.size);
    const crop=calcCropSection(currentProblem);
    initBoard(currentProblem.size,crop);
    currentProblem.black.forEach(s=>{placeStone(s.x,s.y,'B');board.addObject({x:_bx(s.x),y:_by(s.y),c:WGo.B});});
    currentProblem.white.forEach(s=>{placeStone(s.x,s.y,'W');board.addObject({x:_bx(s.x),y:_by(s.y),c:WGo.W});});
    const moves=[];let node=currentProblem.tree;
    if(node&&!node.move&&node.children&&node.children.length) node=node.children[0];
    while(node&&node.move){moves.push(node);node=node.children[0]||null;}
    let step=0;
    function pn(){if(step>=moves.length){setMsg(I18n.t('mk.secretDone'),'info');return;}
        const n=moves[step++];playStone(n.move.x,n.move.y,n.color);
        setMsg(I18n.t('mk.secretStep').replace('{s}',step).replace('{t}',moves.length).replace('{c}',n.color==='B'?'⚫':'⚪'),'info');setTimeout(pn,700);}
    setMsg(I18n.t('mk.secretOpening'),'info');setTimeout(pn,300);
}

function applyFilter(){
    const _sel=document.getElementById('filter-sel');
    const f=_sel?_sel.value:'all';
    if(f==='unsolved') displayList=allMistakes.filter(m=>m.correct_after===0);
    else if(f==='solved') displayList=allMistakes.filter(m=>m.correct_after>0);
    else displayList=[...allMistakes];
    renderList();
    if(currentMistake) updateNavBtns();
}

function mistakeTitle(m){
    const display=String(I18n.getLang()==='en'?(m?.display_name_en||m?.display_name||''):(m?.display_name||'')).trim();
    if(display && !isMojibake(display)) return display;
    const src=String(m?.source||'').trim();
    if(src){
        const filename=src.replace(/\\/g,'/').split('/').pop().trim();
        if(filename){
            const label=filename.replace(/\.sgf$/i,'')||filename;
            if(label) return label;
        }
    }
    const gnMatch=String(m?.content||'').match(/GN\[([^\]]+)\]/);
    const rawLabel=gnMatch?gnMatch[1]:`ID ${m.question_id}`;
    return isMojibake(rawLabel)?I18n.t('mk.trialId').replace('{n}', m.question_id):rawLabel;
}

function localizedMistakeSource(m){
    const en=I18n.getLang()==='en';
    return String(m?.source||'').replace(/\\/g,'/').split('/').filter(Boolean).map(part=>{
        if(!en)return part;
        if(part===m.topic)return m.topic_en||'Problem Book';
        if(part===m.level)return m.level_en||'Training Chapter';
        const translated=I18n.localizeName(part);
        return /[\u3400-\u9fff]/.test(translated)?'Training Chapter':translated;
    });
}

function renderList(){
    const container=document.getElementById('q-list');
    document.getElementById('list-count').textContent=displayList.length;
    if(!displayList.length){
        container.innerHTML=`<div class="list-empty">${I18n.t('mistakes.empty')}</div>`;
        return;
    }
    container.innerHTML=displayList.map(m=>{
        const label=mistakeTitle(m);
        const source=localizedMistakeSource(m);
        const sourceLabel=source.length
            ? source.slice(-2).join(' / ').replace(/\.sgf$/i,'')
            : `ID ${m.question_id}`;
        const maxDots=5, dots=Math.min(m.wrong_count,maxDots);
        const heatHtml=Array.from({length:maxDots},(_,i)=>
            `<span class="heat-dot${i<dots?' on':''}"></span>`).join('');
        const purified=m.correct_after>0;
        const stateIcon=purified?'✨':'💀';
        const correctedLabel=purified
            ?`<span class="q-corrected">${I18n.t('mk.purifiedShort').replace('{n}', m.correct_after)}</span>`:'';
        return `<div class="q-row ${purified?'purified':'haunted'}" data-id="${m.question_id}" onclick="selectQ(${m.question_id})">
            <div class="trial-mark">
                <span class="trial-icon">${stateIcon}</span>
                <div class="heat-bar">${heatHtml}</div>
            </div>
            <div class="q-main">
                <span class="q-label" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
                <span class="q-sub" title="${escapeHtml(source.join(' / '))}">${escapeHtml(sourceLabel)}</span>
            </div>
            <div class="q-status">
                ${correctedLabel}
                <span class="q-count">${I18n.t('mk.lossShort').replace('{n}', m.wrong_count)}</span>
            </div>
        </div>`;
    }).join('');
}

}

        const tone = status?.classList.contains('ok') ? 'ok' : status?.classList.contains('err') ? 'err' : '';

}

function problemReportT(key, vars = {}) {
    let text = I18n.t(key);
    for (const [name, value] of Object.entries(vars)) {
        text = text.split(`{${name}}`).join(String(value));
    }
    return text;
}

function updateProblemReportCounter() {
    const note = document.getElementById('problem-report-note');
    const counter = document.getElementById('problem-report-counter');
    if (!note || !counter) return;
    const len = Math.min(String(note.value || '').length, 500);
    counter.textContent = problemReportT('mk.problemReport.counter', { n: len });
}

function setProblemReportVisible(visible, statusText = '', statusType = '') {
    const panel = document.getElementById('problem-report-panel');
    const status = document.getElementById('problem-report-status');
    const submit = document.getElementById('problem-report-submit');
    if (panel) panel.style.display = visible ? 'block' : 'none';
    if (status) {
        status.className = 'mk-alt-report-status' + (statusType ? ' ' + statusType : '');
        status.textContent = statusText || '';
    }
    if (submit) {
        submit.disabled = _problemReportSubmitting;
        if (!_problemReportSubmitting) submit.textContent = problemReportT('mk.problemReport.submit');
    }
}

function toggleProblemReportPanel() {
    if (!currentMistake) {
        setMsg(problemReportT('mk.problemReport.needQuestion'), 'warn');
        return;
    }
    const panel = document.getElementById('problem-report-panel');
    const shouldShow = !panel || panel.style.display === 'none';
    if (shouldShow) {
        setProblemReportVisible(true, '', '');
        updateProblemReportCounter();
        const note = document.getElementById('problem-report-note');
        if (note) note.focus();
    } else {
        closeProblemReportPanel();
    }
}

function closeProblemReportPanel() {
    _problemReportSubmitting = false;
    setProblemReportVisible(false, '');
}

async function submitProblemReport() {
    if (!currentMistake) {
        setMsg(problemReportT('mk.problemReport.needQuestion'), 'warn');
        return;
    }
    const reasonEl = document.getElementById('problem-report-reason');
    const noteEl = document.getElementById('problem-report-note');
    const submit = document.getElementById('problem-report-submit');
    const reason_code = reasonEl ? String(reasonEl.value || '').trim() : '';
    const note = String(noteEl ? noteEl.value || '' : '').trim().slice(0, 500);
    if (!reason_code) {
        const msg = problemReportT('mk.problemReport.needReason');
        setProblemReportVisible(true, msg, 'err');
        setMsg(msg, 'err');
        return;
    }
    _problemReportSubmitting = true;
    if (submit) {
        submit.disabled = true;
        submit.textContent = problemReportT('mk.problemReport.sending');
    }
    setProblemReportVisible(true, problemReportT('mk.problemReport.sending'), 'warn');
    try {
        const res = await fetch('/api/question/problem-report', {
            method: 'POST',
            credentials: 'include',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                question_id: currentMistake.question_id,
                reason_code,
                note,
            })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) {
            const errorCode = data.error || res.status;
            let msg = problemReportT('mk.problemReport.fail');
            if (res.status === 401 || res.status === 403 || errorCode === 'login_required') {
                msg = problemReportT('mk.problemReport.loginRequired');
            } else if (errorCode === 'invalid_reason_code') {
                msg = problemReportT('mk.problemReport.invalidReason');
            } else if (errorCode === 'note_too_long') {
                msg = problemReportT('mk.problemReport.noteTooLong');
            } else if (errorCode) {
                msg = `${problemReportT('mk.problemReport.fail')} (${errorCode})`;
            }
            setProblemReportVisible(true, msg, 'err');
            setMsg(msg, 'err');
            return;
        }
        const msg = problemReportT('mk.problemReport.sent');
        setProblemReportVisible(true, msg, 'ok');
        setMsg(msg, 'ok');
    } catch (e) {
        const msg = problemReportT('mk.problemReport.networkFail');
        setProblemReportVisible(true, msg, 'err');
        setMsg(msg, 'err');
    } finally {
        _problemReportSubmitting = false;
        if (submit) {
            submit.disabled = false;
            submit.textContent = problemReportT('mk.problemReport.submit');
        }
        updateProblemReportCounter();
    }
}

let _recDebounce = null;

function hideRecommend(){
    const box = document.getElementById('recommend-box');
    box.style.display = 'none';
    box.innerHTML = '';
}

async function loadRecommend(tesuji=''){
    if(!currentMistake) return;
    clearTimeout(_recDebounce);
    const qid = currentMistake.question_id;   // 提前捕捉，避免切題後錯位
    _recDebounce = setTimeout(async () => {
        try {
            const res = await fetch('/api/recommend', {
                credentials: 'include',
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ questionId: qid, tesuji })
            });
            if(!res.ok){ console.warn('[recommend] HTTP', res.status); return; }
            const data = await res.json();
            if(!data.ok || !data.recommend?.length) return;
            renderRecommend(data.recommend);
        } catch(e) { console.warn('[recommend] fetch error', e); }
    }, 600);
}

function renderRecommend(items){
    const box = document.getElementById('recommend-box');
    const cards = items.map(r => {
        const tags = (r.tags || []).slice(0,3).map(t =>
            `<span class="rc-tag">${escHtml(t)}</span>`
        ).join('');
        const wrongBadge = r.wrong_count > 0
            ? `<span class="rc-tag wrong">${I18n.t('mk.recWrong').replace('{n}', r.wrong_count)}</span>`
            : '';
        return `
        <div class="rec-card" onclick="jumpToRec(${r.id})" title="${escHtml(r.topic)}">
            <div class="rc-name">${escHtml(r.display_name)}</div>
            <div class="rc-topic">${escHtml(r.topic)}</div>
            <div class="rc-tags">${wrongBadge}${tags}</div>
        </div>`;
    }).join('');

    box.innerHTML = `
        <div class="rec-title">${I18n.t('mk.recTitle')}</div>
        <div class="rec-cards">${cards}</div>`;
    box.style.display = 'block';
}

async function jumpToRec(qid){
    // 優先從 displayList（修煉之書）找
    const inList = displayList.find(x => x.question_id === qid);
    if(inList){ loadMistake(inList); return; }
    // 不在修煉之書 → 從 API 取題目內容後直接載入
    try{
        const res = await fetch(`/api/question/${qid}`, {credentials:'include'});
        if(!res.ok) return;
        const q = await res.json();
        if(q && q.content){
            // 組成 loadMistake 相容的最小 mock 物件
            loadMistake({
                question_id: qid,
                content:     q.content,
                wrong_count: 0,
                topic:       q.topic || '',
                level:       q.level || '',
                difficulty:  q.difficulty || '',
                rank:        q.rank || q.difficulty || '',
                display_name:q.display_name || '',
                source:      q.source || '',
            });
        }
    } catch(e){ console.warn('[jumpToRec]', e); }
}

window.onLangChange = () => {
    I18n.apply();
    try {
        _renderNpc();                       // 導師台詞換語言
        if (displayList && displayList.length) renderList();  // 列表內動態標籤
        // 重繪當前試煉的敗北/淨化次數
        if (currentMistake) {
            const wc = document.getElementById('q-wrong-count');
            if (wc) wc.textContent = I18n.t('mk.wrongCount').replace('{n}', currentMistake.wrong_count || 0);
            const ca = document.getElementById('q-correct-after');
            if (ca) ca.textContent = currentMistake.correct_after > 0 ? I18n.t('mk.purifyCount').replace('{n}', currentMistake.correct_after) : '';
        }
        // 棋盤空白佔位文字（CSS content 用 attr 取值）
        const bw = document.getElementById('board-wrap');
        if (bw) bw.setAttribute('data-waiting-text', I18n.t('mk.boardWaiting'));
        const altPanel = document.getElementById('alt-answer-report-panel');
        if (altPanel?.classList.contains('active')) {
            const status = document.getElementById('alt-answer-report-status');
            const tone = status?.classList.contains('ok') ? 'ok' : status?.classList.contains('err') ? 'err' : status?.classList.contains('warn') ? 'warn' : '';
            setAlternativeAnswerReportVisible(true, status?.textContent || '', tone);
        }
    } catch(e) { console.warn('[mistakes] onLangChange:', e); }
};
window.onload = async () => {
    I18n.renderSwitcher(document.getElementById('lang-switcher-mistakes'));
    I18n.apply();
    const me=await fetch('/api/auth/me',{credentials:'include'}).then(r=>r.json()).catch(()=>({logged_in:false}));
    if(!me.logged_in){window.location.href='/login';return;}
    document.getElementById('username-display').textContent = me.display_name || me.nickname || me.username || 'Player';
    loadNavAvatar();
    loadQuizPet();                       // 錯題頁陪伴棋靈

    // ── 核心：載入錯題列表（失敗才顯示紅色錯誤）──
    try{
        const raw=await fetch('/api/mistakes',{credentials:'include'}).then(r=>r.json());
        allMistakes=Array.isArray(raw)?raw:[];
        applyFilter();
        setNpc(allMistakes.some(m=>m.correct_after===0) ? 'greet' : 'allClear');
    }catch(e){
        console.error('[mistakes] 載入失敗:', e);
        document.getElementById('q-list').innerHTML=
            `<div class="list-empty" style="color:var(--red);">${I18n.t('mistakes.load_err')}<br><small style="opacity:.6;">${e.message||''}</small></div>`;
        return;
    }

    // ── 非核心：統計（失敗不影響列表）──
    loadStats().catch(e=>console.warn('[mistakes] stats error:',e));

    // ── 非核心：自動載入第一道錯題（等 layout 完成後再初始化棋盤）──
    if(displayList.length>0){
        requestAnimationFrame(()=>{
            try{ selectQ(displayList[0].question_id); }
            catch(e){ console.warn('[mistakes] auto-select error:',e); }
        });
    }
};

// ── XP 輔助函數 ───────────────────────────────────────────────
function spawnXpFloat(xpGain, comboMult) {
    if (!xpGain) return;
    const isCombo = comboMult && comboMult > 1;
    const el = document.createElement('div');
    el.className = 'xp-float' + (isCombo ? ' combo' : '');
    el.textContent = '+' + xpGain + ' XP' + (isCombo ? '  ×' + comboMult.toFixed(1) + I18n.t('mk.combo') : '');
    el.style.left = '50%'; el.style.top = '30%';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
}
function showRankUpPopup(newLevel) {
    document.getElementById('rankup-title').textContent = I18n.t('mk.rankupTitle').replace('{r}', newLevel);
    document.getElementById('rankup-sub').textContent   = I18n.t('mk.rankupSub');
    document.getElementById('rankup-popup').classList.add('show');
}

// ── Nav 角色 mini 頭像 ──────────────────────────────────────
async function loadNavAvatar() {
  try {
    const [meRes, appearRes] = await Promise.all([
      fetch('/api/auth/me',           { credentials:'include' }).then(r=>r.json()),
      fetch('/api/player/appearance', { credentials:'include' }).then(r=>r.json()),
    ]);
    const uname = meRes.display_name || meRes.nickname || meRes.username || 'Player';
    const el = document.getElementById('username-display');
    if (el) el.textContent = uname;

    const eq  = appearRes.equipped || {};
    const byId = Object.fromEntries((appearRes.wardrobe||[]).map(a=>[a.id,a]));

    const base = document.getElementById('nav-avatar-base');
    const outfitItem = eq.outfit_id ? byId[eq.outfit_id] : null;
    if (base && outfitItem) { base.style.background = outfitItem.color + '33'; base.style.borderColor = outfitItem.color + '88'; }
    const hatItem = eq.hat_id ? byId[eq.hat_id] : null;
    const hatEl   = document.getElementById('nav-avatar-hat');
    if (hatEl && hatItem) { hatEl.textContent = hatItem.emoji; hatEl.style.opacity = '1'; }
  } catch(e) {}
}

async function doLogout() {
  await fetch('/api/auth/logout', { method:'POST', credentials:'include' });
  location.href = '/login';
}
